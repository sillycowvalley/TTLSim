<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 990" font-family="Segoe UI, Arial, sans-serif">
  <!-- ======================= TITLE ======================= -->
  <text x="750" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">TEENSY 4.1 ADAPTER — J1 AS FOUR VIRTUAL 8-BIT PORTS (A–D)</text>
  <text x="750" y="62" text-anchor="middle" font-size="12" fill="#666666">Label: port bit · Teensy 4.1 pin, with ribbon wire colour · bit 0 = white (bottom of group), bit 7 = red (top of group)</text>

  <!-- ======================= PCB BOARD ======================= -->
  <rect x="40" y="90" width="1420" height="860" rx="14" fill="#3b1f47" stroke="#241130" stroke-width="5"/>
  <g stroke="#c9a227" stroke-width="4" fill="#f3e5f5">
    <circle cx="1185" cy="135" r="11"/>
    <circle cx="620" cy="640" r="13"/>
  </g>

  <!-- ======================= J1 : 2x18 RIBBON HEADER ======================= -->
  <text x="160" y="122" font-size="14" font-weight="bold" fill="#ffffff">J1 — top row 2×GND · bottom row 2×+5V · 32 I/O = ports A–D</text>
  <rect x="72" y="148" width="72" height="692" rx="4" fill="#111111" stroke="#000000" stroke-width="2"/>
  <g fill="#333333" stroke="#d4af37" stroke-width="2">
    <circle cx="92" cy="168" r="7"/><circle cx="126" cy="168" r="7"/>
    <circle cx="92" cy="206" r="7"/><circle cx="126" cy="206" r="7"/>
    <circle cx="92" cy="244" r="7"/><circle cx="126" cy="244" r="7"/>
    <circle cx="92" cy="282" r="7"/><circle cx="126" cy="282" r="7"/>
    <circle cx="92" cy="320" r="7"/><circle cx="126" cy="320" r="7"/>
    <circle cx="92" cy="358" r="7"/><circle cx="126" cy="358" r="7"/>
    <circle cx="92" cy="396" r="7"/><circle cx="126" cy="396" r="7"/>
    <circle cx="92" cy="434" r="7"/><circle cx="126" cy="434" r="7"/>
    <circle cx="92" cy="472" r="7"/><circle cx="126" cy="472" r="7"/>
    <circle cx="92" cy="510" r="7"/><circle cx="126" cy="510" r="7"/>
    <circle cx="92" cy="548" r="7"/><circle cx="126" cy="548" r="7"/>
    <circle cx="92" cy="586" r="7"/><circle cx="126" cy="586" r="7"/>
    <circle cx="92" cy="624" r="7"/><circle cx="126" cy="624" r="7"/>
    <circle cx="92" cy="662" r="7"/><circle cx="126" cy="662" r="7"/>
    <circle cx="92" cy="700" r="7"/><circle cx="126" cy="700" r="7"/>
    <circle cx="92" cy="738" r="7"/><circle cx="126" cy="738" r="7"/>
    <circle cx="92" cy="776" r="7"/><circle cx="126" cy="776" r="7"/>
    <circle cx="92" cy="814" r="7"/><circle cx="126" cy="814" r="7"/>
  </g>

  <!-- group divider between upper (B/D) and lower (A/C) port groups -->
  <line x1="150" y1="491" x2="430" y2="491" stroke="#7e57c2" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- column headings -->
  <g font-size="10" fill="#c8b3d6">
    <text x="152" y="150">edge column → ports B (top) / A (bottom)</text>
    <text x="152" y="162">inner column → ports D (top) / C (bottom)</text>
  </g>

  <!-- wire colour swatches, edge column -->
  <g stroke="#000000" stroke-width="0.75">
    <rect x="152" y="199" width="12" height="14" fill="#e53935"/>
    <rect x="152" y="237" width="12" height="14" fill="#fb8c00"/>
    <rect x="152" y="275" width="12" height="14" fill="#fdd835"/>
    <rect x="152" y="313" width="12" height="14" fill="#43a047"/>
    <rect x="152" y="351" width="12" height="14" fill="#1e88e5"/>
    <rect x="152" y="389" width="12" height="14" fill="#8e24aa"/>
    <rect x="152" y="427" width="12" height="14" fill="#9e9e9e"/>
    <rect x="152" y="465" width="12" height="14" fill="#fafafa"/>
    <rect x="152" y="503" width="12" height="14" fill="#e53935"/>
    <rect x="152" y="541" width="12" height="14" fill="#fb8c00"/>
    <rect x="152" y="579" width="12" height="14" fill="#fdd835"/>
    <rect x="152" y="617" width="12" height="14" fill="#43a047"/>
    <rect x="152" y="655" width="12" height="14" fill="#1e88e5"/>
    <rect x="152" y="693" width="12" height="14" fill="#8e24aa"/>
    <rect x="152" y="731" width="12" height="14" fill="#9e9e9e"/>
    <rect x="152" y="769" width="12" height="14" fill="#fafafa"/>
  </g>
  <!-- wire colour swatches, inner column -->
  <g stroke="#000000" stroke-width="0.75">
    <rect x="300" y="199" width="12" height="14" fill="#e53935"/>
    <rect x="300" y="237" width="12" height="14" fill="#fb8c00"/>
    <rect x="300" y="275" width="12" height="14" fill="#fdd835"/>
    <rect x="300" y="313" width="12" height="14" fill="#43a047"/>
    <rect x="300" y="351" width="12" height="14" fill="#1e88e5"/>
    <rect x="300" y="389" width="12" height="14" fill="#8e24aa"/>
    <rect x="300" y="427" width="12" height="14" fill="#9e9e9e"/>
    <rect x="300" y="465" width="12" height="14" fill="#fafafa"/>
    <rect x="300" y="503" width="12" height="14" fill="#e53935"/>
    <rect x="300" y="541" width="12" height="14" fill="#fb8c00"/>
    <rect x="300" y="579" width="12" height="14" fill="#fdd835"/>
    <rect x="300" y="617" width="12" height="14" fill="#43a047"/>
    <rect x="300" y="655" width="12" height="14" fill="#1e88e5"/>
    <rect x="300" y="693" width="12" height="14" fill="#8e24aa"/>
    <rect x="300" y="731" width="12" height="14" fill="#9e9e9e"/>
    <rect x="300" y="769" width="12" height="14" fill="#fafafa"/>
  </g>

  <!-- J1 labels: port bit · Teensy 4.1 pin -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="bold" dominant-baseline="middle" fill="#ffffff">
    <text x="156" y="168" fill="#b0bec5">GND</text>       <text x="304" y="168" fill="#b0bec5">GND</text>
    <text x="172" y="206">B7 · 39</text>                  <text x="320" y="206">D7 · 28</text>
    <text x="172" y="244">B6 · 30</text>                  <text x="320" y="244">D6 · 29</text>
    <text x="172" y="282">B5 · 14</text>                  <text x="320" y="282">D5 · 2</text>
    <text x="172" y="320">B4 · 8</text>                   <text x="320" y="320">D4 · 7</text>
    <text x="172" y="358">B3 · 20</text>                  <text x="320" y="358">D3 · 6</text>
    <text x="172" y="396">B2 · 5</text>                   <text x="320" y="396">D2 · 21</text>
    <text x="172" y="434">B1 · 16</text>                  <text x="320" y="434">D1 · 13*</text>
    <text x="172" y="472">B0 · 24</text>                  <text x="320" y="472">D0 · 17</text>
    <text x="172" y="510">A7 · 36</text>                  <text x="320" y="510">C7 · 35</text>
    <text x="172" y="548">A6 · 38</text>                  <text x="320" y="548">C6 · 37</text>
    <text x="172" y="586">A5 · 4</text>                   <text x="320" y="586">C5 · 3</text>
    <text x="172" y="624">A4 · 27</text>                  <text x="320" y="624">C4 · 26</text>
    <text x="172" y="662">A3 · 11</text>                  <text x="320" y="662">C3 · 12</text>
    <text x="172" y="700">A2 · 10</text>                  <text x="320" y="700">C2 · 25</text>
    <text x="172" y="738">A1 · 23</text>                  <text x="320" y="738">C1 · 9</text>
    <text x="172" y="776">A0 · 15</text>                  <text x="320" y="776">C0 · 22</text>
    <text x="156" y="814" fill="#ef5350">+5V</text>       <text x="304" y="814" fill="#ef5350">+5V</text>
  </g>
  <text x="156" y="838" font-size="10" fill="#c8b3d6">* D1 = Teensy pin 13 = onboard LED (fine as input; visible when driven as output)</text>

  <!-- port group letters -->
  <g font-size="26" font-weight="bold" text-anchor="middle">
    <text x="262" y="346" fill="#ffb74d">B</text>
    <text x="262" y="650" fill="#ffb74d">A</text>
    <text x="410" y="346" fill="#81d4fa">D</text>
    <text x="410" y="650" fill="#81d4fa">C</text>
  </g>

  <!-- ======================= LEVEL SHIFTERS ======================= -->
  <g fill="#1c1c1c" stroke="#555555" stroke-width="2">
    <rect x="480" y="200" width="110" height="64" rx="4"/>
    <rect x="480" y="292" width="110" height="64" rx="4"/>
    <rect x="480" y="560" width="110" height="64" rx="4"/>
    <rect x="480" y="652" width="110" height="64" rx="4"/>
  </g>
  <g font-size="11" fill="#e0e0e0" text-anchor="middle">
    <text x="535" y="228">U2</text><text x="535" y="246">LVL SHIFT</text>
    <text x="535" y="320">U3</text><text x="535" y="338">LVL SHIFT</text>
    <text x="535" y="588">U4</text><text x="535" y="606">LVL SHIFT</text>
    <text x="535" y="680">U5</text><text x="535" y="698">LVL SHIFT</text>
  </g>
  <text x="535" y="440" text-anchor="middle" font-size="12" fill="#c8b3d6">4× 8-ch 3.3⇄5 V</text>
  <text x="535" y="458" text-anchor="middle" font-size="12" fill="#c8b3d6">= 32 I/O channels</text>

  <!-- ======================= USER BUTTONS (SW2 left · SW1 right) ======================= -->
  <g>
    <rect x="1108" y="168" width="48" height="48" rx="6" fill="#1c1c1c" stroke="#555555" stroke-width="2"/>
    <circle cx="1132" cy="192" r="13" fill="#a5d6a7" stroke="#66bb6a" stroke-width="3"/>
    <text x="1132" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SW2 → pin 41</text>
    <rect x="1268" y="168" width="48" height="48" rx="6" fill="#1c1c1c" stroke="#555555" stroke-width="2"/>
    <circle cx="1292" cy="192" r="13" fill="#a5d6a7" stroke="#66bb6a" stroke-width="3"/>
    <text x="1292" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SW1 → pin 40</text>
  </g>
  <text x="1212" y="262" text-anchor="middle" font-size="11" fill="#c8b3d6">active-low, 4.7 kΩ pull-ups to 3.3 V · pins 40/41 derived from footprint — verify once</text>

  <!-- ======================= TEENSY 4.1 ======================= -->
  <rect x="640" y="330" width="650" height="140" rx="8" fill="#1b5e20" stroke="#0d3d12" stroke-width="3"/>
  <rect x="660" y="352" width="90" height="96" rx="4" fill="#9e9e9e" stroke="#616161" stroke-width="2"/>
  <text x="705" y="404" text-anchor="middle" font-size="10" fill="#212121">microSD</text>
  <rect x="910" y="342" width="160" height="116" rx="4" fill="#111111" stroke="#000000"/>
  <text x="990" y="396" text-anchor="middle" font-size="11" fill="#bdbdbd">MIMXRT1062</text>
  <text x="990" y="412" text-anchor="middle" font-size="10" fill="#757575">Teensy 4.1</text>
  <rect x="1288" y="372" width="46" height="56" rx="4" fill="#cfd8dc" stroke="#78909c" stroke-width="2"/>
  <text x="1311" y="446" text-anchor="middle" font-size="10" fill="#c8b3d6">micro-USB</text>
  <text x="965" y="498" text-anchor="middle" font-size="12" fill="#c8b3d6">Teensy 4.1 on socket header (pins face down into board)</text>

  <!-- ======================= SKETCH NOTES ======================= -->
  <g font-size="12" fill="#e1bee7">
    <text x="660" y="548" font-weight="bold" fill="#ffffff">Virtual port convention (see AdapterPorts.h):</text>
    <text x="660" y="570">• Port A = edge column, lower 8 · Port B = edge column, upper 8</text>
    <text x="660" y="590">• Port C = inner column, lower 8 · Port D = inner column, upper 8</text>
    <text x="660" y="610">• Within each port: bit 0 = white wire (bottom) … bit 7 = red wire (top)</text>
    <text x="660" y="630">• readPortX()/writePortX() are unrolled digitalRead/WriteFast — single register ops on the 4.1</text>
  </g>

  <!-- ======================= TOP EDGE HEADERS ======================= -->
  <g fill="#111111" stroke="#d4af37" stroke-width="1.5">
    <rect x="420" y="112" width="220" height="26" rx="4"/>
    <rect x="680" y="112" width="240" height="26" rx="4"/>
    <rect x="960" y="112" width="110" height="26" rx="4"/>
  </g>
  <g font-size="11" fill="#c8b3d6">
    <text x="530" y="158" text-anchor="middle">SCL0 · SDA0 · …</text>
    <text x="800" y="158" text-anchor="middle">Vin · GND · GND · 5V · 3.3V</text>
    <text x="1015" y="158" text-anchor="middle">5V · …</text>
  </g>

  <!-- ======================= BOTTOM EDGE HEADERS ======================= -->
  <g fill="#111111" stroke="#d4af37" stroke-width="1.5">
    <rect x="300" y="852" width="280" height="26" rx="4"/>
    <rect x="640" y="852" width="260" height="26" rx="4"/>
    <rect x="960" y="852" width="330" height="26" rx="4"/>
  </g>
  <g font-size="11" fill="#c8b3d6">
    <text x="440" y="844" text-anchor="middle">SDA0 · SCL0 · …</text>
    <text x="770" y="844" text-anchor="middle">RX1 · TX1 · INT/2 · DAT/4</text>
    <text x="1125" y="844" text-anchor="middle">SS/10 · MOSI/11 · MISO/12 · SCK/13 · GND · AREF · SDA0 · SCL0</text>
  </g>

  <!-- ======================= PWR LED ======================= -->
  <circle cx="1400" cy="770" r="16" fill="#e53935" stroke="#b71c1c" stroke-width="3"/>
  <circle cx="1394" cy="763" r="5" fill="#ff8a80"/>
  <text x="1400" y="812" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">PWR · R1</text>

  <!-- ======================= LEGEND ======================= -->
  <g font-size="12" fill="#ffffff">
    <text x="660" y="680" font-size="13" font-weight="bold">Ribbon wire colours (per 8-bit port, top→bottom)</text>
    <rect x="660" y="694" width="13" height="13" fill="#e53935" stroke="#000"/><text x="678" y="705" dominant-baseline="middle">7</text>
    <rect x="700" y="694" width="13" height="13" fill="#fb8c00" stroke="#000"/><text x="718" y="705" dominant-baseline="middle">6</text>
    <rect x="740" y="694" width="13" height="13" fill="#fdd835" stroke="#000"/><text x="758" y="705" dominant-baseline="middle">5</text>
    <rect x="780" y="694" width="13" height="13" fill="#43a047" stroke="#000"/><text x="798" y="705" dominant-baseline="middle">4</text>
    <rect x="820" y="694" width="13" height="13" fill="#1e88e5" stroke="#000"/><text x="838" y="705" dominant-baseline="middle">3</text>
    <rect x="860" y="694" width="13" height="13" fill="#8e24aa" stroke="#000"/><text x="878" y="705" dominant-baseline="middle">2</text>
    <rect x="900" y="694" width="13" height="13" fill="#9e9e9e" stroke="#000"/><text x="918" y="705" dominant-baseline="middle">1</text>
    <rect x="940" y="694" width="13" height="13" fill="#fafafa" stroke="#000"/><text x="958" y="705" dominant-baseline="middle">0</text>
    <text x="660" y="736">J1 totals: 32 I/O (4 × 8-bit ports) + 2× GND (top) + 2× +5 V (bottom) · all 5 V logic through the level shifters</text>
  </g>
</svg>
