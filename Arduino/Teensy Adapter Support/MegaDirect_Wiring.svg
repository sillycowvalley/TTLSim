<text x="430" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">Arduino Mega 2560 — direct DUT wiring (virtual ports A–D)</text>
<text x="430" y="62" text-anchor="middle" font-size="13" fill="#444">Dual-row header pins 22–53 + power. Same positions as the Teensy adapter J1 — boards swap with no rewiring.</text>
<text x="430" y="80" text-anchor="middle" font-size="13" fill="#444">Within each port: bit 0 = white ribbon wire, bit 7 = red. Swatch shows the ribbon colour.</text>
