<rect x="60" y="962" width="740" height="120" fill="#f8fafc" stroke="#94a3b8" rx="8"/>
<text x="80" y="990" font-size="14" font-weight="bold" fill="#111">Notes</text>
<text x="80" y="1012" font-size="13" fill="#333">Buttons (optional): SW1 = pin 2, SW2 = pin 3, momentary switch to GND. Internal pull-ups (INPUT_PULLUP);</text>
<text x="80" y="1030" font-size="13" fill="#333">unwired = not pressed. Every button function has a serial command.</text>
<text x="80" y="1052" font-size="13" fill="#333">Direct 5 V drive: no level shifters, no series terminations. Tie Mega GND to DUT GND; the +5V pair may</text>
<text x="80" y="1070" font-size="13" fill="#333">feed the DUT for small loads, otherwise power the DUT externally and share ground only.</text>
