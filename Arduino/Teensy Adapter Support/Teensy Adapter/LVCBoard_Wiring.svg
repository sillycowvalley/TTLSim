<text x="762" y="488" font-size="13" font-weight="bold" fill="#9a3412">Direction selection</text>
<text x="762" y="508" font-size="12" fill="#333">A/B/E: one jumper each to VCC (J8/J12/J15).</text>
<text x="762" y="526" font-size="12" fill="#333">Fitted = drive; parked = read (10 k pulldown).</text>
<text x="762" y="544" font-size="12" fill="#333">C = DIR0 (Teensy 13, onboard LED = C driving).</text>
<text x="762" y="562" font-size="12" fill="#333">D = DIR1 (Teensy 33). Low = read at power-up.</text>
<rect x="750" y="602" width="330" height="38" fill="#f3f4f6" stroke="#888"/>
<text x="915" y="626" text-anchor="middle" font-size="11" fill="#111">H13/H14: +5 V pairs via J5 (never with ext. DUT supply)</text>
<rect x="750" y="640" width="330" height="38" fill="#f3f4f6" stroke="#888"/>
<text x="915" y="664" text-anchor="middle" font-size="11" fill="#111">H15/H16: GND pairs</text>
<rect x="60" y="940" width="1060" height="92" fill="#f8fafc" stroke="#94a3b8" rx="8"/>
<text x="80" y="964" font-size="13" font-weight="bold" fill="#111">Buttons: SW0/SW1 share Teensy 40/41 with PE6/PE7 via J6/J7 (button leg through 1 k; internal pull-ups; 100 k holds the port side).</text>
<text x="80" y="986" font-size="13" fill="#333">Terminations RN5-RN9 (100 ohm x8 DIP-16): element k = pins k and 17-k, chip side 1-8, header side 16-9, bit order straight.</text>
<text x="80" y="1008" font-size="13" fill="#333">Pulls: SIP-9 10 k per port (RN1-4, RN13) with select jumpers J1-J4, J11 (5 V / open / GND). 100 nF per chip.</text>
</svg>
