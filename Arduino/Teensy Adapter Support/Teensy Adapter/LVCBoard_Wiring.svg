<text x="772" y="422" font-size="13" font-weight="bold" fill="#9a3412">J6 / J7 role select (centre = Teensy 40/41)</text>
<text x="772" y="444" font-size="12" fill="#333">pos 1: button — 1 k (R6/R7) to SW1/SW2 to GND</text>
<text x="772" y="462" font-size="12" fill="#333">pos 3: strobe — U7 A5/A6 (100 k pulldowns R8/R9)</text>
<text x="772" y="482" font-size="12" fill="#333">Sketch must match jumpers; declare in boot banner.</text>
<text x="772" y="502" font-size="12" fill="#333">DIR_A-D = Teensy 36-39, 10 k pulldowns (R1-R4).</text>
<rect x="760" y="540" width="310" height="40" fill="#f3f4f6" stroke="#888"/>
<text x="915" y="566" text-anchor="middle" font-size="12" fill="#111">H13: 4x +5V via J5</text>
<rect x="760" y="580" width="310" height="40" fill="#f3f4f6" stroke="#888"/>
<text x="915" y="606" text-anchor="middle" font-size="12" fill="#111">H14: 4x GND</text>
<rect x="60" y="920" width="1060" height="104" fill="#f8fafc" stroke="#94a3b8" rx="8"/>
<text x="80" y="944" font-size="13" font-weight="bold" fill="#111">Termination packs (RN5-RN9, 100 ohm x8 isolated DIP-16): element k = pins k and k+8. Chip side 1-8, header side 9-16, straight order.</text>
<text x="80" y="966" font-size="13" fill="#333">DIR high = HCT drives DUT, low = LVC reads; shared 'HCT04 inverts DIR for HCT /OE. J5 never closed with an external DUT supply.</text>
<text x="80" y="986" font-size="13" fill="#333">Jumperable 10 k SIP pulls (RN1-4 + J1-4) on each data port DUT side for tri-state buses.</text>
<text x="80" y="1006" font-size="13" fill="#333">Chips: U3-U7 HCT245 (drive A-E; U7 A7/A8 grounded), U8-U11 SN74LVC245AN at 3.3 V (read A-D), U2 HCT04. 100 nF per chip.</text>
</svg>
