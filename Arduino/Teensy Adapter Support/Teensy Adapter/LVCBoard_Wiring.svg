<text x="590" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">LVC Harness Board — Teensy 4.1 + HCT245/LVC245 pairs, wiring map</text>
<text x="590" y="60" text-anchor="middle" font-size="13" fill="#444">All 42 signals on through-hole pins 0–41. Strobe pairs: signal on pin 2, GND on pin 1 — twist each pair.</text>
<text x="590" y="78" text-anchor="middle" font-size="13" fill="#444">Per data port: 74HCT245 (drive, 5 V) + 74LVC245 (read, 3.3 V), /OE-steered by DIR. DIR low at power-up = everything reads.</text>
