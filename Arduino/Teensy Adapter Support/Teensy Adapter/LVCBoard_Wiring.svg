<text x="80" y="914" font-size="13" font-weight="bold" fill="#111">Off-connector: buttons SW1=Teensy 40, SW2=41, SW3=pad 46, SW4=pad 47 (to GND, internal pull-ups).</text>
<text x="80" y="936" font-size="13" fill="#333">Direction: DIR_A=pad 42 .. DIR_D=pad 45, 10 k pulldowns; DIR high = AHCT drives DUT, low = LVC reads. Shared 'HCT04 inverts DIR for AHCT /OE.</text>
<text x="80" y="956" font-size="13" fill="#333">Per port DUT side: 47-100 ohm series pack (all five ports) + jumperable 10 k SIP pulls on A-D for tri-state DUT buses.</text>
<text x="80" y="976" font-size="13" fill="#333">Chips: 5x HCT245 (drive A-E), 4x LVC245 at 3.3 V (read A-D, 5 V-tolerant), 1x HCT04. 100 nF per chip; /OE and DIR wired by signal name.</text>
</svg>
