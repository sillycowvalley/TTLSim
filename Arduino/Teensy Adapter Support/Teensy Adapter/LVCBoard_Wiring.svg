<rect x="0" y="0" width="1180" height="1050" fill="#ffffff"/>
<text x="590" y="34" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">LVC Harness Board — Teensy 4.1 + HCT245/LVC245 pairs, wiring map</text>
<text x="590" y="58" text-anchor="middle" font-size="13" fill="#444">Five 8-bit bidirectional ports. A/B/E direction by jumper (J8/J12/J15, fitted = drive); C/D runtime on DIR0/DIR1.</text>
<text x="590" y="76" text-anchor="middle" font-size="13" fill="#444">Strobe pairs: signal on pin 2, GND on pin 1 — twist each pair. All 42 signals on through-hole pins 0–41.</text>
