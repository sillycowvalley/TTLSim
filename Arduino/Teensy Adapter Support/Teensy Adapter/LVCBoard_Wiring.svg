<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1010" viewBox="0 0 1180 1010" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="1180" height="1010" fill="#ffffff"/>
<text x="590" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">LVC Harness Board — Teensy 4.1 + HCT245/LVC245 pairs, wiring map</text>
<text x="590" y="60" text-anchor="middle" font-size="13" fill="#444">Own form factor: one 8-pin header per data port, 16-way strobe header. Cells show port·bit, Teensy pin, ribbon colour.</text>
<text x="590" y="78" text-anchor="middle" font-size="13" fill="#444">Per data port: 74HCT245 (drive, 5 V) + 74LVC245 (read, 3.3 V), /OE-steered by DIR. DIR low at power-up = everything reads.</text>
