<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="860" viewBox="0 0 1240 860" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c96a00"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b03030"/>
    </marker>
  </defs>

  <style>
    .blk  { fill:#f7f7f2; stroke:#444; stroke-width:1.6; rx:8; }
    .sub  { fill:#ffffff; stroke:#888; stroke-width:1;   rx:5; }
    .tt   { font-size:15px; font-weight:600; fill:#222; }
    .lbl  { font-size:12px; fill:#333; }
    .sml  { font-size:10.5px; fill:#666; }
    .sig  { font-size:11.5px; font-weight:600; fill:#c96a00; }
    .ctl  { font-size:11.5px; font-weight:600; fill:#8a7500; }
    .rstt { font-size:11.5px; font-weight:600; fill:#b03030; }
    .pin  { font-size:12.5px; font-weight:700; fill:#111; }
    .wire { stroke:#333; stroke-width:1.6; fill:none; }
    .clkw { stroke:#c96a00; stroke-width:2;  fill:none; }
    .rstw { stroke:#b03030; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
    .led  { fill:#ffb14e; stroke:#996a00; stroke-width:1; }
  </style>

  <text x="24" y="34" font-size="20" font-weight="700" fill="#111">Blinky Clock Module v3 — block diagram</text>
  <text x="24" y="54" class="sml">Generic front-panel clock &amp; debug module. Orange = clock paths, olive = control, red dashed = reset. Circles = panel LEDs.</text>

  <!-- ============ PANEL COLUMN ============ -->
  <rect x="24" y="80" width="170" height="252" class="blk"/>
  <text x="40" y="104" class="tt">Buttons</text>
  <text x="40" y="130" class="lbl">STEP MODE</text>
  <text x="40" y="152" class="lbl">RUN 555</text>
  <text x="40" y="174" class="lbl">RUN XTAL</text>
  <text x="40" y="206" class="lbl">NEXT CYCLE</text>
  <text x="40" y="238" class="lbl">NEXT INSTR</text>
  <text x="40" y="270" class="lbl">RESET</text>
  <text x="40" y="296" class="sml">active-low, 10k pull-ups</text>
  <text x="40" y="312" class="sml">button-4, diagonal wiring</text>

  <rect x="24" y="356" width="170" height="90" class="blk"/>
  <text x="40" y="380" class="tt">DIP ÷ select</text>
  <text x="40" y="402" class="lbl">closed = 1</text>
  <text x="40" y="420" class="sml">0 parked · 1–5 = ÷1…÷16</text>
  <text x="40" y="436" class="sml">6–7 parked (all-open safe)</text>

  <!-- ============ LATCHES ============ -->
  <rect x="250" y="80" width="210" height="150" class="blk"/>
  <text x="266" y="104" class="tt">Mode &amp; source latches</text>
  <text x="266" y="126" class="sml">2 × NAND SR — radio behaviour,</text>
  <text x="266" y="141" class="sml">latch = debounce; source latch</text>
  <text x="266" y="156" class="sml">remembers last RUN flavour</text>
  <circle cx="272" cy="178" r="6" class="led"/><text x="284" y="182" class="lbl">STEP MODE</text>
  <circle cx="272" cy="198" r="6" class="led"/><text x="284" y="202" class="lbl">RUN 555</text>
  <circle cx="272" cy="218" r="6" class="led"/><text x="284" y="222" class="lbl">RUN XTAL</text>
  <text x="380" y="200" class="sml">power-up ⇒</text>
  <text x="380" y="214" class="sml">STEP MODE</text>
  <text x="380" y="228" class="sml">(RC preset)</text>

  <path class="wire" d="M194 150 H250" marker-end="url(#arr)"/>

  <!-- ============ 556 ============ -->
  <rect x="250" y="262" width="210" height="120" class="blk"/>
  <text x="266" y="286" class="tt">NE556</text>
  <rect x="266" y="298" width="178" height="34" class="sub"/>
  <text x="274" y="320" class="lbl">T1: Schmitt — NEXT CYCLE debounce</text>
  <rect x="266" y="338" width="178" height="34" class="sub"/>
  <text x="274" y="360" class="lbl">T2: astable ~3 Hz (trimmer)</text>

  <path class="wire" d="M194 202 H222 V314 H266" marker-end="url(#arr)"/>

  <!-- ============ CAN + DIVIDER ============ -->
  <rect x="250" y="410" width="210" height="118" class="blk"/>
  <text x="266" y="434" class="tt">XTAL source</text>
  <rect x="266" y="446" width="80" height="30" class="sub"/>
  <text x="274" y="466" class="lbl">can, ÷1 skt</text>
  <rect x="360" y="446" width="84" height="30" class="sub"/>
  <text x="368" y="466" class="lbl">'161 ÷2…÷16</text>
  <rect x="266" y="486" width="178" height="30" class="sub"/>
  <text x="274" y="506" class="lbl">'151 tap select (W = inv free)</text>
  <path class="wire" d="M346 461 H360" marker-end="url(#arr)"/>
  <path class="wire" d="M402 476 V486" marker-end="url(#arr)"/>
  <path class="wire" d="M194 412 H222 V501 H266" marker-end="url(#arr)"/>

  <!-- ============ MUX ============ -->
  <rect x="540" y="262" width="220" height="180" class="blk"/>
  <text x="556" y="286" class="tt">Glitch-free source mux</text>
  <text x="556" y="308" class="sml">'74 enable per domain, clocked on</text>
  <text x="556" y="323" class="sml">own source's falling edge; cross-</text>
  <text x="556" y="338" class="sml">qualified D-terms ⇒ break-before-</text>
  <text x="556" y="353" class="sml">make; no runt pulses, any timing</text>
  <text x="556" y="384" class="lbl">OSC = 555·ENA + XTAL·ENB</text>
  <circle cx="562" cy="412" r="6" class="led"/><text x="574" y="416" class="lbl">OSC (activity → CLK LED)</text>

  <path class="clkw" d="M460 355 H500 V330 H540" marker-end="url(#arrO)"/>
  <text x="470" y="348" class="sig">OSC555</text>
  <path class="clkw" d="M460 501 H500 V400 H540" marker-end="url(#arrO)"/>
  <text x="470" y="494" class="sig">OSCXTAL</text>
  <path class="wire" d="M460 130 H620 V262" marker-end="url(#arr)"/>
  <text x="600" y="124" class="ctl">SEL555 / SELXTAL</text>

  <!-- ============ SYNC CORE ============ -->
  <rect x="820" y="80" width="230" height="200" class="blk"/>
  <text x="836" y="104" class="tt">Sync core</text>
  <text x="836" y="126" class="sml">'273 (/MR = /RST): step-request</text>
  <text x="836" y="141" class="sml">sync + edge det ⇒ SP = exactly one</text>
  <text x="836" y="156" class="sml">OSC period; mode resample so</text>
  <text x="836" y="171" class="sml">gating changes between clocks</text>
  <text x="836" y="200" class="lbl">CLK_pre = OSC·SEL_RUN</text>
  <text x="908" y="216" class="lbl">+ SP·SEL_STEP</text>
  <text x="836" y="248" class="sml">one clock domain — everything</text>
  <text x="836" y="263" class="sml">on one edge of free-running /OSC</text>

  <path class="clkw" d="M760 352 H790 V180 H820" marker-end="url(#arrO)"/>
  <text x="770" y="344" class="sig">OSC</text>
  <path class="wire" d="M460 315 H520 V150 H700 V132 H820" marker-end="url(#arr)"/>
  <text x="690" y="146" class="ctl">step req (debounced)</text>
  <path class="wire" d="M460 160 H770 V160 H820" marker-end="url(#arr)"/>
  <text x="700" y="176" class="ctl">SEL_RUN / SEL_STEP</text>

  <!-- ============ HALT ============ -->
  <rect x="820" y="330" width="230" height="210" class="blk"/>
  <text x="836" y="354" class="tt">HALT</text>
  <text x="836" y="376" class="sml">'74 halt + request-last flops on</text>
  <text x="836" y="391" class="sml">free-running /OSC (samples while</text>
  <text x="836" y="406" class="sml">frozen). Entry = request rising</text>
  <text x="836" y="421" class="sml">edge only ⇒ stuck level can't jam</text>
  <text x="836" y="443" class="lbl">DHALT = ENTRY + HALT·KEEP</text>
  <text x="836" y="463" class="sml">clears: RUN · NEXT CYCLE (STEP</text>
  <text x="836" y="478" class="sml">MODE) · NEXT INSTR · RESET</text>
  <rect x="836" y="490" width="196" height="34" class="sub"/>
  <text x="844" y="512" class="lbl">ARM latch: NEXT INSTR ⇒ halt</text>
  <text x="844" y="524" class="sml">on next FETCH, self-disarming</text>
  <circle cx="1040" cy="354" r="6" class="led"/><text x="1006" y="374" class="lbl">HALT</text>

  <path class="wire" d="M194 234 H230 V560 H800 V507 H836" marker-end="url(#arr)"/>
  <text x="740" y="576" class="ctl">NEXT INSTR</text>

  <!-- ============ T COUNTER ============ -->
  <rect x="820" y="580" width="230" height="150" class="blk"/>
  <text x="836" y="604" class="tt">T counter + FETCH</text>
  <text x="836" y="626" class="sml">'161 on this board — THE T counter</text>
  <text x="836" y="641" class="sml">clock = CLK · reload on /TRST ·</text>
  <text x="836" y="656" class="sml">clear on /RST</text>
  <text x="836" y="678" class="lbl">FETCH = (T == 0)  — authoritative</text>
  <circle cx="850" cy="704" r="6" class="led"/>
  <circle cx="868" cy="704" r="6" class="led"/>
  <circle cx="886" cy="704" r="6" class="led"/>
  <circle cx="904" cy="704" r="6" class="led"/>
  <text x="918" y="708" class="lbl">T0–T3</text>

  <path class="wire" d="M932 730 V760 H700 V532 H820" marker-end="url(#arr)" transform="translate(0,0)"/>
  <text x="706" y="552" class="ctl">FETCH → INSTR match</text>

  <!-- ============ RESET ============ -->
  <rect x="540" y="600" width="200" height="130" class="blk"/>
  <text x="556" y="624" class="tt">Reset supervisor</text>
  <text x="556" y="646" class="sml">DS1813 + button: async assert,</text>
  <text x="556" y="661" class="sml">release synced through '273</text>
  <text x="556" y="683" class="lbl">clears: step pipe · T · HALT · ARM</text>
  <text x="556" y="701" class="lbl">never: mode/source · mux · osc</text>
  <circle cx="562" cy="718" r="6" class="led"/><text x="574" y="722" class="lbl">RESET</text>
  <path class="wire" d="M194 270 H222 V648 H540" marker-end="url(#arr)"/>
  <path class="rstw" d="M740 640 H796 V240 H820"/>
  <path class="rstw" d="M796 440 H820"/>
  <path class="rstw" d="M796 630 H820"/>
  <text x="756" y="632" class="rstt">/RST</text>

  <!-- ============ CLK CHAIN + PINS ============ -->
  <path class="clkw" d="M1050 200 H1090 V370 H1054" marker-end="url(#arrO)"/>
  <text x="1096" y="290" class="sig">CLK_pre</text>
  <path class="clkw" d="M1050 430 H1140" marker-end="url(#arrO)"/>
  <text x="1146" y="420" class="pin">CLK ▸</text>
  <text x="1146" y="436" class="sml">= CLK_pre·/HALT</text>
  <path class="clkw" d="M1090 430 V614 H1050" marker-end="url(#arrO)"/>

  <text x="1146" y="360" class="pin">HALT ▸</text>
  <path class="wire" d="M1050 356 H1140" marker-end="url(#arr)"/>

  <text x="1146" y="620" class="pin">T0–T3 ▸</text>
  <text x="1146" y="648" class="pin">FETCH ▸</text>
  <path class="wire" d="M1050 616 H1140" marker-end="url(#arr)"/>
  <path class="wire" d="M1050 644 H1140" marker-end="url(#arr)"/>

  <text x="1146" y="672" class="pin">◂ /TRST</text>
  <path class="wire" d="M1140 668 H1050" marker-end="url(#arr)"/>

  <text x="1146" y="470" class="pin">◂ /HALTREQ</text>
  <path class="wire" d="M1140 466 H1050" marker-end="url(#arr)"/>
  <text x="1146" y="486" class="sml">one line; combine</text>
  <text x="1146" y="500" class="sml">sources machine-side</text>

  <text x="746" y="666" class="pin">RST / /RST ▸</text>
  <path class="wire" d="M740 672 H744" opacity="0"/>

  <text x="24" y="806" class="sml">Pulled-up inputs: absent source = inert. Single-cycle machine: strap /TRST low ⇒ T = 0, FETCH always true, NEXT INSTR ≡ NEXT CYCLE.</text>
  <text x="24" y="824" class="sml">Granularity: NEXT CYCLE = one cycle · NEXT INSTR = one instruction · RUN = to next /HALTREQ. GND pin 1 on every header; VCC on power header only.</text>
</svg>
