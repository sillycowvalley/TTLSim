<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" font-family="Helvetica, Arial, sans-serif">
  <style>
    .w    { stroke:#222; stroke-width:1; fill:none; }
    .bus  { stroke:#222; stroke-width:3; fill:none; }
    .chip { fill:#ffffff; stroke:#222; stroke-width:1.5; }
    .conn { fill:#eef2fb; stroke:#222; stroke-width:1.5; }
    .conn2{ fill:#eafaf0; stroke:#222; stroke-width:1.5; }
    .vcc  { stroke:#c0392b; stroke-width:2; fill:none; }
    .gnd  { stroke:#2c3e50; stroke-width:2; fill:none; }
    .ref  { font-size:13px; font-weight:bold; fill:#111; }
    .part { font-size:11px; font-style:italic; fill:#555; }
    .pin  { font-size:11px; fill:#111; }
    .net  { font-size:11px; fill:#103a8c; }
    .dir  { font-size:10px; fill:#777; }
    .ttl  { font-size:22px; font-weight:bold; fill:#111; }
    .sub  { font-size:13px; fill:#555; }
    .note { font-size:11px; fill:#333; }
    .nlbl { font-size:11px; font-weight:bold; fill:#111; }
    text  { dominant-baseline:middle; }
  </style>

  <rect x="8" y="8" width="1184" height="844" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text class="ttl" x="28" y="40">Thumby — Register Module · stripboard backplane</text>
  <text class="sub" x="28" y="62">single-row headers · two bus headers on the long edge, 4-pin control on the short edge · one of 8 identical cards</text>

  <!-- BACKPLANE POWER STRIPS -->
  <line class="vcc" x1="230" y1="95" x2="930" y2="95"/>
  <text class="nlbl" x="936" y="95" fill="#c0392b">VCC strip</text>
  <line class="gnd" x1="230" y1="745" x2="930" y2="745"/>
  <text class="nlbl" x="936" y="745" fill="#2c3e50">GND strip</text>

  <!-- ===== J1  BUS-IN (long edge) ===== -->
  <rect class="conn" x="70" y="150" width="115" height="270"/>
  <text class="ref" x="127" y="172" text-anchor="middle">J1</text>
  <text class="part" x="127" y="189" text-anchor="middle">BUS-IN</text>
  <text class="part" x="127" y="203" text-anchor="middle">20-pin SIL</text>
  <text class="part" x="127" y="217" text-anchor="middle">(long edge)</text>
  <!-- VCC tap -->
  <line class="vcc" x1="185" y1="245" x2="210" y2="245"/>
  <line class="vcc" x1="210" y1="245" x2="210" y2="95"/>
  <line class="vcc" x1="210" y1="95" x2="230" y2="95"/>
  <text class="pin" x="216" y="245" fill="#c0392b">VCC</text>
  <!-- WD bus -->
  <line class="bus" x1="185" y1="285" x2="232" y2="285"/>
  <text class="nlbl" x="238" y="285">WD[15:0]</text><text class="dir" x="310" y="285">(in)</text>
  <!-- CLK -->
  <line class="w" x1="185" y1="320" x2="232" y2="320"/>
  <text class="net" x="238" y="320">CLK</text><text class="dir" x="274" y="320">(in)</text>
  <!-- RESET -->
  <line class="w" x1="185" y1="352" x2="228" y2="352"/>
  <text class="net" x="243" y="352">/RESET</text><text class="dir" x="299" y="352">(NC)</text>
  <line x1="225" y1="349" x2="231" y2="355" stroke="#c0392b" stroke-width="1.3"/>
  <line x1="231" y1="349" x2="225" y2="355" stroke="#c0392b" stroke-width="1.3"/>
  <!-- GND tap -->
  <line class="gnd" x1="185" y1="390" x2="210" y2="390"/>
  <line class="gnd" x1="210" y1="390" x2="210" y2="745"/>
  <line class="gnd" x1="210" y1="745" x2="230" y2="745"/>
  <text class="pin" x="216" y="390" fill="#2c3e50">GND</text>

  <!-- ===== J2  BUS-OUT (long edge) ===== -->
  <rect class="conn" x="70" y="470" width="115" height="160"/>
  <text class="ref" x="127" y="492" text-anchor="middle">J2</text>
  <text class="part" x="127" y="509" text-anchor="middle">BUS-OUT</text>
  <text class="part" x="127" y="523" text-anchor="middle">32-pin SIL</text>
  <text class="part" x="127" y="537" text-anchor="middle">(long edge)</text>
  <line class="bus" x1="185" y1="565" x2="232" y2="565"/>
  <text class="nlbl" x="238" y="565">A[15:0]</text><text class="dir" x="302" y="565">(out)</text>
  <line class="bus" x1="185" y1="600" x2="232" y2="600"/>
  <text class="nlbl" x="238" y="600">B[15:0]</text><text class="dir" x="302" y="600">(out)</text>

  <!-- ===== J3  CONTROL (short edge) ===== -->
  <rect class="conn2" x="985" y="250" width="100" height="220"/>
  <text class="ref" x="1035" y="272" text-anchor="middle">J3</text>
  <text class="part" x="1035" y="289" text-anchor="middle">CONTROL</text>
  <text class="part" x="1035" y="303" text-anchor="middle">4-pin SIL</text>
  <text class="part" x="1035" y="317" text-anchor="middle">(short edge)</text>
  <line class="w" x1="950" y1="350" x2="985" y2="350"/>
  <text class="net" x="944" y="350" text-anchor="end">/WE</text><text class="dir" x="990" y="350">(in)</text>
  <line class="w" x1="950" y1="385" x2="985" y2="385"/>
  <text class="net" x="944" y="385" text-anchor="end">/AEN</text><text class="dir" x="990" y="385">(in)</text>
  <line class="w" x1="950" y1="420" x2="985" y2="420"/>
  <text class="net" x="944" y="420" text-anchor="end">/BEN</text><text class="dir" x="990" y="420">(in)</text>
  <line class="gnd" x1="950" y1="455" x2="985" y2="455"/>
  <text class="net" x="944" y="455" text-anchor="end" fill="#2c3e50">GND</text><text class="dir" x="990" y="455">(local return)</text>

  <!-- ===== STORAGE U1 / U2 (74HC377) ===== -->
  <rect class="chip" x="395" y="200" width="150" height="110"/>
  <text class="ref" x="405" y="218">U1</text><text class="part" x="448" y="218">74HC377</text>
  <text class="part" x="470" y="300" text-anchor="middle">Register Lo</text>
  <line class="bus" x1="355" y1="235" x2="395" y2="235"/>
  <text class="pin" x="400" y="235">D[7:0]</text>
  <text class="nlbl" x="351" y="222" text-anchor="end">WD[7:0]</text>
  <line class="w" x1="360" y1="268" x2="395" y2="268"/>
  <text class="pin" x="400" y="268">CP</text><text class="net" x="356" y="268" text-anchor="end">CLK</text>
  <line class="w" x1="360" y1="293" x2="395" y2="293"/>
  <text class="pin" x="400" y="293">/E</text><text class="net" x="356" y="293" text-anchor="end">/WE</text>
  <line class="bus" x1="545" y1="235" x2="620" y2="235"/>
  <text class="pin" x="538" y="235" text-anchor="end">Q[7:0]</text>
  <line class="vcc" x1="470" y1="200" x2="470" y2="182"/><line class="vcc" x1="460" y1="182" x2="480" y2="182"/>
  <text class="pin" x="483" y="182" fill="#c0392b">VCC</text>
  <line class="gnd" x1="470" y1="310" x2="470" y2="328"/><line class="gnd" x1="462" y1="328" x2="478" y2="328"/><line class="gnd" x1="465" y1="333" x2="475" y2="333"/>
  <text class="pin" x="483" y="332" fill="#2c3e50">GND</text>

  <rect class="chip" x="395" y="370" width="150" height="110"/>
  <text class="ref" x="405" y="388">U2</text><text class="part" x="448" y="388">74HC377</text>
  <text class="part" x="470" y="470" text-anchor="middle">Register Hi</text>
  <line class="bus" x1="355" y1="405" x2="395" y2="405"/>
  <text class="pin" x="400" y="405">D[7:0]</text>
  <text class="nlbl" x="351" y="392" text-anchor="end">WD[15:8]</text>
  <line class="w" x1="360" y1="438" x2="395" y2="438"/>
  <text class="pin" x="400" y="438">CP</text><text class="net" x="356" y="438" text-anchor="end">CLK</text>
  <line class="w" x1="360" y1="463" x2="395" y2="463"/>
  <text class="pin" x="400" y="463">/E</text><text class="net" x="356" y="463" text-anchor="end">/WE</text>
  <line class="bus" x1="545" y1="405" x2="645" y2="405"/>
  <text class="pin" x="538" y="405" text-anchor="end">Q[15:8]</text>
  <line class="vcc" x1="470" y1="370" x2="470" y2="352"/><line class="vcc" x1="460" y1="352" x2="480" y2="352"/>
  <text class="pin" x="483" y="352" fill="#c0392b">VCC</text>
  <line class="gnd" x1="470" y1="480" x2="470" y2="498"/><line class="gnd" x1="462" y1="498" x2="478" y2="498"/><line class="gnd" x1="465" y1="503" x2="475" y2="503"/>
  <text class="pin" x="483" y="502" fill="#2c3e50">GND</text>

  <!-- internal Q buses -->
  <line class="bus" x1="620" y1="235" x2="620" y2="495"/>
  <line class="bus" x1="620" y1="235" x2="700" y2="235"/>
  <line class="bus" x1="620" y1="495" x2="700" y2="495"/>
  <text class="nlbl" x="592" y="222">Q[7:0]</text>
  <line class="bus" x1="645" y1="365" x2="645" y2="615"/>
  <line class="bus" x1="645" y1="365" x2="700" y2="365"/>
  <line class="bus" x1="645" y1="615" x2="700" y2="615"/>
  <text class="nlbl" x="652" y="392">Q[15:8]</text>
  <path class="bus" d="M641 495 Q645 489 649 495"/>

  <!-- ===== READ BUFFERS U3..U6 (74HC244) ===== -->
  <rect class="chip" x="700" y="200" width="140" height="95"/>
  <text class="ref" x="710" y="218">U3</text><text class="part" x="752" y="218">74HC244</text>
  <text class="part" x="770" y="283" text-anchor="middle">A-port Lo</text>
  <text class="pin" x="706" y="235">in Q[7:0]</text>
  <line class="w" x1="840" y1="262" x2="880" y2="262"/>
  <text class="net" x="884" y="262">/AEN</text>
  <text class="pin" x="836" y="262" text-anchor="end">/1OE,/2OE</text>
  <line class="bus" x1="840" y1="235" x2="900" y2="235"/>
  <text class="nlbl" x="906" y="235">A[7:0] → J2</text>
  <line class="vcc" x1="770" y1="200" x2="770" y2="182"/><line class="vcc" x1="760" y1="182" x2="780" y2="182"/>
  <text class="pin" x="783" y="182" fill="#c0392b">VCC</text>
  <line class="gnd" x1="770" y1="295" x2="770" y2="313"/><line class="gnd" x1="762" y1="313" x2="778" y2="313"/><line class="gnd" x1="765" y1="318" x2="775" y2="318"/>
  <text class="pin" x="783" y="312" fill="#2c3e50">GND</text>

  <rect class="chip" x="700" y="330" width="140" height="95"/>
  <text class="ref" x="710" y="348">U4</text><text class="part" x="752" y="348">74HC244</text>
  <text class="part" x="770" y="413" text-anchor="middle">A-port Hi</text>
  <text class="pin" x="706" y="365">in Q[15:8]</text>
  <line class="w" x1="840" y1="392" x2="880" y2="392"/>
  <text class="net" x="884" y="392">/AEN</text>
  <text class="pin" x="836" y="392" text-anchor="end">/1OE,/2OE</text>
  <line class="bus" x1="840" y1="365" x2="900" y2="365"/>
  <text class="nlbl" x="906" y="365">A[15:8] → J2</text>
  <line class="vcc" x1="770" y1="330" x2="770" y2="312"/><line class="vcc" x1="760" y1="312" x2="780" y2="312"/>
  <text class="pin" x="783" y="312" fill="#c0392b">VCC</text>
  <line class="gnd" x1="770" y1="425" x2="770" y2="443"/><line class="gnd" x1="762" y1="443" x2="778" y2="443"/><line class="gnd" x1="765" y1="448" x2="775" y2="448"/>
  <text class="pin" x="783" y="442" fill="#2c3e50">GND</text>

  <rect class="chip" x="700" y="460" width="140" height="95"/>
  <text class="ref" x="710" y="478">U5</text><text class="part" x="752" y="478">74HC244</text>
  <text class="part" x="770" y="543" text-anchor="middle">B-port Lo</text>
  <text class="pin" x="706" y="495">in Q[7:0]</text>
  <line class="w" x1="840" y1="522" x2="880" y2="522"/>
  <text class="net" x="884" y="522">/BEN</text>
  <text class="pin" x="836" y="522" text-anchor="end">/1OE,/2OE</text>
  <line class="bus" x1="840" y1="495" x2="900" y2="495"/>
  <text class="nlbl" x="906" y="495">B[7:0] → J2</text>
  <line class="vcc" x1="770" y1="460" x2="770" y2="442"/><line class="vcc" x1="760" y1="442" x2="780" y2="442"/>
  <text class="pin" x="783" y="442" fill="#c0392b">VCC</text>
  <line class="gnd" x1="770" y1="555" x2="770" y2="573"/><line class="gnd" x1="762" y1="573" x2="778" y2="573"/><line class="gnd" x1="765" y1="578" x2="775" y2="578"/>
  <text class="pin" x="783" y="572" fill="#2c3e50">GND</text>

  <rect class="chip" x="700" y="590" width="140" height="95"/>
  <text class="ref" x="710" y="608">U6</text><text class="part" x="752" y="608">74HC244</text>
  <text class="part" x="770" y="673" text-anchor="middle">B-port Hi</text>
  <text class="pin" x="706" y="615">in Q[15:8]</text>
  <line class="w" x1="840" y1="642" x2="880" y2="642"/>
  <text class="net" x="884" y="642">/BEN</text>
  <text class="pin" x="836" y="642" text-anchor="end">/1OE,/2OE</text>
  <line class="bus" x1="840" y1="615" x2="900" y2="615"/>
  <text class="nlbl" x="906" y="615">B[15:8] → J2</text>
  <line class="vcc" x1="770" y1="590" x2="770" y2="572"/><line class="vcc" x1="760" y1="572" x2="780" y2="572"/>
  <text class="pin" x="783" y="572" fill="#c0392b">VCC</text>
  <line class="gnd" x1="770" y1="685" x2="770" y2="703"/><line class="gnd" x1="762" y1="703" x2="778" y2="703"/><line class="gnd" x1="765" y1="708" x2="775" y2="708"/>
  <text class="pin" x="783" y="707" fill="#2c3e50">GND</text>

  <!-- ===== NOTES ===== -->
  <rect x="60" y="660" width="610" height="160" fill="#fbfbf7" stroke="#999" stroke-width="1"/>
  <text class="ref" x="72" y="680">Notes</text>
  <text class="note" x="72" y="700">Headers (all single-row SIL): J1 bus-in 20p (WD + CLK + /RESET + VCC + GND),</text>
  <text class="note" x="72" y="716">J2 read-bus 32p (A + B), J3 control 4p (/WE + /AEN + /BEN + GND).</text>
  <text class="note" x="72" y="736">VCC + GND are continuous backplane strips; card taps 1×VCC + 1×GND at J1.</text>
  <text class="note" x="72" y="752">J3 carries a local GND return for the enable lines. Power symbols at each IC = these nets.</text>
  <text class="note" x="72" y="772">'377: common CLK, /WE on /E (clock-enable, no clock gating). '244: /1OE+/2OE tied.</text>
  <text class="note" x="72" y="788">Enables /WE,/AEN,/BEN are point-to-point from central '138s (one-hot). /RESET unused here.</text>
  <text class="note" x="72" y="808">Stripboard: continuity-check every bus lane &amp; enable trace before populating sockets.</text>

  <!-- ===== PLACEMENT INSET ===== -->
  <rect x="700" y="700" width="475" height="142" fill="#f4f7fb" stroke="#999" stroke-width="1"/>
  <text class="ref" x="712" y="718">Board placement (orientation)</text>
  <!-- pcb outline -->
  <rect x="760" y="735" width="300" height="85" fill="#ffffff" stroke="#444" stroke-width="1.2"/>
  <!-- long edge bottom: J1 + J2 -->
  <rect x="775" y="815" width="120" height="9" fill="#cfe0fb" stroke="#456"/>
  <text class="note" x="835" y="833" text-anchor="middle">J1 + J2  (bus, long edge)</text>
  <rect x="915" y="815" width="120" height="9" fill="#cfe0fb" stroke="#456"/>
  <!-- short edge right: J3 -->
  <rect x="1056" y="752" width="9" height="52" fill="#cdeedd" stroke="#465"/>
  <text class="note" x="1075" y="745">J3 control</text>
  <text class="note" x="1075" y="800">(short edge)</text>
  <!-- chips inside -->
  <rect x="778" y="748" width="62" height="26" fill="#fff" stroke="#222"/>
  <text class="pin" x="809" y="761" text-anchor="middle">'377 ×2</text>
  <rect x="935" y="745" width="95" height="60" fill="#fff" stroke="#222"/>
  <text class="pin" x="982" y="763" text-anchor="middle">'244 ×4</text>
  <text class="note" x="982" y="778" text-anchor="middle">/OE → J3</text>
  <text class="note" x="982" y="792" text-anchor="middle">out ↓ J2</text>
  <!-- flow arrows -->
  <text class="dir" x="809" y="792" text-anchor="middle">WD ↓ J1</text>
</svg>
