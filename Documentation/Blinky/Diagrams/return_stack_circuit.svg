  <text x="84" y="372" class="pinlbl">Q3(QD)</text><text x="58" y="380" text-anchor="end" class="netlbl">R_ADDR3</text>
  <text x="84" y="401" class="pinlbl">GND</text><text x="58" y="409" text-anchor="end" class="netlbl">GND</text>
