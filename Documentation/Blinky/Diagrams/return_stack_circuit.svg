  <text x="36" y="40" class="title">Mini Blinky — Return-Stack Circuitry (W = 4)</text>
  <text x="36" y="60" class="subtitle">RSP '191 pointer · 2114 SRAM (16 deep) · RTOS = SRAM read at the RSP-addressed cell · RET-data-in mux · derived /CS, /WE strobes</text>

  <!-- GAL3 control tag -->
  <rect x="36" y="92" width="210" height="46" rx="5" fill="#eef4ff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="141" y="111" class="tblh" text-anchor="middle" fill="#1d4ed8">GAL3_POINTERS  (16V8)</text>
  <text x="141" y="127" class="tbl" text-anchor="middle" fill="#1d4ed8">RSP_EN p17 · RSP_UD p16 · RDIN_SEL p15</text>

  <!-- ===================== RSP '191 ===================== -->
  <rect x="80" y="180" width="150" height="252" rx="6" class="chip-cnt"/>
  <text x="155" y="300" class="cname">RSP</text>
  <text x="155" y="318" class="csub">74x191</text>
  <text x="155" y="334" class="csub">up/down counter</text>

  <!-- left pins 1..8 -->
