  <text x="84" y="227" class="pinlbl">Q1(QB)</text><text x="58" y="235" text-anchor="end" class="netlbl">R_ADDR1</text>
  <text x="84" y="256" class="pinlbl">Q0(QA)</text><text x="58" y="264" text-anchor="end" class="netlbl">R_ADDR0</text>
  <text x="84" y="285" class="pinlbl">/CTEN</text><text x="58" y="293" text-anchor="end" class="ctllbl">RSP_EN</text>
  <text x="84" y="314" class="pinlbl">D//U</text><text x="58" y="322" text-anchor="end" class="ctllbl">RSP_UD</text>
