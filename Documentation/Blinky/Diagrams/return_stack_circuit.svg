      .chip-mem { fill:#fdeede; stroke:#b45309; stroke-width:2; }
      .blk { fill:#f5f5f4; stroke:#57534e; stroke-width:1.4; stroke-dasharray:5 3; }
      .cname { font-size:14px; font-weight:700; fill:#0f172a; text-anchor:middle; }
      .csub { font-size:10.5px; font-weight:400; fill:#64748b; text-anchor:middle; }
      .pinlbl { font-size:10.5px; fill:#334155; }
      .pinnum { font-size:8.5px; font-style:italic; fill:#94a3b8; }
      .net { stroke:#475569; stroke-width:1.4; fill:none; }
      .netbus { stroke:#475569; stroke-width:3; fill:none; }
      .ctl { stroke:#1d4ed8; stroke-width:1.4; fill:none; }
      .stub { stroke:#64748b; stroke-width:1.1; }
      .netlbl { font-size:10px; fill:#334155; }
      .ctllbl { font-size:10px; fill:#1d4ed8; font-weight:600; }
      .pwrlbl { font-size:9.5px; fill:#94a3b8; }
      .note { font-size:10.5px; fill:#475569; }
