<svg viewBox="0 0 1040 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg     { fill:#fafaf7; }
    .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
    .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
    .title  { fill:#1f2933; font-size:32px; font-weight:700; }
    .sub    { fill:#52606d; font-size:15px; }
    .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
    .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
    .sig    { font-size:13px; font-weight:700; }
    .green  { fill:#2e7d32 !important; }
    .blue   { fill:#1565c0 !important; }
    .orange { fill:#e65100 !important; }
    .purple { fill:#7b1fa2 !important; }
    .red    { fill:#c62828 !important; }
    .slate  { fill:#37474f !important; }
    .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
    .small  { fill:#52606d; font-size:11px; }
    .tbl    { fill:#1f2933; font-size:13px; }
    .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
    .note   { fill:#3e4c59; font-size:13px; }
    .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
    .grid   { stroke:#cbd2d9; stroke-width:1; }
  </style>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="48">74HC74</text>
  <text class="sub" x="40" y="74">Dual Positive-Edge D Flip-Flop, Async Preset &amp; Clear  &#183;  DIP-14  &#183;  two independent halves</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ PINOUT (name inside, number outside) ============ -->
  <text class="panel" x="185" y="116">PINOUT &#183; top view</text>

  <rect class="body" x="185" y="150" width="110" height="330"/>
  <path class="thin" d="M 223 150 A 17 17 0 0 0 257 150"/>

  <!-- left pins 1-7 -->
  <line class="thin" x1="155" y1="190" x2="185" y2="190"/>
  <text class="pinno" x="150" y="194" text-anchor="end">1</text>
  <text class="sig orange" x="192" y="194">A&#x305;C&#x305;L&#x305;R&#x305;</text>

  <line class="thin" x1="155" y1="234" x2="185" y2="234"/>
  <text class="pinno" x="150" y="238" text-anchor="end">2</text>
  <text class="sig green" x="192" y="238">AD</text>

  <line class="thin" x1="155" y1="278" x2="185" y2="278"/>
  <text class="pinno" x="150" y="282" text-anchor="end">3</text>
  <text class="sig orange" x="192" y="282">ACLK</text>

  <line class="thin" x1="155" y1="322" x2="185" y2="322"/>
  <text class="pinno" x="150" y="326" text-anchor="end">4</text>
  <text class="sig orange" x="192" y="326">A&#x305;P&#x305;R&#x305;E&#x305;</text>

  <line class="thin" x1="155" y1="366" x2="185" y2="366"/>
  <text class="pinno" x="150" y="370" text-anchor="end">5</text>
  <text class="sig purple" x="192" y="370">AQ</text>

  <line class="thin" x1="155" y1="410" x2="185" y2="410"/>
  <text class="pinno" x="150" y="414" text-anchor="end">6</text>
  <text class="sig purple" x="192" y="414">A&#x305;Q&#x305;</text>

  <line class="thin" x1="155" y1="454" x2="185" y2="454"/>
  <text class="pinno" x="150" y="458" text-anchor="end">7</text>
  <text class="sig slate" x="192" y="458">GND</text>

  <!-- right pins 14-8 -->
  <line class="thin" x1="295" y1="190" x2="325" y2="190"/>
  <text class="pinno" x="330" y="194">14</text>
  <text class="sig red" x="288" y="194" text-anchor="end">VCC</text>

  <line class="thin" x1="295" y1="234" x2="325" y2="234"/>
  <text class="pinno" x="330" y="238">13</text>
  <text class="sig orange" x="288" y="238" text-anchor="end">B&#x305;C&#x305;L&#x305;R&#x305;</text>

  <line class="thin" x1="295" y1="278" x2="325" y2="278"/>
  <text class="pinno" x="330" y="282">12</text>
  <text class="sig green" x="288" y="282" text-anchor="end">BD</text>

  <line class="thin" x1="295" y1="322" x2="325" y2="322"/>
  <text class="pinno" x="330" y="326">11</text>
  <text class="sig orange" x="288" y="326" text-anchor="end">BCLK</text>

  <line class="thin" x1="295" y1="366" x2="325" y2="366"/>
  <text class="pinno" x="330" y="370">10</text>
  <text class="sig orange" x="288" y="370" text-anchor="end">B&#x305;P&#x305;R&#x305;E&#x305;</text>

  <line class="thin" x1="295" y1="410" x2="325" y2="410"/>
  <text class="pinno" x="330" y="414">9</text>
  <text class="sig purple" x="288" y="414" text-anchor="end">BQ</text>

  <line class="thin" x1="295" y1="454" x2="325" y2="454"/>
  <text class="pinno" x="330" y="458">8</text>
  <text class="sig purple" x="288" y="458" text-anchor="end">B&#x305;Q&#x305;</text>

  <!-- ============ SCHEMATIC SYMBOL (name outside, number inside) ============ -->
  <text class="panel" x="630" y="120">SCHEMATIC SYMBOL</text>

  <!-- VCC/GND note -->
  <text class="small" x="812" y="350"><tspan class="red">VCC</tspan> = pin 14</text>
  <text class="small" x="812" y="366"><tspan class="slate">GND</tspan> = pin 7</text>

  <!-- FF A -->
  <rect class="body" x="665" y="155" width="120" height="120"/>
  <text class="lbl" x="725" y="219" text-anchor="middle">D-FF A</text>

  <!-- AD -->
  <line class="thin" x1="625" y1="190" x2="665" y2="190"/>
  <text class="lbl green" x="620" y="194" text-anchor="end">AD</text>
  <text class="pinno" x="671" y="194">2</text>
  <!-- ACLK (clock triangle) -->
  <line class="thin" x1="625" y1="240" x2="665" y2="240"/>
  <polyline class="thin" points="665,233 678,240 665,247"/>
  <text class="lbl orange" x="620" y="244" text-anchor="end">ACLK</text>
  <text class="pinno" x="683" y="244">3</text>
  <!-- APRE (top, bubble = active-low) -->
  <line class="thin" x1="725" y1="120" x2="725" y2="143"/>
  <circle cx="725" cy="149" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="725" y="116" text-anchor="middle">A&#x305;P&#x305;R&#x305;E&#x305;</text>
  <text class="pinno" x="725" y="171" text-anchor="middle">4</text>
  <!-- ACLR (bottom, bubble = active-low) -->
  <line class="thin" x1="725" y1="287" x2="725" y2="315"/>
  <circle cx="725" cy="281" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="725" y="330" text-anchor="middle">A&#x305;C&#x305;L&#x305;R&#x305;</text>
  <text class="pinno" x="725" y="265" text-anchor="middle">1</text>
  <!-- AQ -->
  <line class="thin" x1="785" y1="190" x2="825" y2="190"/>
  <text class="lbl purple" x="830" y="194">AQ</text>
  <text class="pinno" x="779" y="194" text-anchor="end">5</text>
  <!-- AQ complement (bubble) -->
  <line class="thin" x1="797" y1="240" x2="825" y2="240"/>
  <circle cx="791" cy="240" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="830" y="244">A&#x305;Q&#x305;</text>
  <text class="pinno" x="779" y="244" text-anchor="end">6</text>

  <!-- FF B -->
  <rect class="body" x="665" y="405" width="120" height="120"/>
  <text class="lbl" x="725" y="469" text-anchor="middle">D-FF B</text>

  <!-- BD -->
  <line class="thin" x1="625" y1="440" x2="665" y2="440"/>
  <text class="lbl green" x="620" y="444" text-anchor="end">BD</text>
  <text class="pinno" x="671" y="444">12</text>
  <!-- BCLK (clock triangle) -->
  <line class="thin" x1="625" y1="490" x2="665" y2="490"/>
  <polyline class="thin" points="665,483 678,490 665,497"/>
  <text class="lbl orange" x="620" y="494" text-anchor="end">BCLK</text>
  <text class="pinno" x="683" y="494">11</text>
  <!-- BPRE (top, bubble = active-low) -->
  <line class="thin" x1="725" y1="372" x2="725" y2="393"/>
  <circle cx="725" cy="399" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="725" y="368" text-anchor="middle">B&#x305;P&#x305;R&#x305;E&#x305;</text>
  <text class="pinno" x="725" y="421" text-anchor="middle">10</text>
  <!-- BCLR (bottom, bubble = active-low) -->
  <line class="thin" x1="725" y1="537" x2="725" y2="565"/>
  <circle cx="725" cy="531" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="725" y="580" text-anchor="middle">B&#x305;C&#x305;L&#x305;R&#x305;</text>
  <text class="pinno" x="725" y="515" text-anchor="middle">13</text>
  <!-- BQ -->
  <line class="thin" x1="785" y1="440" x2="825" y2="440"/>
  <text class="lbl purple" x="830" y="444">BQ</text>
  <text class="pinno" x="779" y="444" text-anchor="end">9</text>
  <!-- BQ complement (bubble) -->
  <line class="thin" x1="797" y1="490" x2="825" y2="490"/>
  <circle cx="791" cy="490" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="830" y="494">B&#x305;Q&#x305;</text>
  <text class="pinno" x="779" y="494" text-anchor="end">8</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">HOW IT WORKS</text>
  <text class="note" x="40" y="638">Two independent positive-edge D flip-flops, A and B.</text>
  <text class="note" x="40" y="658">On the rising edge of its clock, each <tspan class="purple">Q</tspan> takes <tspan class="green">D</tspan>;</text>
  <text class="note" x="40" y="678"><tspan class="purple">Q&#x305;</tspan> is the complement.</text>
  <text class="note" x="40" y="698"><tspan class="orange">P&#x305;R&#x305;E&#x305;</tspan> and <tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan> are asynchronous, active-LOW:</text>
  <text class="note" x="40" y="718">pull <tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan> LOW to force Q=0, <tspan class="orange">P&#x305;R&#x305;E&#x305;</tspan> LOW for Q=1 &#8212;</text>
  <text class="note" x="40" y="738">both override the clock.</text>
  <text class="note" x="40" y="758">Asserting both at once is illegal &#8212; the part</text>
  <text class="note" x="40" y="778">drives both outputs HIGH; normal use avoids it.</text>
  <text class="note" x="40" y="798">Clock one half from an inverted clock to get a</text>
  <text class="note" x="40" y="818">negative-edge FF &#8212; the basis of clean clock gating.</text>

  <!-- ============ FUNCTION TABLE (half A; B identical) ============ -->
  <rect x="395" y="620" width="405" height="30" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="395" y="650" width="405" height="126" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="462" y1="620" x2="462" y2="776"/>
  <line class="grid" x1="530" y1="620" x2="530" y2="776"/>
  <line class="grid" x1="597" y1="620" x2="597" y2="776"/>
  <line class="grid" x1="665" y1="620" x2="665" y2="776"/>
  <line class="grid" x1="732" y1="620" x2="732" y2="776"/>
  <line class="grid" x1="395" y1="671" x2="800" y2="671"/>
  <line class="grid" x1="395" y1="692" x2="800" y2="692"/>
  <line class="grid" x1="395" y1="713" x2="800" y2="713"/>
  <line class="grid" x1="395" y1="734" x2="800" y2="734"/>
  <line class="grid" x1="395" y1="755" x2="800" y2="755"/>

  <text class="tblh orange" x="428" y="640" text-anchor="middle">A&#x305;P&#x305;R&#x305;E&#x305;</text>
  <text class="tblh orange" x="496" y="640" text-anchor="middle">A&#x305;C&#x305;L&#x305;R&#x305;</text>
  <text class="tblh orange" x="563" y="640" text-anchor="middle">ACLK</text>
  <text class="tblh green"  x="631" y="640" text-anchor="middle">AD</text>
  <text class="tblh purple" x="698" y="640" text-anchor="middle">AQ</text>
  <text class="tblh purple" x="766" y="640" text-anchor="middle">A&#x305;Q&#x305;</text>

  <text class="tbl" x="428" y="665" text-anchor="middle">L</text>
  <text class="tbl" x="496" y="665" text-anchor="middle">H</text>
  <text class="tbl" x="563" y="665" text-anchor="middle">X</text>
  <text class="tbl" x="631" y="665" text-anchor="middle">X</text>
  <text class="tbl" x="698" y="665" text-anchor="middle">H</text>
  <text class="tbl" x="766" y="665" text-anchor="middle">L</text>

  <text class="tbl" x="428" y="686" text-anchor="middle">H</text>
  <text class="tbl" x="496" y="686" text-anchor="middle">L</text>
  <text class="tbl" x="563" y="686" text-anchor="middle">X</text>
  <text class="tbl" x="631" y="686" text-anchor="middle">X</text>
  <text class="tbl" x="698" y="686" text-anchor="middle">L</text>
  <text class="tbl" x="766" y="686" text-anchor="middle">H</text>

  <text class="tbl" x="428" y="707" text-anchor="middle">H</text>
  <text class="tbl" x="496" y="707" text-anchor="middle">H</text>
  <text class="tbl" x="563" y="707" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="631" y="707" text-anchor="middle">H</text>
  <text class="tbl" x="698" y="707" text-anchor="middle">H</text>
  <text class="tbl" x="766" y="707" text-anchor="middle">L</text>

  <text class="tbl" x="428" y="728" text-anchor="middle">H</text>
  <text class="tbl" x="496" y="728" text-anchor="middle">H</text>
  <text class="tbl" x="563" y="728" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="631" y="728" text-anchor="middle">L</text>
  <text class="tbl" x="698" y="728" text-anchor="middle">L</text>
  <text class="tbl" x="766" y="728" text-anchor="middle">H</text>

  <text class="tbl" x="428" y="749" text-anchor="middle">H</text>
  <text class="tbl" x="496" y="749" text-anchor="middle">H</text>
  <text class="tbl" x="563" y="749" text-anchor="middle">&#8212;</text>
  <text class="tbl" x="631" y="749" text-anchor="middle">X</text>
  <text class="tbl" x="698" y="749" text-anchor="middle">Q&#8320;</text>
  <text class="tbl" x="766" y="749" text-anchor="middle">Q&#x305;&#8320;</text>

  <text class="tbl" x="428" y="770" text-anchor="middle">L</text>
  <text class="tbl" x="496" y="770" text-anchor="middle">L</text>
  <text class="tbl" x="563" y="770" text-anchor="middle">X</text>
  <text class="tbl" x="631" y="770" text-anchor="middle">X</text>
  <text class="tbl" x="698" y="770" text-anchor="middle">H</text>
  <text class="tbl" x="766" y="770" text-anchor="middle">H</text>

  <text class="small" x="395" y="794">&#8593; rising edge &#183; &#8212; no edge (hold; Q&#8320; = previous) &#183; X don&#39;t-care. Preset/clear are async, overriding the clock.</text>
  <text class="small" x="395" y="810">Last row is the illegal state (both outputs H). Half B is identical: BD, BCLK, B&#x305;P&#x305;R&#x305;E&#x305;, B&#x305;C&#x305;L&#x305;R&#x305;, BQ, B&#x305;Q&#x305;.</text>

  <!-- ============ COLOUR KEY ============ -->
  <text class="noteh" x="830" y="612">COLOUR KEY</text>

  <rect x="830" y="626" width="16" height="16" fill="#2e7d32"/>
  <text class="small" x="854" y="638">Data inputs &#8212; <tspan class="green">AD, BD</tspan></text>

  <rect x="830" y="658" width="16" height="16" fill="#7b1fa2"/>
  <text class="small" x="854" y="670">Outputs &#8212; <tspan class="purple">AQ A&#x305;Q&#x305; BQ B&#x305;Q&#x305;</tspan></text>

  <rect x="830" y="690" width="16" height="16" fill="#e65100"/>
  <text class="small" x="854" y="702">Controls &#8212; <tspan class="orange">ACLK BCLK, P&#x305;R&#x305;E&#x305; C&#x305;L&#x305;R&#x305;</tspan></text>

  <rect x="830" y="722" width="16" height="16" fill="#c62828"/>
  <text class="small" x="854" y="734"><tspan class="red">VCC</tspan> &#8212; pin 14</text>

  <rect x="830" y="754" width="16" height="16" fill="#37474f"/>
  <text class="small" x="854" y="766"><tspan class="slate">GND</tspan> &#8212; pin 7</text>
</svg>
