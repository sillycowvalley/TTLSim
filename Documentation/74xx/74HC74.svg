  <text class="small" x="745" y="568" text-anchor="middle"><tspan class="red">VCC</tspan> = pin 14  ·  <tspan class="slate">GND</tspan> = pin 7</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">How it works</text>
  <text class="note" x="40" y="638">Two independent positive-edge D flip-flops in one package, named</text>
  <text class="note" x="40" y="658">here as halves <tspan class="purple">A</tspan> and <tspan class="purple">B</tspan>. On each rising edge of <tspan class="orange">CLK</tspan>, input <tspan class="green">D</tspan> is</text>
  <text class="note" x="40" y="678">captured to <tspan class="purple">Q</tspan>; the complement appears on <tspan class="purple">Q&#x305;</tspan>.</text>
  <text class="note" x="40" y="698"><tspan class="orange">P&#x305;R&#x305;E&#x305;</tspan> and <tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan> are asynchronous and active-low; they override the</text>
  <text class="note" x="40" y="718">clock. <tspan class="orange">P&#x305;R&#x305;E&#x305;</tspan> low forces <tspan class="purple">Q</tspan> = H, <tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan> low forces <tspan class="purple">Q</tspan> = L.</text>
  <text class="note" x="40" y="738">Holding both low at once is not a normal state — both <tspan class="purple">Q</tspan> and <tspan class="purple">Q&#x305;</tspan></text>
  <text class="note" x="40" y="758">go H and the part is no longer complementary, so avoid it.</text>
  <text class="note" x="40" y="778">For a divide-by-two, tie <tspan class="green">D</tspan> to <tspan class="purple">Q&#x305;</tspan> and clock the flip-flop.</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <text class="panel" x="400" y="612">FUNCTION TABLE  ·  per flip-flop</text>
  <rect x="400" y="622" width="380" height="24" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="400" y="622" width="380" height="162" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="463" y1="622" x2="463" y2="784"/>
  <line class="grid" x1="527" y1="622" x2="527" y2="784"/>
  <line class="grid" x1="590" y1="622" x2="590" y2="784"/>
  <line class="grid" x1="653" y1="622" x2="653" y2="784"/>
  <line class="grid" x1="717" y1="622" x2="717" y2="784"/>
  <line class="grid" x1="400" y1="646" x2="780" y2="646"/>
  <line class="grid" x1="400" y1="669" x2="780" y2="669"/>
  <line class="grid" x1="400" y1="692" x2="780" y2="692"/>
  <line class="grid" x1="400" y1="715" x2="780" y2="715"/>
  <line class="grid" x1="400" y1="738" x2="780" y2="738"/>
  <line class="grid" x1="400" y1="761" x2="780" y2="761"/>

  <text class="tblh orange" x="431" y="639" text-anchor="middle">P&#x305;R&#x305;E&#x305;</text>
  <text class="tblh orange" x="495" y="639" text-anchor="middle">C&#x305;L&#x305;R&#x305;</text>
  <text class="tblh orange" x="558" y="639" text-anchor="middle">CLK</text>
  <text class="tblh green"  x="621" y="639" text-anchor="middle">D</text>
  <text class="tblh purple" x="685" y="639" text-anchor="middle">Q</text>
  <text class="tblh purple" x="748" y="639" text-anchor="middle">Q&#x305;</text>

  <g>
    <text class="tbl" x="431" y="662" text-anchor="middle">L</text><text class="tbl" x="495" y="662" text-anchor="middle">H</text><text class="tbl" x="558" y="662" text-anchor="middle">X</text><text class="tbl" x="621" y="662" text-anchor="middle">X</text><text class="tbl" x="685" y="662" text-anchor="middle">H</text><text class="tbl" x="748" y="662" text-anchor="middle">L</text>
    <text class="tbl" x="431" y="685" text-anchor="middle">H</text><text class="tbl" x="495" y="685" text-anchor="middle">L</text><text class="tbl" x="558" y="685" text-anchor="middle">X</text><text class="tbl" x="621" y="685" text-anchor="middle">X</text><text class="tbl" x="685" y="685" text-anchor="middle">L</text><text class="tbl" x="748" y="685" text-anchor="middle">H</text>
    <text class="tbl" x="431" y="708" text-anchor="middle">L</text><text class="tbl" x="495" y="708" text-anchor="middle">L</text><text class="tbl" x="558" y="708" text-anchor="middle">X</text><text class="tbl" x="621" y="708" text-anchor="middle">X</text><text class="tbl" x="685" y="708" text-anchor="middle">H*</text><text class="tbl" x="748" y="708" text-anchor="middle">H*</text>
    <text class="tbl" x="431" y="731" text-anchor="middle">H</text><text class="tbl" x="495" y="731" text-anchor="middle">H</text><text class="tbl" x="558" y="731" text-anchor="middle">↑</text><text class="tbl" x="621" y="731" text-anchor="middle">H</text><text class="tbl" x="685" y="731" text-anchor="middle">H</text><text class="tbl" x="748" y="731" text-anchor="middle">L</text>
    <text class="tbl" x="431" y="754" text-anchor="middle">H</text><text class="tbl" x="495" y="754" text-anchor="middle">H</text><text class="tbl" x="558" y="754" text-anchor="middle">↑</text><text class="tbl" x="621" y="754" text-anchor="middle">L</text><text class="tbl" x="685" y="754" text-anchor="middle">L</text><text class="tbl" x="748" y="754" text-anchor="middle">H</text>
    <text class="tbl" x="431" y="777" text-anchor="middle">H</text><text class="tbl" x="495" y="777" text-anchor="middle">H</text><text class="tbl" x="558" y="777" text-anchor="middle">L</text><text class="tbl" x="621" y="777" text-anchor="middle">X</text><text class="tbl" x="685" y="777" text-anchor="middle">Q₀</text><text class="tbl" x="748" y="777" text-anchor="middle">Q&#x305;₀</text>
  </g>

  <text class="small" x="400" y="804">↑ = rising edge · Q₀ = previous state · * both low is non-standard (Q and Q&#x305; both H, not complementary).</text>

