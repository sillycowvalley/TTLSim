<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .bg     { fill:#fafaf7; }
      .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
      .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
      .title  { fill:#1f2933; font-size:32px; font-weight:700; }
      .sub    { fill:#52606d; font-size:15px; }
      .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
      .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
      .sig    { font-size:13px; font-weight:700; }
      .green  { fill:#2e7d32 !important; }
      .blue   { fill:#1565c0 !important; }
      .orange { fill:#e65100 !important; }
      .purple { fill:#7b1fa2 !important; }
      .red    { fill:#c62828 !important; }
      .slate  { fill:#37474f !important; }
      .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
      .small  { fill:#52606d; font-size:11px; }
      .tbl    { fill:#1f2933; font-size:13px; }
      .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
      .note   { fill:#3e4c59; font-size:13px; }
      .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
      .grid   { stroke:#cbd2d9; stroke-width:1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- Title -->
  <text class="title" x="40" y="46">74HC151</text>
  <text class="sub"   x="40" y="72">8-Line to 1-Line Multiplexer / Data Selector  ·  DIP-16  ·  combinational (no clock)</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ LEFT: PINOUT ============ -->
  <text class="panel" x="60" y="118">PINOUT  (top view, notch up)</text>

  <rect class="body" x="175" y="150" width="120" height="380" rx="4"/>
  <path class="thin" d="M 218 150 A 17 17 0 0 0 252 150" fill="#fafaf7"/>

  <!-- LEFT PINS 1-8 -->
  <line class="thin" x1="175" y1="178" x2="153" y2="178"/><text class="pinno" x="148" y="182" text-anchor="end">1</text><text class="sig green" x="186" y="182">D3</text>
  <line class="thin" x1="175" y1="223" x2="153" y2="223"/><text class="pinno" x="148" y="227" text-anchor="end">2</text><text class="sig green" x="186" y="227">D2</text>
  <line class="thin" x1="175" y1="268" x2="153" y2="268"/><text class="pinno" x="148" y="272" text-anchor="end">3</text><text class="sig green" x="186" y="272">D1</text>
  <line class="thin" x1="175" y1="313" x2="153" y2="313"/><text class="pinno" x="148" y="317" text-anchor="end">4</text><text class="sig green" x="186" y="317">D0</text>
  <line class="thin" x1="175" y1="358" x2="153" y2="358"/><text class="pinno" x="148" y="362" text-anchor="end">5</text><text class="sig purple" x="186" y="362">Y</text>
  <line class="thin" x1="175" y1="403" x2="153" y2="403"/><text class="pinno" x="148" y="407" text-anchor="end">6</text><text class="sig purple" x="186" y="407">W</text>
  <line class="thin" x1="175" y1="448" x2="153" y2="448"/><text class="pinno" x="148" y="452" text-anchor="end">7</text><text class="sig orange" x="186" y="452">E&#x305;</text>
  <line class="thin" x1="175" y1="493" x2="153" y2="493"/><text class="pinno" x="148" y="497" text-anchor="end">8</text><text class="sig slate" x="186" y="497">GND</text>

  <!-- RIGHT PINS 16-9 -->
  <line class="thin" x1="295" y1="178" x2="317" y2="178"/><text class="pinno" x="322" y="182">16</text><text class="sig red" x="284" y="182" text-anchor="end">VCC</text>
  <line class="thin" x1="295" y1="223" x2="317" y2="223"/><text class="pinno" x="322" y="227">15</text><text class="sig green" x="284" y="227" text-anchor="end">D4</text>
  <line class="thin" x1="295" y1="268" x2="317" y2="268"/><text class="pinno" x="322" y="272">14</text><text class="sig green" x="284" y="272" text-anchor="end">D5</text>
  <line class="thin" x1="295" y1="313" x2="317" y2="313"/><text class="pinno" x="322" y="317">13</text><text class="sig green" x="284" y="317" text-anchor="end">D6</text>
  <line class="thin" x1="295" y1="358" x2="317" y2="358"/><text class="pinno" x="322" y="362">12</text><text class="sig green" x="284" y="362" text-anchor="end">D7</text>
  <line class="thin" x1="295" y1="403" x2="317" y2="403"/><text class="pinno" x="322" y="407">11</text><text class="sig blue" x="284" y="407" text-anchor="end">S0</text>
  <line class="thin" x1="295" y1="448" x2="317" y2="448"/><text class="pinno" x="322" y="452">10</text><text class="sig blue" x="284" y="452" text-anchor="end">S1</text>
  <line class="thin" x1="295" y1="493" x2="317" y2="493"/><text class="pinno" x="322" y="497">9</text><text class="sig blue" x="284" y="497" text-anchor="end">S2</text>

  <!-- ============ RIGHT: SYMBOL ============ -->
  <text class="panel" x="440" y="118">SCHEMATIC SYMBOL</text>

  <path class="body" d="M 620 160 L 820 240 L 820 400 L 620 480 Z"/>
  <text x="690" y="320" class="lbl" font-size="20">MUX</text>
  <text x="690" y="344" class="small" font-size="14">8 : 1</text>

  <!-- data inputs D0..D7 -->
  <line class="thin" x1="560" y1="180" x2="620" y2="180"/><text class="lbl green" x="554" y="184" text-anchor="end">D0</text><text class="pinno" x="624" y="176">4</text>
  <line class="thin" x1="560" y1="220" x2="620" y2="220"/><text class="lbl green" x="554" y="224" text-anchor="end">D1</text><text class="pinno" x="624" y="216">3</text>
  <line class="thin" x1="560" y1="260" x2="620" y2="260"/><text class="lbl green" x="554" y="264" text-anchor="end">D2</text><text class="pinno" x="624" y="256">2</text>
  <line class="thin" x1="560" y1="300" x2="620" y2="300"/><text class="lbl green" x="554" y="304" text-anchor="end">D3</text><text class="pinno" x="624" y="296">1</text>
  <line class="thin" x1="560" y1="340" x2="620" y2="340"/><text class="lbl green" x="554" y="344" text-anchor="end">D4</text><text class="pinno" x="624" y="336">15</text>
  <line class="thin" x1="560" y1="380" x2="620" y2="380"/><text class="lbl green" x="554" y="384" text-anchor="end">D5</text><text class="pinno" x="624" y="376">14</text>
  <line class="thin" x1="560" y1="420" x2="620" y2="420"/><text class="lbl green" x="554" y="424" text-anchor="end">D6</text><text class="pinno" x="624" y="416">13</text>
  <line class="thin" x1="560" y1="460" x2="620" y2="460"/><text class="lbl green" x="554" y="464" text-anchor="end">D7</text><text class="pinno" x="624" y="456">12</text>

  <!-- enable E (active low) -->
  <line class="thin" x1="660" y1="110" x2="660" y2="170"/>
  <circle cx="660" cy="176" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.4"/>
  <text class="lbl orange" x="660" y="104" text-anchor="middle">E&#x305;</text>
  <text class="small orange" x="660" y="120" text-anchor="middle">7</text>

  <!-- select inputs -->
  <line class="thin" x1="660" y1="560" x2="660" y2="464"/>
  <line class="thin" x1="700" y1="560" x2="700" y2="448"/>
  <line class="thin" x1="740" y1="560" x2="740" y2="432"/>
  <text class="lbl blue" x="660" y="578" text-anchor="middle">S0</text>
  <text class="lbl blue" x="700" y="578" text-anchor="middle">S1</text>
  <text class="lbl blue" x="740" y="578" text-anchor="middle">S2</text>
  <text class="small" x="700" y="595" text-anchor="middle">select  (<tspan class="blue">S2 S1 S0</tspan> = 0..7)</text>

  <!-- outputs -->
  <line class="thin" x1="820" y1="290" x2="900" y2="290"/><text class="lbl purple" x="908" y="294">Y</text><text class="pinno" x="816" y="284" text-anchor="end">5</text>
  <circle cx="826" cy="350" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.4"/>
  <line class="thin" x1="832" y1="350" x2="900" y2="350"/><text class="lbl purple" x="908" y="354">W = Y&#x305;</text><text class="pinno" x="816" y="344" text-anchor="end">6</text>

  <text class="small" x="720" y="135" text-anchor="middle"><tspan class="red">VCC</tspan> = pin 16   ·   <tspan class="slate">GND</tspan> = pin 8</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <text class="panel" x="360" y="630">FUNCTION TABLE</text>

  <rect x="360" y="640" width="320" height="24" fill="#eef1f4" stroke="#cbd2d9"/>
  <rect x="360" y="640" width="320" height="186" fill="none" stroke="#9aa5b1" stroke-width="1.4"/>
  <line class="grid" x1="424" y1="640" x2="424" y2="826"/>
  <line class="grid" x1="488" y1="640" x2="488" y2="826"/>
  <line class="grid" x1="552" y1="640" x2="552" y2="826"/>
  <line class="grid" x1="616" y1="640" x2="616" y2="826"/>
  <text class="tblh orange" x="392" y="657" text-anchor="middle">E&#x305;</text>
  <text class="tblh blue"   x="456" y="657" text-anchor="middle">S2</text>
  <text class="tblh blue"   x="520" y="657" text-anchor="middle">S1</text>
  <text class="tblh blue"   x="584" y="657" text-anchor="middle">S0</text>
  <text class="tblh purple" x="648" y="657" text-anchor="middle">Y</text>
  <line class="grid" x1="360" y1="664" x2="680" y2="664"/>

  <text class="tbl" x="392" y="681" text-anchor="middle">H</text><text class="tbl" x="456" y="681" text-anchor="middle">X</text><text class="tbl" x="520" y="681" text-anchor="middle">X</text><text class="tbl" x="584" y="681" text-anchor="middle">X</text><text class="tbl" x="648" y="681" text-anchor="middle" fill="#7b8794">L</text>
  <line class="grid" x1="360" y1="682" x2="680" y2="682"/>
  <text class="tbl" x="392" y="699" text-anchor="middle">L</text><text class="tbl" x="456" y="699" text-anchor="middle">L</text><text class="tbl" x="520" y="699" text-anchor="middle">L</text><text class="tbl" x="584" y="699" text-anchor="middle">L</text><text class="tbl green" x="648" y="699" text-anchor="middle" font-weight="700">D0</text>
  <line class="grid" x1="360" y1="700" x2="680" y2="700"/>
  <text class="tbl" x="392" y="717" text-anchor="middle">L</text><text class="tbl" x="456" y="717" text-anchor="middle">L</text><text class="tbl" x="520" y="717" text-anchor="middle">L</text><text class="tbl" x="584" y="717" text-anchor="middle">H</text><text class="tbl green" x="648" y="717" text-anchor="middle" font-weight="700">D1</text>
  <line class="grid" x1="360" y1="718" x2="680" y2="718"/>
  <text class="tbl" x="392" y="735" text-anchor="middle">L</text><text class="tbl" x="456" y="735" text-anchor="middle">L</text><text class="tbl" x="520" y="735" text-anchor="middle">H</text><text class="tbl" x="584" y="735" text-anchor="middle">L</text><text class="tbl green" x="648" y="735" text-anchor="middle" font-weight="700">D2</text>
  <line class="grid" x1="360" y1="736" x2="680" y2="736"/>
  <text class="tbl" x="392" y="753" text-anchor="middle">L</text><text class="tbl" x="456" y="753" text-anchor="middle">L</text><text class="tbl" x="520" y="753" text-anchor="middle">H</text><text class="tbl" x="584" y="753" text-anchor="middle">H</text><text class="tbl green" x="648" y="753" text-anchor="middle" font-weight="700">D3</text>
  <line class="grid" x1="360" y1="754" x2="680" y2="754"/>
  <text class="tbl" x="392" y="771" text-anchor="middle">L</text><text class="tbl" x="456" y="771" text-anchor="middle">H</text><text class="tbl" x="520" y="771" text-anchor="middle">L</text><text class="tbl" x="584" y="771" text-anchor="middle">L</text><text class="tbl green" x="648" y="771" text-anchor="middle" font-weight="700">D4</text>
  <line class="grid" x1="360" y1="772" x2="680" y2="772"/>
  <text class="tbl" x="392" y="789" text-anchor="middle">L</text><text class="tbl" x="456" y="789" text-anchor="middle">H</text><text class="tbl" x="520" y="789" text-anchor="middle">L</text><text class="tbl" x="584" y="789" text-anchor="middle">H</text><text class="tbl green" x="648" y="789" text-anchor="middle" font-weight="700">D5</text>
  <line class="grid" x1="360" y1="790" x2="680" y2="790"/>
  <text class="tbl" x="392" y="807" text-anchor="middle">L</text><text class="tbl" x="456" y="807" text-anchor="middle">H</text><text class="tbl" x="520" y="807" text-anchor="middle">H</text><text class="tbl" x="584" y="807" text-anchor="middle">L</text><text class="tbl green" x="648" y="807" text-anchor="middle" font-weight="700">D6</text>
  <line class="grid" x1="360" y1="808" x2="680" y2="808"/>
  <text class="tbl" x="392" y="825" text-anchor="middle">L</text><text class="tbl" x="456" y="825" text-anchor="middle">H</text><text class="tbl" x="520" y="825" text-anchor="middle">H</text><text class="tbl" x="584" y="825" text-anchor="middle">H</text><text class="tbl green" x="648" y="825" text-anchor="middle" font-weight="700">D7</text>

  <text class="small" x="360" y="844">H = high · L = low · X = don&#39;t care.  <tspan class="purple">W</tspan> (pin 6) is always <tspan class="purple">Y&#x305;</tspan>.  When <tspan class="orange">E&#x305;</tspan> = H the chip is disabled (<tspan class="purple">Y</tspan> = L, <tspan class="purple">W</tspan> = H).</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="630">How it works</text>
  <text class="note" x="40" y="655">Eight data inputs <tspan class="green">D0&#8211;D7</tspan> feed an</text>
  <text class="note" x="40" y="674">internal 8:1 selector.</text>
  <text class="note" x="40" y="697">The 3-bit code on <tspan class="blue">S2 S1 S0</tspan> (binary</text>
  <text class="note" x="40" y="716">0&#8211;7) routes exactly one input to <tspan class="purple">Y</tspan>.</text>
  <text class="note" x="40" y="739"><tspan class="purple">W</tspan> (pin 6) carries the complement.</text>
  <text class="note" x="40" y="762">Active-LOW enable <tspan class="orange">E&#x305;</tspan> (pin 7): drive</text>
  <text class="note" x="40" y="781">it HIGH to force <tspan class="purple">Y</tspan> = L, <tspan class="purple">W</tspan> = H.</text>
  <text class="note" x="40" y="804">Purely combinational &#8212; no clock;</text>
  <text class="note" x="40" y="823">output follows inputs after t_pd.</text>

  <!-- ============ LEGEND ============ -->
  <text class="noteh" x="720" y="630">Colour key</text>
  <rect x="720" y="645" width="14" height="14" fill="#2e7d32"/><text class="note" x="742" y="657">data inputs <tspan class="green">D0&#8211;D7</tspan></text>
  <rect x="720" y="668" width="14" height="14" fill="#1565c0"/><text class="note" x="742" y="680">select lines <tspan class="blue">S0&#8211;S2</tspan></text>
  <rect x="720" y="691" width="14" height="14" fill="#e65100"/><text class="note" x="742" y="703">enable <tspan class="orange">E&#x305;</tspan> (active low)</text>
  <rect x="720" y="714" width="14" height="14" fill="#7b1fa2"/><text class="note" x="742" y="726">outputs <tspan class="purple">Y, W</tspan></text>
  <rect x="720" y="737" width="14" height="14" fill="#c62828"/><text class="note" x="742" y="749"><tspan class="red">VCC</tspan> (pin 16)</text>
  <rect x="720" y="760" width="14" height="14" fill="#37474f"/><text class="note" x="742" y="772"><tspan class="slate">GND</tspan> (pin 8)</text>
</svg>
