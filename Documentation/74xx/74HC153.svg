<svg viewBox="0 0 1040 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg     { fill:#fafaf7; }
    .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
    .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
    .title  { fill:#1f2933; font-size:32px; font-weight:700; }
    .sub    { fill:#52606d; font-size:15px; }
    .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
    .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
    .sig    { font-size:13px; font-weight:700; }
    .green  { fill:#2e7d32 !important; }
    .blue   { fill:#1565c0 !important; }
    .orange { fill:#e65100 !important; }
    .purple { fill:#7b1fa2 !important; }
    .red    { fill:#c62828 !important; }
    .slate  { fill:#37474f !important; }
    .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
    .small  { fill:#52606d; font-size:11px; }
    .tbl    { fill:#1f2933; font-size:13px; }
    .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
    .note   { fill:#3e4c59; font-size:13px; }
    .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
    .grid   { stroke:#cbd2d9; stroke-width:1; }
  </style>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="48">74HC153</text>
  <text class="sub" x="40" y="74">Dual 4-to-1 Multiplexer / Data Selector  &#183;  DIP-16  &#183;  shared select, per-bank enable</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ PINOUT (name inside, number outside) ============ -->
  <text class="panel" x="185" y="116">PINOUT &#183; top view</text>

  <rect class="body" x="185" y="130" width="110" height="380"/>
  <path class="thin" d="M 223 130 A 17 17 0 0 0 257 130"/>

  <!-- left pins 1-8 -->
  <line class="thin" x1="155" y1="166" x2="185" y2="166"/>
  <text class="pinno" x="150" y="170" text-anchor="end">1</text>
  <text class="sig orange" x="192" y="170">1&#x305;E&#x305;</text>

  <line class="thin" x1="155" y1="210" x2="185" y2="210"/>
  <text class="pinno" x="150" y="214" text-anchor="end">2</text>
  <text class="sig blue" x="192" y="214">S1</text>

  <line class="thin" x1="155" y1="254" x2="185" y2="254"/>
  <text class="pinno" x="150" y="258" text-anchor="end">3</text>
  <text class="sig green" x="192" y="258">1I3</text>

  <line class="thin" x1="155" y1="298" x2="185" y2="298"/>
  <text class="pinno" x="150" y="302" text-anchor="end">4</text>
  <text class="sig green" x="192" y="302">1I2</text>

  <line class="thin" x1="155" y1="342" x2="185" y2="342"/>
  <text class="pinno" x="150" y="346" text-anchor="end">5</text>
  <text class="sig green" x="192" y="346">1I1</text>

  <line class="thin" x1="155" y1="386" x2="185" y2="386"/>
  <text class="pinno" x="150" y="390" text-anchor="end">6</text>
  <text class="sig green" x="192" y="390">1I0</text>

  <line class="thin" x1="155" y1="430" x2="185" y2="430"/>
  <text class="pinno" x="150" y="434" text-anchor="end">7</text>
  <text class="sig purple" x="192" y="434">1Y</text>

  <line class="thin" x1="155" y1="474" x2="185" y2="474"/>
  <text class="pinno" x="150" y="478" text-anchor="end">8</text>
  <text class="sig slate" x="192" y="478">GND</text>

  <!-- right pins 16-9 -->
  <line class="thin" x1="295" y1="166" x2="325" y2="166"/>
  <text class="pinno" x="330" y="170">16</text>
  <text class="sig red" x="288" y="170" text-anchor="end">VCC</text>

  <line class="thin" x1="295" y1="210" x2="325" y2="210"/>
  <text class="pinno" x="330" y="214">15</text>
  <text class="sig orange" x="288" y="214" text-anchor="end">2&#x305;E&#x305;</text>

  <line class="thin" x1="295" y1="254" x2="325" y2="254"/>
  <text class="pinno" x="330" y="258">14</text>
  <text class="sig blue" x="288" y="258" text-anchor="end">S0</text>

  <line class="thin" x1="295" y1="298" x2="325" y2="298"/>
  <text class="pinno" x="330" y="302">13</text>
  <text class="sig green" x="288" y="302" text-anchor="end">2I3</text>

  <line class="thin" x1="295" y1="342" x2="325" y2="342"/>
  <text class="pinno" x="330" y="346">12</text>
  <text class="sig green" x="288" y="346" text-anchor="end">2I2</text>

  <line class="thin" x1="295" y1="386" x2="325" y2="386"/>
  <text class="pinno" x="330" y="390">11</text>
  <text class="sig green" x="288" y="390" text-anchor="end">2I1</text>

  <line class="thin" x1="295" y1="430" x2="325" y2="430"/>
  <text class="pinno" x="330" y="434">10</text>
  <text class="sig green" x="288" y="434" text-anchor="end">2I0</text>

  <line class="thin" x1="295" y1="474" x2="325" y2="474"/>
  <text class="pinno" x="330" y="478">9</text>
  <text class="sig purple" x="288" y="478" text-anchor="end">2Y</text>

  <!-- ============ SCHEMATIC SYMBOL (name outside, number inside) ============ -->
  <text class="panel" x="600" y="120">SCHEMATIC SYMBOL</text>

  <!-- dual 4:1 mux trapezoid -->
  <path class="body" d="M 645 185 L 815 255 L 815 485 L 645 555 Z"/>

  <!-- bank 1: /1E + 1I0..1I3 -->
  <line class="thin" x1="605" y1="205" x2="633" y2="205"/>
  <circle cx="639" cy="205" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="600" y="209" text-anchor="end">1&#x305;E&#x305;</text>
  <text class="pinno" x="653" y="209">1</text>

  <line class="thin" x1="605" y1="243" x2="645" y2="243"/>
  <text class="lbl green" x="600" y="247" text-anchor="end">1I0</text>
  <text class="pinno" x="653" y="247">6</text>

  <line class="thin" x1="605" y1="281" x2="645" y2="281"/>
  <text class="lbl green" x="600" y="285" text-anchor="end">1I1</text>
  <text class="pinno" x="653" y="285">5</text>

  <line class="thin" x1="605" y1="319" x2="645" y2="319"/>
  <text class="lbl green" x="600" y="323" text-anchor="end">1I2</text>
  <text class="pinno" x="653" y="323">4</text>

  <line class="thin" x1="605" y1="357" x2="645" y2="357"/>
  <text class="lbl green" x="600" y="361" text-anchor="end">1I3</text>
  <text class="pinno" x="653" y="361">3</text>

  <!-- bank 2: /2E + 2I0..2I3 -->
  <line class="thin" x1="605" y1="398" x2="633" y2="398"/>
  <circle cx="639" cy="398" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="600" y="402" text-anchor="end">2&#x305;E&#x305;</text>
  <text class="pinno" x="653" y="402">15</text>

  <line class="thin" x1="605" y1="436" x2="645" y2="436"/>
  <text class="lbl green" x="600" y="440" text-anchor="end">2I0</text>
  <text class="pinno" x="653" y="440">10</text>

  <line class="thin" x1="605" y1="474" x2="645" y2="474"/>
  <text class="lbl green" x="600" y="478" text-anchor="end">2I1</text>
  <text class="pinno" x="653" y="478">11</text>

  <line class="thin" x1="605" y1="512" x2="645" y2="512"/>
  <text class="lbl green" x="600" y="516" text-anchor="end">2I2</text>
  <text class="pinno" x="653" y="516">12</text>

  <line class="thin" x1="605" y1="550" x2="645" y2="550"/>
  <text class="lbl green" x="600" y="554" text-anchor="end">2I3</text>
  <text class="pinno" x="653" y="554">13</text>

  <!-- outputs -->
  <line class="thin" x1="815" y1="300" x2="855" y2="300"/>
  <text class="lbl purple" x="860" y="304">1Y</text>
  <text class="pinno" x="807" y="304" text-anchor="end">7</text>

  <line class="thin" x1="815" y1="440" x2="855" y2="440"/>
  <text class="lbl purple" x="860" y="444">2Y</text>
  <text class="pinno" x="807" y="444" text-anchor="end">9</text>

  <!-- shared select S1, S0 (bottom) with spine to both banks -->
  <line class="thin" x1="720" y1="534" x2="720" y2="578"/>
  <text class="lbl blue" x="720" y="593" text-anchor="middle">S1</text>
  <text class="pinno" x="720" y="505" text-anchor="middle">2</text>

  <line class="thin" x1="750" y1="526" x2="750" y2="578"/>
  <text class="lbl blue" x="750" y="593" text-anchor="middle">S0</text>
  <text class="pinno" x="750" y="505" text-anchor="middle">14</text>

  <!-- body label -->
  <text class="lbl" x="722" y="360" text-anchor="middle">DUAL</text>
  <text class="lbl" x="722" y="382" text-anchor="middle">4:1 MUX</text>

  <text class="small" x="600" y="575"><tspan class="red">VCC</tspan> = pin 16   &#183;   <tspan class="slate">GND</tspan> = pin 8</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">HOW IT WORKS</text>
  <text class="note" x="40" y="636">Two 4-to-1 multiplexers sharing one select pair.</text>
  <text class="note" x="40" y="656"><tspan class="blue">S1</tspan>,<tspan class="blue">S0</tspan> pick one of four inputs and route it to</text>
  <text class="note" x="40" y="676">the bank&#39;s output <tspan class="purple">Y</tspan>:</text>
  <text class="note" x="40" y="696">00&#8594;I0   01&#8594;I1   10&#8594;I2   11&#8594;I3.</text>
  <text class="note" x="40" y="716">Bank 1 (<tspan class="green">1I0..1I3</tspan> &#8594; <tspan class="purple">1Y</tspan>) and bank 2 (<tspan class="green">2I0..2I3</tspan> &#8594; <tspan class="purple">2Y</tspan>)</text>
  <text class="note" x="40" y="736">use the SAME <tspan class="blue">S1</tspan>,<tspan class="blue">S0</tspan> but have separate enables.</text>
  <text class="note" x="40" y="756">Each enable is active-LOW: LOW lets the bank</text>
  <text class="note" x="40" y="776">drive its <tspan class="purple">Y</tspan>; HIGH forces that <tspan class="purple">Y</tspan> LOW.</text>
  <text class="note" x="40" y="796">Non-inverting; outputs always driven (no hi-Z).</text>
  <text class="note" x="40" y="816">A 2-bit-controlled 4-way data selector.</text>

  <!-- ============ FUNCTION TABLE (per bank) ============ -->
  <rect x="410" y="620" width="350" height="30" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="410" y="650" width="350" height="110" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="480" y1="620" x2="480" y2="760"/>
  <line class="grid" x1="545" y1="620" x2="545" y2="760"/>
  <line class="grid" x1="610" y1="620" x2="610" y2="760"/>
  <line class="grid" x1="410" y1="672" x2="760" y2="672"/>
  <line class="grid" x1="410" y1="694" x2="760" y2="694"/>
  <line class="grid" x1="410" y1="716" x2="760" y2="716"/>
  <line class="grid" x1="410" y1="738" x2="760" y2="738"/>

  <text class="tblh orange" x="445" y="640" text-anchor="middle">E&#x305;</text>
  <text class="tblh blue"   x="512" y="640" text-anchor="middle">S1</text>
  <text class="tblh blue"   x="577" y="640" text-anchor="middle">S0</text>
  <text class="tblh purple" x="685" y="640" text-anchor="middle">Y</text>

  <text class="tbl" x="445" y="666" text-anchor="middle">H</text>
  <text class="tbl" x="512" y="666" text-anchor="middle">X</text>
  <text class="tbl" x="577" y="666" text-anchor="middle">X</text>
  <text class="tbl" x="685" y="666" text-anchor="middle"><tspan class="purple">Y</tspan> = L</text>

  <text class="tbl" x="445" y="688" text-anchor="middle">L</text>
  <text class="tbl" x="512" y="688" text-anchor="middle">L</text>
  <text class="tbl" x="577" y="688" text-anchor="middle">L</text>
  <text class="tbl" x="685" y="688" text-anchor="middle"><tspan class="purple">Y</tspan> = <tspan class="green">I0</tspan></text>

  <text class="tbl" x="445" y="710" text-anchor="middle">L</text>
  <text class="tbl" x="512" y="710" text-anchor="middle">L</text>
  <text class="tbl" x="577" y="710" text-anchor="middle">H</text>
  <text class="tbl" x="685" y="710" text-anchor="middle"><tspan class="purple">Y</tspan> = <tspan class="green">I1</tspan></text>

  <text class="tbl" x="445" y="732" text-anchor="middle">L</text>
  <text class="tbl" x="512" y="732" text-anchor="middle">H</text>
  <text class="tbl" x="577" y="732" text-anchor="middle">L</text>
  <text class="tbl" x="685" y="732" text-anchor="middle"><tspan class="purple">Y</tspan> = <tspan class="green">I2</tspan></text>

  <text class="tbl" x="445" y="754" text-anchor="middle">L</text>
  <text class="tbl" x="512" y="754" text-anchor="middle">H</text>
  <text class="tbl" x="577" y="754" text-anchor="middle">H</text>
  <text class="tbl" x="685" y="754" text-anchor="middle"><tspan class="purple">Y</tspan> = <tspan class="green">I3</tspan></text>

  <text class="small" x="410" y="778">Per bank: <tspan class="orange">1&#x305;E&#x305;</tspan> enables bank 1, <tspan class="orange">2&#x305;E&#x305;</tspan> bank 2. <tspan class="blue">S0</tspan>,<tspan class="blue">S1</tspan> shared. X = don&#39;t-care; disabled output = LOW.</text>

  <!-- ============ COLOUR KEY ============ -->
  <text class="noteh" x="800" y="612">COLOUR KEY</text>

  <rect x="800" y="626" width="16" height="16" fill="#2e7d32"/>
  <text class="small" x="824" y="638">Data inputs &#8212; <tspan class="green">1I0&#8230;2I3</tspan></text>

  <rect x="800" y="654" width="16" height="16" fill="#1565c0"/>
  <text class="small" x="824" y="666">Select &#8212; <tspan class="blue">S0, S1</tspan></text>

  <rect x="800" y="682" width="16" height="16" fill="#e65100"/>
  <text class="small" x="824" y="694">Enables &#8212; <tspan class="orange">1&#x305;E&#x305;, 2&#x305;E&#x305;</tspan></text>

  <rect x="800" y="710" width="16" height="16" fill="#7b1fa2"/>
  <text class="small" x="824" y="722">Outputs &#8212; <tspan class="purple">1Y, 2Y</tspan></text>

  <rect x="800" y="738" width="16" height="16" fill="#c62828"/>
  <text class="small" x="824" y="750"><tspan class="red">VCC</tspan> &#8212; pin 16</text>

  <rect x="800" y="766" width="16" height="16" fill="#37474f"/>
  <text class="small" x="824" y="778"><tspan class="slate">GND</tspan> &#8212; pin 8</text>
</svg>
