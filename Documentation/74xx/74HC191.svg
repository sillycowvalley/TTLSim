<svg viewBox="0 0 1040 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg     { fill:#fafaf7; }
    .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
    .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
    .title  { fill:#1f2933; font-size:32px; font-weight:700; }
    .sub    { fill:#52606d; font-size:15px; }
    .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
    .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
    .sig    { font-size:13px; font-weight:700; }
    .green  { fill:#2e7d32 !important; }
    .blue   { fill:#1565c0 !important; }
    .orange { fill:#e65100 !important; }
    .purple { fill:#7b1fa2 !important; }
    .red    { fill:#c62828 !important; }
    .slate  { fill:#37474f !important; }
    .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
    .small  { fill:#52606d; font-size:11px; }
    .tbl    { fill:#1f2933; font-size:13px; }
    .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
    .note   { fill:#3e4c59; font-size:13px; }
    .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
    .grid   { stroke:#cbd2d9; stroke-width:1; }
  </style>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="48">74HC191</text>
  <text class="sub" x="40" y="74">4-Bit Synchronous Up/Down Binary Counter  &#183;  DIP-16  &#183;  single clock, direction-controlled</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ PINOUT ============ -->
  <text class="panel" x="185" y="116">PINOUT &#183; top view</text>

  <rect class="body" x="185" y="130" width="110" height="380"/>
  <path class="thin" d="M 223 130 A 17 17 0 0 0 257 130"/>

  <!-- left pins 1-8 -->
  <line class="thin" x1="155" y1="166" x2="185" y2="166"/>
  <text class="pinno" x="150" y="170" text-anchor="end">1</text>
  <text class="sig green"  x="192" y="170">D1</text>

  <line class="thin" x1="155" y1="210" x2="185" y2="210"/>
  <text class="pinno" x="150" y="214" text-anchor="end">2</text>
  <text class="sig purple" x="192" y="214">Q1</text>

  <line class="thin" x1="155" y1="254" x2="185" y2="254"/>
  <text class="pinno" x="150" y="258" text-anchor="end">3</text>
  <text class="sig purple" x="192" y="258">Q0</text>

  <line class="thin" x1="155" y1="298" x2="185" y2="298"/>
  <text class="pinno" x="150" y="302" text-anchor="end">4</text>
  <text class="sig orange" x="192" y="302">C&#x305;T&#x305;E&#x305;N&#x305;</text>

  <line class="thin" x1="155" y1="342" x2="185" y2="342"/>
  <text class="pinno" x="150" y="346" text-anchor="end">5</text>
  <text class="sig orange" x="192" y="346">D/U</text>

  <line class="thin" x1="155" y1="386" x2="185" y2="386"/>
  <text class="pinno" x="150" y="390" text-anchor="end">6</text>
  <text class="sig purple" x="192" y="390">Q2</text>

  <line class="thin" x1="155" y1="430" x2="185" y2="430"/>
  <text class="pinno" x="150" y="434" text-anchor="end">7</text>
  <text class="sig purple" x="192" y="434">Q3</text>

  <line class="thin" x1="155" y1="474" x2="185" y2="474"/>
  <text class="pinno" x="150" y="478" text-anchor="end">8</text>
  <text class="sig slate" x="192" y="478">GND</text>

  <!-- right pins 16-9 -->
  <line class="thin" x1="295" y1="166" x2="325" y2="166"/>
  <text class="pinno" x="330" y="170">16</text>
  <text class="sig red"    x="288" y="170" text-anchor="end">VCC</text>

  <line class="thin" x1="295" y1="210" x2="325" y2="210"/>
  <text class="pinno" x="330" y="214">15</text>
  <text class="sig green"  x="288" y="214" text-anchor="end">D0</text>

  <line class="thin" x1="295" y1="254" x2="325" y2="254"/>
  <text class="pinno" x="330" y="258">14</text>
  <text class="sig orange" x="288" y="258" text-anchor="end">CLK</text>

  <line class="thin" x1="295" y1="298" x2="325" y2="298"/>
  <text class="pinno" x="330" y="302">13</text>
  <text class="sig purple" x="288" y="302" text-anchor="end">R&#x305;C&#x305;O&#x305;</text>

  <line class="thin" x1="295" y1="342" x2="325" y2="342"/>
  <text class="pinno" x="330" y="346">12</text>
  <text class="sig purple" x="288" y="346" text-anchor="end">MAX/MIN</text>

  <line class="thin" x1="295" y1="386" x2="325" y2="386"/>
  <text class="pinno" x="330" y="390">11</text>
  <text class="sig orange" x="288" y="390" text-anchor="end">L&#x305;D&#x305;</text>

  <line class="thin" x1="295" y1="430" x2="325" y2="430"/>
  <text class="pinno" x="330" y="434">10</text>
  <text class="sig green"  x="288" y="434" text-anchor="end">D2</text>

  <line class="thin" x1="295" y1="474" x2="325" y2="474"/>
  <text class="pinno" x="330" y="478">9</text>
  <text class="sig green"  x="288" y="478" text-anchor="end">D3</text>

  <!-- ============ SCHEMATIC SYMBOL ============ -->
  <text class="panel" x="630" y="120">SCHEMATIC SYMBOL</text>

  <rect class="body" x="630" y="180" width="200" height="380"/>

  <!-- top control: D/U -->
  <line class="thin" x1="730" y1="148" x2="730" y2="180"/>
  <text class="pinno" x="738" y="160">5</text>
  <text class="sig orange" x="730" y="140" text-anchor="middle">D/U</text>

  <!-- left pins -->
  <!-- CLK (clock, dynamic triangle) -->
  <line class="thin" x1="590" y1="230" x2="630" y2="230"/>
  <polyline class="thin" points="630,223 643,230 630,237"/>
  <text class="pinno" x="585" y="234" text-anchor="end">14</text>
  <text class="lbl orange" x="648" y="234">CLK</text>

  <!-- /CTEN (bubble) -->
  <line class="thin" x1="590" y1="278" x2="618" y2="278"/>
  <circle cx="624" cy="278" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="pinno" x="585" y="282" text-anchor="end">4</text>
  <text class="lbl orange" x="642" y="282">C&#x305;T&#x305;E&#x305;N&#x305;</text>

  <!-- /LD (bubble) -->
  <line class="thin" x1="590" y1="326" x2="618" y2="326"/>
  <circle cx="624" cy="326" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="pinno" x="585" y="330" text-anchor="end">11</text>
  <text class="lbl orange" x="642" y="330">L&#x305;D&#x305;</text>

  <!-- data D0..D3 -->
  <line class="thin" x1="590" y1="374" x2="630" y2="374"/>
  <text class="pinno" x="585" y="378" text-anchor="end">15</text>
  <text class="lbl green" x="642" y="378">D0</text>

  <line class="thin" x1="590" y1="422" x2="630" y2="422"/>
  <text class="pinno" x="585" y="426" text-anchor="end">1</text>
  <text class="lbl green" x="642" y="426">D1</text>

  <line class="thin" x1="590" y1="470" x2="630" y2="470"/>
  <text class="pinno" x="585" y="474" text-anchor="end">10</text>
  <text class="lbl green" x="642" y="474">D2</text>

  <line class="thin" x1="590" y1="518" x2="630" y2="518"/>
  <text class="pinno" x="585" y="522" text-anchor="end">9</text>
  <text class="lbl green" x="642" y="522">D3</text>

  <!-- right pins -->
  <line class="thin" x1="830" y1="230" x2="870" y2="230"/>
  <text class="pinno" x="875" y="234">3</text>
  <text class="lbl purple" x="818" y="234" text-anchor="end">Q0</text>

  <line class="thin" x1="830" y1="278" x2="870" y2="278"/>
  <text class="pinno" x="875" y="282">2</text>
  <text class="lbl purple" x="818" y="282" text-anchor="end">Q1</text>

  <line class="thin" x1="830" y1="326" x2="870" y2="326"/>
  <text class="pinno" x="875" y="330">6</text>
  <text class="lbl purple" x="818" y="330" text-anchor="end">Q2</text>

  <line class="thin" x1="830" y1="374" x2="870" y2="374"/>
  <text class="pinno" x="875" y="378">7</text>
  <text class="lbl purple" x="818" y="378" text-anchor="end">Q3</text>

  <line class="thin" x1="830" y1="422" x2="870" y2="422"/>
  <text class="pinno" x="875" y="426">12</text>
  <text class="lbl purple" x="818" y="426" text-anchor="end">MAX/MIN</text>

  <!-- /RCO (bubble) -->
  <line class="thin" x1="842" y1="470" x2="870" y2="470"/>
  <circle cx="836" cy="470" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="pinno" x="875" y="474">13</text>
  <text class="lbl purple" x="818" y="474" text-anchor="end">R&#x305;C&#x305;O&#x305;</text>

  <!-- body label -->
  <text class="lbl" x="730" y="350" text-anchor="middle">4-BIT SYNC</text>
  <text class="lbl" x="730" y="372" text-anchor="middle">UP / DOWN</text>
  <text class="lbl" x="730" y="394" text-anchor="middle">COUNTER</text>
  <text class="small" x="730" y="416" text-anchor="middle">&#247;16</text>

  <text class="small" x="630" y="590"><tspan class="red">VCC</tspan> = pin 16   &#183;   <tspan class="slate">GND</tspan> = pin 8</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">HOW IT WORKS</text>
  <text class="note" x="40" y="638">A 4-bit synchronous up/down counter &#8212; all four</text>
  <text class="note" x="40" y="660">flip-flops update together on the rising edge of <tspan class="orange">CLK</tspan>.</text>
  <text class="note" x="40" y="682">Direction is set by <tspan class="orange">D/U</tspan>: LOW counts up, HIGH down.</text>
  <text class="note" x="40" y="704"><tspan class="orange">C&#x305;T&#x305;E&#x305;N&#x305;</tspan> must be LOW to count; HIGH holds the value.</text>
  <text class="note" x="40" y="726">Pull <tspan class="orange">L&#x305;D&#x305;</tspan> LOW to load <tspan class="green">D0&#8211;D3</tspan> into <tspan class="purple">Q0&#8211;Q3</tspan> at once &#8212;</text>
  <text class="note" x="40" y="748">asynchronously, independent of the clock.</text>
  <text class="note" x="40" y="770"><tspan class="purple">MAX/MIN</tspan> goes HIGH at the terminal count;</text>
  <text class="note" x="40" y="792"><tspan class="purple">R&#x305;C&#x305;O&#x305;</tspan> pulses LOW so stages can be cascaded.</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <rect x="395" y="620" width="405" height="30" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="395" y="650" width="405" height="128" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="450" y1="620" x2="450" y2="778"/>
  <line class="grid" x1="518" y1="620" x2="518" y2="778"/>
  <line class="grid" x1="578" y1="620" x2="578" y2="778"/>
  <line class="grid" x1="628" y1="620" x2="628" y2="778"/>
  <line class="grid" x1="395" y1="682" x2="800" y2="682"/>
  <line class="grid" x1="395" y1="714" x2="800" y2="714"/>
  <line class="grid" x1="395" y1="746" x2="800" y2="746"/>

  <text class="tblh orange" x="422" y="640" text-anchor="middle">L&#x305;D&#x305;</text>
  <text class="tblh orange" x="484" y="640" text-anchor="middle">C&#x305;T&#x305;E&#x305;N&#x305;</text>
  <text class="tblh orange" x="548" y="640" text-anchor="middle">D/U</text>
  <text class="tblh orange" x="603" y="640" text-anchor="middle">CLK</text>
  <text class="tblh" x="714" y="640" text-anchor="middle">Operation</text>

  <!-- row 1: load -->
  <text class="tbl" x="422" y="671" text-anchor="middle">L</text>
  <text class="tbl" x="484" y="671" text-anchor="middle">X</text>
  <text class="tbl" x="548" y="671" text-anchor="middle">X</text>
  <text class="tbl" x="603" y="671" text-anchor="middle">X</text>
  <text class="tbl" x="714" y="671" text-anchor="middle">Load <tspan class="purple">Q</tspan>&#8592;<tspan class="green">D0&#8211;D3</tspan></text>

  <!-- row 2: up -->
  <text class="tbl" x="422" y="703" text-anchor="middle">H</text>
  <text class="tbl" x="484" y="703" text-anchor="middle">L</text>
  <text class="tbl" x="548" y="703" text-anchor="middle">L</text>
  <text class="tbl" x="603" y="703" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="714" y="703" text-anchor="middle">Count up</text>

  <!-- row 3: down -->
  <text class="tbl" x="422" y="735" text-anchor="middle">H</text>
  <text class="tbl" x="484" y="735" text-anchor="middle">L</text>
  <text class="tbl" x="548" y="735" text-anchor="middle">H</text>
  <text class="tbl" x="603" y="735" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="714" y="735" text-anchor="middle">Count down</text>

  <!-- row 4: hold -->
  <text class="tbl" x="422" y="767" text-anchor="middle">H</text>
  <text class="tbl" x="484" y="767" text-anchor="middle">H</text>
  <text class="tbl" x="548" y="767" text-anchor="middle">X</text>
  <text class="tbl" x="603" y="767" text-anchor="middle">X</text>
  <text class="tbl" x="714" y="767" text-anchor="middle">Hold (no change)</text>

  <text class="small" x="395" y="798">&#8593; rising edge &#183; X don&#39;t-care &#183; load is asynchronous (ignores CLK).</text>
  <text class="small" x="395" y="814"><tspan class="purple">MAX/MIN</tspan> = H at terminal count (15 up / 0 down); <tspan class="purple">R&#x305;C&#x305;O&#x305;</tspan> pulses LOW to cascade.</text>

  <!-- ============ COLOUR KEY ============ -->
  <text class="noteh" x="830" y="612">COLOUR KEY</text>

  <rect x="830" y="626" width="16" height="16" fill="#2e7d32"/>
  <text class="small" x="854" y="638">Data inputs &#8212; <tspan class="green">D0&#8211;D3</tspan></text>

  <rect x="830" y="658" width="16" height="16" fill="#7b1fa2"/>
  <text class="small" x="854" y="670">Outputs &#8212; <tspan class="purple">Q0&#8211;Q3, MAX/MIN, R&#x305;C&#x305;O&#x305;</tspan></text>

  <rect x="830" y="690" width="16" height="16" fill="#e65100"/>
  <text class="small" x="854" y="702">Controls &#8212; <tspan class="orange">CLK C&#x305;T&#x305;E&#x305;N&#x305; D/U L&#x305;D&#x305;</tspan></text>

  <rect x="830" y="722" width="16" height="16" fill="#c62828"/>
  <text class="small" x="854" y="734"><tspan class="red">VCC</tspan> &#8212; pin 16</text>

  <rect x="830" y="754" width="16" height="16" fill="#37474f"/>
  <text class="small" x="854" y="766"><tspan class="slate">GND</tspan> &#8212; pin 8</text>
</svg>
