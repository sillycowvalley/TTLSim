<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .bg     { fill:#fafaf7; }
      .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
      .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
      .title  { fill:#1f2933; font-size:32px; font-weight:700; }
      .sub    { fill:#52606d; font-size:15px; }
      .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
      .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
      .sig    { font-size:13px; font-weight:700; }
      .green  { fill:#2e7d32 !important; }
      .blue   { fill:#1565c0 !important; }
      .orange { fill:#e65100 !important; }
      .purple { fill:#7b1fa2 !important; }
      .red    { fill:#c62828 !important; }
      .slate  { fill:#37474f !important; }
      .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
      .small  { fill:#52606d; font-size:11px; }
      .tbl    { fill:#1f2933; font-size:13px; }
      .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
      .note   { fill:#3e4c59; font-size:13px; }
      .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
      .grid   { stroke:#cbd2d9; stroke-width:1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- Title -->
  <text class="title" x="40" y="46">74HC244</text>
  <text class="sub"   x="40" y="72">Octal Buffer / Line Driver, 3-State  ·  DIP-20  ·  two independent 4-bit groups, non-inverting</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ LEFT: PINOUT ============ -->
  <text class="panel" x="60" y="118">PINOUT  (top view, notch up)</text>

  <rect class="body" x="175" y="150" width="120" height="385" rx="4"/>
  <path class="thin" d="M 218 150 A 17 17 0 0 0 252 150" fill="#fafaf7"/>

  <!-- LEFT PINS 1-10 -->
  <line class="thin" x1="175" y1="170" x2="153" y2="170"/><text class="pinno" x="148" y="174" text-anchor="end">1</text><text class="sig orange" x="186" y="174">1O&#x305;E&#x305;</text>
  <line class="thin" x1="175" y1="208" x2="153" y2="208"/><text class="pinno" x="148" y="212" text-anchor="end">2</text><text class="sig green" x="186" y="212">1A1</text>
  <line class="thin" x1="175" y1="246" x2="153" y2="246"/><text class="pinno" x="148" y="250" text-anchor="end">3</text><text class="sig purple" x="186" y="250">2Y1</text>
  <line class="thin" x1="175" y1="284" x2="153" y2="284"/><text class="pinno" x="148" y="288" text-anchor="end">4</text><text class="sig green" x="186" y="288">1A2</text>
  <line class="thin" x1="175" y1="322" x2="153" y2="322"/><text class="pinno" x="148" y="326" text-anchor="end">5</text><text class="sig purple" x="186" y="326">2Y2</text>
  <line class="thin" x1="175" y1="360" x2="153" y2="360"/><text class="pinno" x="148" y="364" text-anchor="end">6</text><text class="sig green" x="186" y="364">1A3</text>
  <line class="thin" x1="175" y1="398" x2="153" y2="398"/><text class="pinno" x="148" y="402" text-anchor="end">7</text><text class="sig purple" x="186" y="402">2Y3</text>
  <line class="thin" x1="175" y1="436" x2="153" y2="436"/><text class="pinno" x="148" y="440" text-anchor="end">8</text><text class="sig green" x="186" y="440">1A4</text>
  <line class="thin" x1="175" y1="474" x2="153" y2="474"/><text class="pinno" x="148" y="478" text-anchor="end">9</text><text class="sig purple" x="186" y="478">2Y4</text>
  <line class="thin" x1="175" y1="512" x2="153" y2="512"/><text class="pinno" x="148" y="516" text-anchor="end">10</text><text class="sig slate" x="186" y="516">GND</text>

  <!-- RIGHT PINS 20-11 -->
  <line class="thin" x1="295" y1="170" x2="317" y2="170"/><text class="pinno" x="322" y="174">20</text><text class="sig red" x="284" y="174" text-anchor="end">VCC</text>
  <line class="thin" x1="295" y1="208" x2="317" y2="208"/><text class="pinno" x="322" y="212">19</text><text class="sig orange" x="284" y="212" text-anchor="end">2O&#x305;E&#x305;</text>
  <line class="thin" x1="295" y1="246" x2="317" y2="246"/><text class="pinno" x="322" y="250">18</text><text class="sig purple" x="284" y="250" text-anchor="end">1Y1</text>
  <line class="thin" x1="295" y1="284" x2="317" y2="284"/><text class="pinno" x="322" y="288">17</text><text class="sig green" x="284" y="288" text-anchor="end">2A1</text>
  <line class="thin" x1="295" y1="322" x2="317" y2="322"/><text class="pinno" x="322" y="326">16</text><text class="sig purple" x="284" y="326" text-anchor="end">1Y2</text>
  <line class="thin" x1="295" y1="360" x2="317" y2="360"/><text class="pinno" x="322" y="364">15</text><text class="sig green" x="284" y="364" text-anchor="end">2A2</text>
  <line class="thin" x1="295" y1="398" x2="317" y2="398"/><text class="pinno" x="322" y="402">14</text><text class="sig purple" x="284" y="402" text-anchor="end">1Y3</text>
  <line class="thin" x1="295" y1="436" x2="317" y2="436"/><text class="pinno" x="322" y="440">13</text><text class="sig green" x="284" y="440" text-anchor="end">2A3</text>
  <line class="thin" x1="295" y1="474" x2="317" y2="474"/><text class="pinno" x="322" y="478">12</text><text class="sig purple" x="284" y="478" text-anchor="end">1Y4</text>
  <line class="thin" x1="295" y1="512" x2="317" y2="512"/><text class="pinno" x="322" y="516">11</text><text class="sig green" x="284" y="516" text-anchor="end">2A4</text>

  <!-- ============ RIGHT: SYMBOL ============ -->
  <text class="panel" x="440" y="118">SCHEMATIC SYMBOL</text>

  <!-- GROUP 1 -->
  <rect class="body" x="600" y="170" width="180" height="130" rx="4"/>
  <text class="lbl" x="690" y="232" text-anchor="middle">BUFFER</text>
  <text class="small" x="690" y="252" text-anchor="middle">&#215; 4</text>
  <!-- g1 inputs -->
  <line class="thin" x1="540" y1="190" x2="600" y2="190"/><text class="lbl green" x="534" y="194" text-anchor="end">1A1</text><text class="pinno" x="606" y="186">2</text>
  <line class="thin" x1="540" y1="222" x2="600" y2="222"/><text class="lbl green" x="534" y="226" text-anchor="end">1A2</text><text class="pinno" x="606" y="218">4</text>
  <line class="thin" x1="540" y1="254" x2="600" y2="254"/><text class="lbl green" x="534" y="258" text-anchor="end">1A3</text><text class="pinno" x="606" y="250">6</text>
  <line class="thin" x1="540" y1="286" x2="600" y2="286"/><text class="lbl green" x="534" y="290" text-anchor="end">1A4</text><text class="pinno" x="606" y="282">8</text>
  <!-- g1 outputs -->
  <line class="thin" x1="780" y1="190" x2="840" y2="190"/><text class="lbl purple" x="846" y="194">1Y1</text><text class="pinno" x="774" y="186" text-anchor="end">18</text>
  <line class="thin" x1="780" y1="222" x2="840" y2="222"/><text class="lbl purple" x="846" y="226">1Y2</text><text class="pinno" x="774" y="218" text-anchor="end">16</text>
  <line class="thin" x1="780" y1="254" x2="840" y2="254"/><text class="lbl purple" x="846" y="258">1Y3</text><text class="pinno" x="774" y="250" text-anchor="end">14</text>
  <line class="thin" x1="780" y1="286" x2="840" y2="286"/><text class="lbl purple" x="846" y="290">1Y4</text><text class="pinno" x="774" y="282" text-anchor="end">12</text>
  <!-- g1 enable -->
  <line class="thin" x1="620" y1="130" x2="620" y2="164"/>
  <circle cx="620" cy="170" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.4"/>
  <text class="lbl orange" x="620" y="124" text-anchor="middle">1O&#x305;E&#x305;</text>
  <text class="small orange" x="640" y="124">1</text>

  <!-- GROUP 2 -->
  <rect class="body" x="600" y="360" width="180" height="130" rx="4"/>
  <text class="lbl" x="690" y="422" text-anchor="middle">BUFFER</text>
  <text class="small" x="690" y="442" text-anchor="middle">&#215; 4</text>
  <!-- g2 inputs -->
  <line class="thin" x1="540" y1="380" x2="600" y2="380"/><text class="lbl green" x="534" y="384" text-anchor="end">2A1</text><text class="pinno" x="606" y="376">17</text>
  <line class="thin" x1="540" y1="412" x2="600" y2="412"/><text class="lbl green" x="534" y="416" text-anchor="end">2A2</text><text class="pinno" x="606" y="408">15</text>
  <line class="thin" x1="540" y1="444" x2="600" y2="444"/><text class="lbl green" x="534" y="448" text-anchor="end">2A3</text><text class="pinno" x="606" y="440">13</text>
  <line class="thin" x1="540" y1="476" x2="600" y2="476"/><text class="lbl green" x="534" y="480" text-anchor="end">2A4</text><text class="pinno" x="606" y="472">11</text>
  <!-- g2 outputs -->
  <line class="thin" x1="780" y1="380" x2="840" y2="380"/><text class="lbl purple" x="846" y="384">2Y1</text><text class="pinno" x="774" y="376" text-anchor="end">3</text>
  <line class="thin" x1="780" y1="412" x2="840" y2="412"/><text class="lbl purple" x="846" y="416">2Y2</text><text class="pinno" x="774" y="408" text-anchor="end">5</text>
  <line class="thin" x1="780" y1="444" x2="840" y2="444"/><text class="lbl purple" x="846" y="448">2Y3</text><text class="pinno" x="774" y="440" text-anchor="end">7</text>
  <line class="thin" x1="780" y1="476" x2="840" y2="476"/><text class="lbl purple" x="846" y="480">2Y4</text><text class="pinno" x="774" y="472" text-anchor="end">9</text>
  <!-- g2 enable -->
  <line class="thin" x1="620" y1="320" x2="620" y2="354"/>
  <circle cx="620" cy="360" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.4"/>
  <text class="lbl orange" x="620" y="314" text-anchor="middle">2O&#x305;E&#x305;</text>
  <text class="small orange" x="640" y="314">19</text>

  <text class="small" x="690" y="520" text-anchor="middle"><tspan class="red">VCC</tspan> = pin 20   ·   <tspan class="slate">GND</tspan> = pin 10</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <text class="panel" x="340" y="630">FUNCTION TABLE  (per group)</text>

  <rect x="340" y="640" width="360" height="26" fill="#eef1f4" stroke="#cbd2d9"/>
  <rect x="340" y="640" width="360" height="104" fill="none" stroke="#9aa5b1" stroke-width="1.4"/>
  <line class="grid" x1="460" y1="640" x2="460" y2="744"/>
  <line class="grid" x1="580" y1="640" x2="580" y2="744"/>
  <text class="tblh orange" x="400" y="658" text-anchor="middle">nO&#x305;E&#x305;</text>
  <text class="tblh green"  x="520" y="658" text-anchor="middle">nAx</text>
  <text class="tblh purple" x="640" y="658" text-anchor="middle">nYx</text>
  <line class="grid" x1="340" y1="666" x2="700" y2="666"/>

  <text class="tbl" x="400" y="685" text-anchor="middle">L</text><text class="tbl" x="520" y="685" text-anchor="middle">L</text><text class="tbl" x="640" y="685" text-anchor="middle">L</text>
  <line class="grid" x1="340" y1="692" x2="700" y2="692"/>
  <text class="tbl" x="400" y="711" text-anchor="middle">L</text><text class="tbl" x="520" y="711" text-anchor="middle">H</text><text class="tbl" x="640" y="711" text-anchor="middle">H</text>
  <line class="grid" x1="340" y1="718" x2="700" y2="718"/>
  <text class="tbl" x="400" y="737" text-anchor="middle">H</text><text class="tbl" x="520" y="737" text-anchor="middle">X</text><text class="tbl" x="640" y="737" text-anchor="middle">Z</text>

  <text class="small" x="340" y="762">H = high · L = low · X = don&#39;t care · Z = high-Z.  <tspan class="orange">1O&#x305;E&#x305;</tspan> gates <tspan class="purple">1Y1&#8211;1Y4</tspan>; <tspan class="orange">2O&#x305;E&#x305;</tspan> gates <tspan class="purple">2Y1&#8211;2Y4</tspan>.</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="630">How it works</text>
  <text class="note" x="40" y="654">Eight non-inverting 3-state buffers</text>
  <text class="note" x="40" y="672">in two independent 4-bit groups.</text>
  <text class="note" x="40" y="694">Group 1: <tspan class="green">1A1&#8211;1A4</tspan> &#8594; <tspan class="purple">1Y1&#8211;1Y4</tspan>,</text>
  <text class="note" x="40" y="712">enabled by <tspan class="orange">1O&#x305;E&#x305;</tspan> (pin 1).</text>
  <text class="note" x="40" y="734">Group 2: <tspan class="green">2A1&#8211;2A4</tspan> &#8594; <tspan class="purple">2Y1&#8211;2Y4</tspan>,</text>
  <text class="note" x="40" y="752">enabled by <tspan class="orange">2O&#x305;E&#x305;</tspan> (pin 19).</text>
  <text class="note" x="40" y="774">Drive an enable LOW to pass that</text>
  <text class="note" x="40" y="792">group; HIGH tri-states its outputs.</text>
  <text class="note" x="40" y="814">Inputs and outputs interleave in the</text>
  <text class="note" x="40" y="832">pinout for flow-through PCB routing.</text>

  <!-- ============ LEGEND ============ -->
  <text class="noteh" x="720" y="630">Colour key</text>
  <rect x="720" y="645" width="14" height="14" fill="#2e7d32"/><text class="note" x="742" y="657">inputs <tspan class="green">1A, 2A</tspan></text>
  <rect x="720" y="668" width="14" height="14" fill="#7b1fa2"/><text class="note" x="742" y="680">outputs <tspan class="purple">1Y, 2Y</tspan></text>
  <rect x="720" y="691" width="14" height="14" fill="#e65100"/><text class="note" x="742" y="703">enables <tspan class="orange">1O&#x305;E&#x305;, 2O&#x305;E&#x305;</tspan></text>
  <rect x="720" y="714" width="14" height="14" fill="#c62828"/><text class="note" x="742" y="726"><tspan class="red">VCC</tspan> (pin 20)</text>
  <rect x="720" y="737" width="14" height="14" fill="#37474f"/><text class="note" x="742" y="749"><tspan class="slate">GND</tspan> (pin 10)</text>
  <text class="small" x="720" y="772">Pairing: <tspan class="green">1A1</tspan>&#8594;<tspan class="purple">1Y1</tspan> &#8230; <tspan class="green">2A4</tspan>&#8594;<tspan class="purple">2Y4</tspan></text>
</svg>
