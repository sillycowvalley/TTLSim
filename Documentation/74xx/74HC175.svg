<svg viewBox="0 0 1040 850" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg     { fill:#fafaf7; }
    .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
    .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
    .title  { fill:#1f2933; font-size:32px; font-weight:700; }
    .sub    { fill:#52606d; font-size:15px; }
    .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
    .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
    .sig    { font-size:13px; font-weight:700; }
    .green  { fill:#2e7d32 !important; }
    .blue   { fill:#1565c0 !important; }
    .orange { fill:#e65100 !important; }
    .purple { fill:#7b1fa2 !important; }
    .red    { fill:#c62828 !important; }
    .slate  { fill:#37474f !important; }
    .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
    .small  { fill:#52606d; font-size:11px; }
    .tbl    { fill:#1f2933; font-size:13px; }
    .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
    .note   { fill:#3e4c59; font-size:13px; }
    .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
    .grid   { stroke:#cbd2d9; stroke-width:1; }
  </style>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="48">74HC175</text>
  <text class="sub" x="40" y="74">Quad D-Type Flip-Flop with Async Reset  &#183;  DIP-16  &#183;  common clock, true &amp; complement outputs</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ PINOUT (name inside, number outside) ============ -->
  <text class="panel" x="185" y="116">PINOUT &#183; top view</text>

  <rect class="body" x="185" y="130" width="110" height="380"/>
  <path class="thin" d="M 223 130 A 17 17 0 0 0 257 130"/>

  <!-- left pins 1-8 -->
  <line class="thin" x1="155" y1="166" x2="185" y2="166"/>
  <text class="pinno" x="150" y="170" text-anchor="end">1</text>
  <text class="sig orange" x="192" y="170">M&#x305;R&#x305;</text>

  <line class="thin" x1="155" y1="210" x2="185" y2="210"/>
  <text class="pinno" x="150" y="214" text-anchor="end">2</text>
  <text class="sig purple" x="192" y="214">Q0</text>

  <line class="thin" x1="155" y1="254" x2="185" y2="254"/>
  <text class="pinno" x="150" y="258" text-anchor="end">3</text>
  <text class="sig purple" x="192" y="258">Q&#x305;0&#x305;</text>

  <line class="thin" x1="155" y1="298" x2="185" y2="298"/>
  <text class="pinno" x="150" y="302" text-anchor="end">4</text>
  <text class="sig green" x="192" y="302">D0</text>

  <line class="thin" x1="155" y1="342" x2="185" y2="342"/>
  <text class="pinno" x="150" y="346" text-anchor="end">5</text>
  <text class="sig green" x="192" y="346">D1</text>

  <line class="thin" x1="155" y1="386" x2="185" y2="386"/>
  <text class="pinno" x="150" y="390" text-anchor="end">6</text>
  <text class="sig purple" x="192" y="390">Q&#x305;1&#x305;</text>

  <line class="thin" x1="155" y1="430" x2="185" y2="430"/>
  <text class="pinno" x="150" y="434" text-anchor="end">7</text>
  <text class="sig purple" x="192" y="434">Q1</text>

  <line class="thin" x1="155" y1="474" x2="185" y2="474"/>
  <text class="pinno" x="150" y="478" text-anchor="end">8</text>
  <text class="sig slate" x="192" y="478">GND</text>

  <!-- right pins 16-9 -->
  <line class="thin" x1="295" y1="166" x2="325" y2="166"/>
  <text class="pinno" x="330" y="170">16</text>
  <text class="sig red" x="288" y="170" text-anchor="end">VCC</text>

  <line class="thin" x1="295" y1="210" x2="325" y2="210"/>
  <text class="pinno" x="330" y="214">15</text>
  <text class="sig purple" x="288" y="214" text-anchor="end">Q3</text>

  <line class="thin" x1="295" y1="254" x2="325" y2="254"/>
  <text class="pinno" x="330" y="258">14</text>
  <text class="sig purple" x="288" y="258" text-anchor="end">Q&#x305;3&#x305;</text>

  <line class="thin" x1="295" y1="298" x2="325" y2="298"/>
  <text class="pinno" x="330" y="302">13</text>
  <text class="sig green" x="288" y="302" text-anchor="end">D3</text>

  <line class="thin" x1="295" y1="342" x2="325" y2="342"/>
  <text class="pinno" x="330" y="346">12</text>
  <text class="sig green" x="288" y="346" text-anchor="end">D2</text>

  <line class="thin" x1="295" y1="386" x2="325" y2="386"/>
  <text class="pinno" x="330" y="390">11</text>
  <text class="sig purple" x="288" y="390" text-anchor="end">Q&#x305;2&#x305;</text>

  <line class="thin" x1="295" y1="430" x2="325" y2="430"/>
  <text class="pinno" x="330" y="434">10</text>
  <text class="sig purple" x="288" y="434" text-anchor="end">Q2</text>

  <line class="thin" x1="295" y1="474" x2="325" y2="474"/>
  <text class="pinno" x="330" y="478">9</text>
  <text class="sig orange" x="288" y="478" text-anchor="end">CP</text>

  <!-- ============ SCHEMATIC SYMBOL (name outside, number inside) ============ -->
  <text class="panel" x="630" y="120">SCHEMATIC SYMBOL</text>

  <rect class="body" x="630" y="170" width="200" height="400"/>

  <!-- top control: MR (bubble = active-low) -->
  <line class="thin" x1="730" y1="138" x2="730" y2="170"/>
  <circle cx="730" cy="176" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="730" y="130" text-anchor="middle">M&#x305;R&#x305;</text>
  <text class="pinno" x="730" y="198" text-anchor="middle">1</text>

  <!-- left pins -->
  <!-- CP (clock, dynamic triangle) -->
  <line class="thin" x1="590" y1="230" x2="630" y2="230"/>
  <polyline class="thin" points="630,223 643,230 630,237"/>
  <text class="lbl orange" x="585" y="234" text-anchor="end">CP</text>
  <text class="pinno" x="650" y="234">9</text>

  <line class="thin" x1="590" y1="300" x2="630" y2="300"/>
  <text class="lbl green" x="585" y="304" text-anchor="end">D0</text>
  <text class="pinno" x="648" y="304">4</text>

  <line class="thin" x1="590" y1="355" x2="630" y2="355"/>
  <text class="lbl green" x="585" y="359" text-anchor="end">D1</text>
  <text class="pinno" x="648" y="359">5</text>

  <line class="thin" x1="590" y1="410" x2="630" y2="410"/>
  <text class="lbl green" x="585" y="414" text-anchor="end">D2</text>
  <text class="pinno" x="648" y="414">12</text>

  <line class="thin" x1="590" y1="465" x2="630" y2="465"/>
  <text class="lbl green" x="585" y="469" text-anchor="end">D3</text>
  <text class="pinno" x="648" y="469">13</text>

  <!-- right pins: Q (true) and Q (bubble = complement) -->
  <line class="thin" x1="830" y1="210" x2="870" y2="210"/>
  <text class="lbl purple" x="875" y="214">Q0</text>
  <text class="pinno" x="812" y="214" text-anchor="end">2</text>

  <line class="thin" x1="842" y1="255" x2="870" y2="255"/>
  <circle cx="836" cy="255" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="875" y="259">Q&#x305;0&#x305;</text>
  <text class="pinno" x="812" y="259" text-anchor="end">3</text>

  <line class="thin" x1="830" y1="300" x2="870" y2="300"/>
  <text class="lbl purple" x="875" y="304">Q1</text>
  <text class="pinno" x="812" y="304" text-anchor="end">7</text>

  <line class="thin" x1="842" y1="345" x2="870" y2="345"/>
  <circle cx="836" cy="345" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="875" y="349">Q&#x305;1&#x305;</text>
  <text class="pinno" x="812" y="349" text-anchor="end">6</text>

  <line class="thin" x1="830" y1="390" x2="870" y2="390"/>
  <text class="lbl purple" x="875" y="394">Q2</text>
  <text class="pinno" x="812" y="394" text-anchor="end">10</text>

  <line class="thin" x1="842" y1="435" x2="870" y2="435"/>
  <circle cx="836" cy="435" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="875" y="439">Q&#x305;2&#x305;</text>
  <text class="pinno" x="812" y="439" text-anchor="end">11</text>

  <line class="thin" x1="830" y1="480" x2="870" y2="480"/>
  <text class="lbl purple" x="875" y="484">Q3</text>
  <text class="pinno" x="812" y="484" text-anchor="end">15</text>

  <line class="thin" x1="842" y1="525" x2="870" y2="525"/>
  <circle cx="836" cy="525" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl purple" x="875" y="529">Q&#x305;3&#x305;</text>
  <text class="pinno" x="812" y="529" text-anchor="end">14</text>

  <!-- body label -->
  <text class="lbl" x="725" y="345" text-anchor="middle">QUAD D</text>
  <text class="lbl" x="725" y="367" text-anchor="middle">FLIP-FLOP</text>
  <text class="small" x="725" y="389" text-anchor="middle">&#215;4</text>

  <text class="small" x="630" y="600"><tspan class="red">VCC</tspan> = pin 16   &#183;   <tspan class="slate">GND</tspan> = pin 8</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">HOW IT WORKS</text>
  <text class="note" x="40" y="638">Four independent D flip-flops sharing one clock <tspan class="orange">CP</tspan></text>
  <text class="note" x="40" y="658">and one reset <tspan class="orange">M&#x305;R&#x305;</tspan>.</text>
  <text class="note" x="40" y="678">On each rising edge of <tspan class="orange">CP</tspan>, every <tspan class="purple">Q</tspan> takes the</text>
  <text class="note" x="40" y="698">value on its <tspan class="green">D</tspan> input; <tspan class="purple">Q&#x305;</tspan> is the complement.</text>
  <text class="note" x="40" y="718">Between edges the outputs hold their last value.</text>
  <text class="note" x="40" y="738">Pull <tspan class="orange">M&#x305;R&#x305;</tspan> LOW to force all four <tspan class="purple">Q</tspan> LOW at once &#8212;</text>
  <text class="note" x="40" y="758">asynchronous, independent of the clock.</text>
  <text class="note" x="40" y="778">A 4-bit register: load <tspan class="green">D0&#8211;D3</tspan> in parallel, read</text>
  <text class="note" x="40" y="798">back <tspan class="purple">Q0&#8211;Q3</tspan> (or the inverted <tspan class="purple">Q&#x305;0&#x305;&#8211;Q&#x305;3&#x305;</tspan>).</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <rect x="395" y="620" width="405" height="30" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="395" y="650" width="405" height="128" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="476" y1="620" x2="476" y2="778"/>
  <line class="grid" x1="557" y1="620" x2="557" y2="778"/>
  <line class="grid" x1="638" y1="620" x2="638" y2="778"/>
  <line class="grid" x1="719" y1="620" x2="719" y2="778"/>
  <line class="grid" x1="395" y1="682" x2="800" y2="682"/>
  <line class="grid" x1="395" y1="714" x2="800" y2="714"/>
  <line class="grid" x1="395" y1="746" x2="800" y2="746"/>

  <text class="tblh orange" x="436" y="640" text-anchor="middle">M&#x305;R&#x305;</text>
  <text class="tblh orange" x="517" y="640" text-anchor="middle">CP</text>
  <text class="tblh green"  x="598" y="640" text-anchor="middle">D</text>
  <text class="tblh purple" x="679" y="640" text-anchor="middle">Q</text>
  <text class="tblh purple" x="760" y="640" text-anchor="middle">Q&#x305;</text>

  <text class="tbl" x="436" y="671" text-anchor="middle">L</text>
  <text class="tbl" x="517" y="671" text-anchor="middle">X</text>
  <text class="tbl" x="598" y="671" text-anchor="middle">X</text>
  <text class="tbl" x="679" y="671" text-anchor="middle">L</text>
  <text class="tbl" x="760" y="671" text-anchor="middle">H</text>

  <text class="tbl" x="436" y="703" text-anchor="middle">H</text>
  <text class="tbl" x="517" y="703" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="598" y="703" text-anchor="middle">H</text>
  <text class="tbl" x="679" y="703" text-anchor="middle">H</text>
  <text class="tbl" x="760" y="703" text-anchor="middle">L</text>

  <text class="tbl" x="436" y="735" text-anchor="middle">H</text>
  <text class="tbl" x="517" y="735" text-anchor="middle">&#8593;</text>
  <text class="tbl" x="598" y="735" text-anchor="middle">L</text>
  <text class="tbl" x="679" y="735" text-anchor="middle">L</text>
  <text class="tbl" x="760" y="735" text-anchor="middle">H</text>

  <text class="tbl" x="436" y="767" text-anchor="middle">H</text>
  <text class="tbl" x="517" y="767" text-anchor="middle">&#8212;</text>
  <text class="tbl" x="598" y="767" text-anchor="middle">X</text>
  <text class="tbl" x="679" y="767" text-anchor="middle">Q&#8320;</text>
  <text class="tbl" x="760" y="767" text-anchor="middle">Q&#x305;&#8320;</text>

  <text class="small" x="395" y="798">&#8593; rising edge &#183; &#8212; no edge (hold; Q&#8320; = previous) &#183; X don&#39;t-care. <tspan class="orange">M&#x305;R&#x305;</tspan> overrides the clock.</text>

  <!-- ============ COLOUR KEY ============ -->
  <text class="noteh" x="830" y="612">COLOUR KEY</text>

  <rect x="830" y="626" width="16" height="16" fill="#2e7d32"/>
  <text class="small" x="854" y="638">Data inputs &#8212; <tspan class="green">D0&#8211;D3</tspan></text>

  <rect x="830" y="658" width="16" height="16" fill="#7b1fa2"/>
  <text class="small" x="854" y="670">Outputs &#8212; <tspan class="purple">Q0&#8211;Q3, Q&#x305;0&#x305;&#8211;Q&#x305;3&#x305;</tspan></text>

  <rect x="830" y="690" width="16" height="16" fill="#e65100"/>
  <text class="small" x="854" y="702">Controls &#8212; <tspan class="orange">CP, M&#x305;R&#x305;</tspan></text>

  <rect x="830" y="722" width="16" height="16" fill="#c62828"/>
  <text class="small" x="854" y="734"><tspan class="red">VCC</tspan> &#8212; pin 16</text>

  <rect x="830" y="754" width="16" height="16" fill="#37474f"/>
  <text class="small" x="854" y="766"><tspan class="slate">GND</tspan> &#8212; pin 8</text>
</svg>
