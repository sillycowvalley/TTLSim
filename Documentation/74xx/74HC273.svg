<svg viewBox="0 0 1040 850" xmlns="http://www.w3.org/2000/svg"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f2933"/>
    </marker>
    <style>
      .bg     { fill:#fafaf7; }
      .thin   { stroke:#1f2933; stroke-width:1.2; fill:none; }
      .body   { fill:#ffffff; stroke:#1f2933; stroke-width:2; }
      .title  { fill:#1f2933; font-size:32px; font-weight:700; }
      .sub    { fill:#52606d; font-size:15px; }
      .panel  { fill:#3e4c59; font-size:14px; font-weight:600; letter-spacing:.4px; }
      .pinno  { fill:#7b8794; font-size:11px; font-weight:600; }
      .sig    { font-size:13px; font-weight:700; }
      .green  { fill:#2e7d32 !important; }
      .blue   { fill:#1565c0 !important; }
      .orange { fill:#e65100 !important; }
      .purple { fill:#7b1fa2 !important; }
      .red    { fill:#c62828 !important; }
      .slate  { fill:#37474f !important; }
      .lbl    { fill:#1f2933; font-size:13px; font-weight:700; }
      .small  { fill:#52606d; font-size:11px; }
      .tbl    { fill:#1f2933; font-size:13px; }
      .tblh   { fill:#1f2933; font-size:13px; font-weight:700; }
      .note   { fill:#3e4c59; font-size:13px; }
      .noteh  { fill:#1f2933; font-size:14px; font-weight:700; }
      .grid   { stroke:#cbd2d9; stroke-width:1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="50">74HC273</text>
  <text class="sub" x="40" y="74">Octal D Flip-Flop with Asynchronous Clear  ·  DIP-20  ·  positive-edge clocked, no tri-state</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

  <!-- ============ PINOUT ============ -->
  <text class="panel" x="40" y="114">PINOUT  ·  top view</text>

  <rect class="body" x="175" y="150" width="130" height="413"/>
  <path d="M 223 150 A 17 17 0 0 0 257 150" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>

  <!-- left pins 1..10 -->
  <g>
    <line class="thin" x1="160" y1="190" x2="175" y2="190"/><text class="pinno" x="153" y="194" text-anchor="end">1</text><text class="sig orange" x="187" y="194">C&#x305;L&#x305;R&#x305;</text>
    <line class="thin" x1="160" y1="227" x2="175" y2="227"/><text class="pinno" x="153" y="231" text-anchor="end">2</text><text class="sig purple" x="187" y="231">Q0</text>
    <line class="thin" x1="160" y1="264" x2="175" y2="264"/><text class="pinno" x="153" y="268" text-anchor="end">3</text><text class="sig green" x="187" y="268">D0</text>
    <line class="thin" x1="160" y1="301" x2="175" y2="301"/><text class="pinno" x="153" y="305" text-anchor="end">4</text><text class="sig green" x="187" y="305">D1</text>
    <line class="thin" x1="160" y1="338" x2="175" y2="338"/><text class="pinno" x="153" y="342" text-anchor="end">5</text><text class="sig purple" x="187" y="342">Q1</text>
    <line class="thin" x1="160" y1="375" x2="175" y2="375"/><text class="pinno" x="153" y="379" text-anchor="end">6</text><text class="sig purple" x="187" y="379">Q2</text>
    <line class="thin" x1="160" y1="412" x2="175" y2="412"/><text class="pinno" x="153" y="416" text-anchor="end">7</text><text class="sig green" x="187" y="416">D2</text>
    <line class="thin" x1="160" y1="449" x2="175" y2="449"/><text class="pinno" x="153" y="453" text-anchor="end">8</text><text class="sig green" x="187" y="453">D3</text>
    <line class="thin" x1="160" y1="486" x2="175" y2="486"/><text class="pinno" x="153" y="490" text-anchor="end">9</text><text class="sig purple" x="187" y="490">Q3</text>
    <line class="thin" x1="160" y1="523" x2="175" y2="523"/><text class="pinno" x="153" y="527" text-anchor="end">10</text><text class="sig slate" x="187" y="527">GND</text>
  </g>

  <!-- right pins 20..11 -->
  <g>
    <line class="thin" x1="305" y1="190" x2="320" y2="190"/><text class="pinno" x="328" y="194">20</text><text class="sig red" x="293" y="194" text-anchor="end">VCC</text>
    <line class="thin" x1="305" y1="227" x2="320" y2="227"/><text class="pinno" x="328" y="231">19</text><text class="sig purple" x="293" y="231" text-anchor="end">Q7</text>
    <line class="thin" x1="305" y1="264" x2="320" y2="264"/><text class="pinno" x="328" y="268">18</text><text class="sig green" x="293" y="268" text-anchor="end">D7</text>
    <line class="thin" x1="305" y1="301" x2="320" y2="301"/><text class="pinno" x="328" y="305">17</text><text class="sig green" x="293" y="305" text-anchor="end">D6</text>
    <line class="thin" x1="305" y1="338" x2="320" y2="338"/><text class="pinno" x="328" y="342">16</text><text class="sig purple" x="293" y="342" text-anchor="end">Q6</text>
    <line class="thin" x1="305" y1="375" x2="320" y2="375"/><text class="pinno" x="328" y="379">15</text><text class="sig purple" x="293" y="379" text-anchor="end">Q5</text>
    <line class="thin" x1="305" y1="412" x2="320" y2="412"/><text class="pinno" x="328" y="416">14</text><text class="sig green" x="293" y="416" text-anchor="end">D5</text>
    <line class="thin" x1="305" y1="449" x2="320" y2="449"/><text class="pinno" x="328" y="453">13</text><text class="sig green" x="293" y="453" text-anchor="end">D4</text>
    <line class="thin" x1="305" y1="486" x2="320" y2="486"/><text class="pinno" x="328" y="490">12</text><text class="sig purple" x="293" y="490" text-anchor="end">Q4</text>
    <line class="thin" x1="305" y1="523" x2="320" y2="523"/><text class="pinno" x="328" y="527">11</text><text class="sig orange" x="293" y="527" text-anchor="end">CLK</text>
  </g>

  <!-- ============ SCHEMATIC SYMBOL ============ -->
  <text class="panel" x="560" y="114">SCHEMATIC SYMBOL</text>

  <rect class="body" x="655" y="210" width="215" height="230"/>
  <text class="lbl" x="762" y="246" text-anchor="middle">OCTAL  D</text>
  <text class="lbl" x="762" y="266" text-anchor="middle">REGISTER</text>
  <text class="small" x="762" y="286" text-anchor="middle">8 × D-type flip-flop</text>

  <!-- D0-D7 input bus -->
  <line class="thin" x1="585" y1="320" x2="655" y2="320" marker-end="url(#arr)"/>
  <line class="thin" x1="614" y1="312" x2="626" y2="328"/>
  <text class="small" x="624" y="306" text-anchor="middle">8</text>
  <text class="lbl green" x="580" y="316" text-anchor="end">D0–D7</text>
  <text class="pinno" x="580" y="332" text-anchor="end">3,4,7,8,13,14,17,18</text>

  <!-- CLK input with edge triangle -->
  <line class="thin" x1="585" y1="400" x2="655" y2="400" marker-end="url(#arr)"/>
  <polyline class="thin" points="655,393 670,400 655,407"/>
  <text class="lbl orange" x="580" y="396" text-anchor="end">CLK</text>
  <text class="pinno" x="580" y="412" text-anchor="end">11</text>

  <!-- /CLR control from top, bubble -->
  <line class="thin" x1="725" y1="168" x2="725" y2="204"/>
  <circle cx="725" cy="210" r="6" fill="#fafaf7" stroke="#1f2933" stroke-width="1.2"/>
  <text class="lbl orange" x="725" y="160" text-anchor="middle">C&#x305;L&#x305;R&#x305;</text>
  <text class="pinno" x="742" y="180">1</text>

  <!-- Q0-Q7 output bus -->
  <line class="thin" x1="870" y1="320" x2="940" y2="320" marker-end="url(#arr)"/>
  <line class="thin" x1="899" y1="312" x2="911" y2="328"/>
  <text class="small" x="909" y="306" text-anchor="middle">8</text>
  <text class="lbl purple" x="945" y="316">Q0–Q7</text>
  <text class="pinno" x="945" y="332">2,5,6,9,12,15,16,19</text>

  <text class="small" x="762" y="470" text-anchor="middle"><tspan class="red">VCC</tspan> = pin 20  ·  <tspan class="slate">GND</tspan> = pin 10</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="612">How it works</text>
  <text class="note" x="40" y="638">The ’273 is an 8-bit register: eight D-type flip-flops sharing one</text>
  <text class="note" x="40" y="658">clock and one clear. On each rising edge of <tspan class="orange">CLK</tspan>, the eight</text>
  <text class="note" x="40" y="678"><tspan class="green">D0–D7</tspan> inputs are copied to <tspan class="purple">Q0–Q7</tspan> and held until the next edge.</text>
  <text class="note" x="40" y="698"><tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan> is asynchronous and active-low: pulling it low forces every</text>
  <text class="note" x="40" y="718"><tspan class="purple">Q</tspan> to L immediately, overriding the clock. Release it high to resume.</text>
  <text class="note" x="40" y="738">There is no load enable (that is the ’377) and no tri-state (that is</text>
  <text class="note" x="40" y="758">the ’574) — the <tspan class="purple">Q</tspan> outputs always drive, so it suits a holding</text>
  <text class="note" x="40" y="778">register where bus contention is not a concern.</text>

  <!-- ============ FUNCTION TABLE ============ -->
  <text class="panel" x="400" y="612">FUNCTION TABLE</text>
  <rect x="400" y="624" width="380" height="30" fill="#eef1f4" stroke="#9aa5b1"/>
  <rect x="400" y="624" width="380" height="150" fill="none" stroke="#9aa5b1"/>
  <line class="grid" x1="495" y1="624" x2="495" y2="774"/>
  <line class="grid" x1="590" y1="624" x2="590" y2="774"/>
  <line class="grid" x1="685" y1="624" x2="685" y2="774"/>
  <line class="grid" x1="400" y1="654" x2="780" y2="654"/>
  <line class="grid" x1="400" y1="684" x2="780" y2="684"/>
  <line class="grid" x1="400" y1="714" x2="780" y2="714"/>
  <line class="grid" x1="400" y1="744" x2="780" y2="744"/>

  <text class="tblh orange"  x="447" y="644" text-anchor="middle">C&#x305;L&#x305;R&#x305;</text>
  <text class="tblh orange"  x="542" y="644" text-anchor="middle">CLK</text>
  <text class="tblh green"   x="637" y="644" text-anchor="middle">Dn</text>
  <text class="tblh purple"  x="732" y="644" text-anchor="middle">Qn</text>

  <text class="tbl" x="447" y="674" text-anchor="middle">L</text>
  <text class="tbl" x="542" y="674" text-anchor="middle">X</text>
  <text class="tbl" x="637" y="674" text-anchor="middle">X</text>
  <text class="tbl" x="732" y="674" text-anchor="middle">L</text>

  <text class="tbl" x="447" y="704" text-anchor="middle">H</text>
  <text class="tbl" x="542" y="704" text-anchor="middle">↑</text>
  <text class="tbl" x="637" y="704" text-anchor="middle">H</text>
  <text class="tbl" x="732" y="704" text-anchor="middle">H</text>

  <text class="tbl" x="447" y="734" text-anchor="middle">H</text>
  <text class="tbl" x="542" y="734" text-anchor="middle">↑</text>
  <text class="tbl" x="637" y="734" text-anchor="middle">L</text>
  <text class="tbl" x="732" y="734" text-anchor="middle">L</text>

  <text class="tbl" x="447" y="764" text-anchor="middle">H</text>
  <text class="tbl" x="542" y="764" text-anchor="middle">L</text>
  <text class="tbl" x="637" y="764" text-anchor="middle">X</text>
  <text class="tbl" x="732" y="764" text-anchor="middle">Q₀</text>

  <text class="small" x="400" y="794">↑ = rising edge · Dn latched to Qn on the edge · Q₀ = previous state · C&#x305;L&#x305;R&#x305; low clears all Q asynchronously.</text>

  <!-- ============ COLOUR KEY ============ -->
  <text class="panel" x="820" y="612">COLOUR KEY</text>
  <rect x="820" y="628" width="16" height="12" fill="#2e7d32"/><text class="small" x="844" y="638">Input data — <tspan class="green">D0–D7</tspan></text>
  <rect x="820" y="652" width="16" height="12" fill="#7b1fa2"/><text class="small" x="844" y="662">Output — <tspan class="purple">Q0–Q7</tspan></text>
  <rect x="820" y="676" width="16" height="12" fill="#e65100"/><text class="small" x="844" y="686">Control — <tspan class="orange">CLK</tspan>, <tspan class="orange">C&#x305;L&#x305;R&#x305;</tspan></text>
  <rect x="820" y="700" width="16" height="12" fill="#c62828"/><text class="small" x="844" y="710">Power — <tspan class="red">VCC</tspan></text>
  <rect x="820" y="724" width="16" height="12" fill="#37474f"/><text class="small" x="844" y="734">Ground — <tspan class="slate">GND</tspan></text>
</svg>
