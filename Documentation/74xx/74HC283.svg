  <!-- body label -->
  <text class="lbl" x="725" y="355" text-anchor="middle">4-BIT</text>
  <text class="lbl" x="725" y="377" text-anchor="middle">FULL ADDER</text>
  <text class="small" x="725" y="399" text-anchor="middle">fast carry</text>

  <text class="small" x="620" y="600"><tspan class="red">VCC</tspan> = pin 16   &#183;   <tspan class="slate">GND</tspan> = pin 8</text>

  <!-- ============ HOW IT WORKS ============ -->
  <text class="noteh" x="40" y="608">HOW IT WORKS</text>
  <text class="note" x="40" y="632">Adds two 4-bit numbers <tspan class="green">A1&#8211;A4</tspan> and <tspan class="green">B1&#8211;B4</tspan></text>
  <text class="note" x="40" y="652">plus a carry-in <tspan class="green">C0</tspan>, giving sum <tspan class="purple">S1&#8211;S4</tspan></text>
  <text class="note" x="40" y="672">and carry-out <tspan class="purple">C4</tspan>.</text>
  <text class="note" x="40" y="692">Purely combinational &#8212; no clock; the result settles</text>
  <text class="note" x="40" y="712">after the propagation delay.</text>
  <text class="note" x="40" y="732">Each bit is a full adder: <tspan class="purple">S</tspan> = <tspan class="green">A</tspan> &#8853; <tspan class="green">B</tspan> &#8853; carry.</text>
  <text class="note" x="40" y="752">Fast carry uses internal look-ahead across all four</text>
  <text class="note" x="40" y="772">bits, not a slow ripple chain.</text>
  <text class="note" x="40" y="792">Cascade by wiring <tspan class="purple">C4</tspan> of one stage to <tspan class="green">C0</tspan> of</text>
  <text class="note" x="40" y="812">the next &#8212; build 8-, 12-, 16-bit adders.</text>

