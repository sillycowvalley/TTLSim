  <rect class="bg" x="0" y="0" width="1040" height="850"/>

  <!-- ============ TITLE BLOCK ============ -->
  <text class="title" x="40" y="48">74HC283</text>
  <text class="sub" x="40" y="74">4-Bit Binary Full Adder with Fast Carry  &#183;  DIP-16  &#183;  combinational (no clock)</text>
  <line class="thin" x1="40" y1="88" x2="1000" y2="88"/>

