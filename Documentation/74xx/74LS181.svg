<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The 74181 4-bit ALU slice: a function generator selected by S3 to S0 and M, an internal lookahead carry chain with carry in and out plus propagate and generate outputs, and an open-collector zero detect driving the A equals B pin.</desc>
