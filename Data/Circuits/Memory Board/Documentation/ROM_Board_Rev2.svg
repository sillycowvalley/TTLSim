  <text class="ref" x="910" y="708">U11</text>
  <text class="part" x="1005" y="708">ATF22V10</text>
  <text class="part" x="1005" y="902" text-anchor="middle">DECODE (combinational)</text>
  <line class="w" x1="865" y1="730" x2="900" y2="730"/><text class="net" x="860" y="730" text-anchor="end">A[15:12]</text>
  <line class="w" x1="865" y1="757" x2="900" y2="757"/><text class="net" x="860" y="757" text-anchor="end">DONE</text>
  <text class="pin" x="905" y="730">A15..12</text>
  <text class="pin" x="905" y="757">DONE</text>
  <text class="pin" x="905" y="790">SIZE1,0</text>
  <text class="pin" x="905" y="825">BASE3..0</text>
  <line class="w" x1="865" y1="852" x2="900" y2="852"/><text class="net" x="860" y="852" text-anchor="end">DRIVE</text>
  <text class="pin" x="905" y="852">DRIVE</text>
  <line class="w" x1="1110" y1="718" x2="1145" y2="718"/><text class="pin" x="1105" y="718" text-anchor="end">EA14</text><text class="net" x="1150" y="718">EA14</text>
  <line class="w" x1="1110" y1="740" x2="1145" y2="740"/><text class="pin" x="1105" y="740" text-anchor="end">EA13</text><text class="net" x="1150" y="740">EA13</text>
  <line class="w" x1="1110" y1="762" x2="1145" y2="762"/><text class="pin" x="1105" y="762" text-anchor="end">EA12</text><text class="net" x="1150" y="762">EA12</text>
  <line class="w" x1="1110" y1="790" x2="1145" y2="790"/><text class="pin" x="1105" y="790" text-anchor="end">READY</text><text class="net" x="1150" y="790">READY</text>
  <line class="w" x1="1110" y1="815" x2="1145" y2="815"/><text class="pin" x="1105" y="815" text-anchor="end">/WAIT</text><text class="net" x="1150" y="815">/WAIT</text>
  <line class="w" x1="1110" y1="840" x2="1145" y2="840"/><text class="pin" x="1105" y="840" text-anchor="end">EOE</text><text class="net" x="1150" y="840">EOE</text>
  <line class="w" x1="1110" y1="865" x2="1145" y2="865"/><text class="pin" x="1105" y="865" text-anchor="end">ZOE</text><text class="net" x="1150" y="865">ZOE</text>

  <!-- ===================== LEDS ===================== -->
  <circle cx="1290" cy="790" r="8" class="w"/>
  <line class="w" x1="1250" y1="790" x2="1282" y2="790"/>
  <text class="net" x="1246" y="790" text-anchor="end">READY</text>
  <rect class="w" x="1306" y="785" width="28" height="10"/>
  <line class="w" x1="1298" y1="790" x2="1306" y2="790"/>
  <line class="gnd" x1="1334" y1="790" x2="1352" y2="790"/>
  <line class="gnd" x1="1352" y1="784" x2="1352" y2="796"/>
  <text class="ref" x="1290" y="770" text-anchor="middle">D1</text>

  <circle cx="1290" cy="815" r="8" class="w"/>
  <line class="w" x1="1250" y1="815" x2="1282" y2="815"/>
  <text class="net" x="1246" y="815" text-anchor="end">/WAIT</text>
  <rect class="w" x="1306" y="810" width="28" height="10"/>
  <line class="w" x1="1298" y1="815" x2="1306" y2="815"/>
  <line class="gnd" x1="1334" y1="815" x2="1352" y2="815"/>
  <line class="gnd" x1="1352" y1="809" x2="1352" y2="821"/>
  <text class="ref" x="1290" y="835" text-anchor="middle">D2</text>
  <text class="note" x="1246" y="855">D2 lit during copy (~25 ms), steady = wedged</text>

  <!-- ===================== NOTES ===================== -->
  <text class="note" x="60" y="960">Copy: 3 clocks/byte (SETTLE / WRITE / HOLD), full 64K pass — window shadowed from EEPROM via EOE, everything else zeroed via U9/ZOE. Boot 24.6 ms @ 8 MHz.</text>
  <text class="note" x="60" y="977">Host read path is raw SRAM (A + HOE direct). Writes: HWE merged with the copy pulse inside U10 (7.5 ns). RN1 also pulls HWE and HOE high for standalone boot.</text>
  <text class="note" x="60" y="994">/WAIT = EEPROM /CE = U7/U8 /OE: the copier owns the buses only while /WAIT is low. Host must not drive A/D during /WAIT (share /RST and it never will).</text>
  <text class="note" x="60" y="1008">Per-IC VCC/GND and decoupling omitted for clarity. Socket drawn as 28C256; 28C128/28C64 drop in (EA lines land on absent/NC pins — harmless, see Rev 2 doc §2).</text>
</svg>
