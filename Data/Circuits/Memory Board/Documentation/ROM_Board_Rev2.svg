<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1020" viewBox="0 0 1500 1020" font-family="Helvetica, Arial, sans-serif">
  <style>
    .w    { stroke:#222; stroke-width:1; fill:none; }
    .bus  { stroke:#222; stroke-width:3; fill:none; }
    .chip { fill:#ffffff; stroke:#222; stroke-width:1.5; }
    .conn { fill:#eef2fb; stroke:#222; stroke-width:1.5; }
    .conn2{ fill:#eafaf0; stroke:#222; stroke-width:1.5; }
    .vcc  { stroke:#c0392b; stroke-width:2; fill:none; }
    .gnd  { stroke:#2c3e50; stroke-width:2; fill:none; }
    .ref  { font-size:13px; font-weight:bold; fill:#111; }
    .part { font-size:11px; font-style:italic; fill:#555; }
    .pin  { font-size:11px; fill:#111; }
    .net  { font-size:11px; fill:#103a8c; }
    .dir  { font-size:10px; fill:#777; }
    .ttl  { font-size:22px; font-weight:bold; fill:#111; }
    .sub  { font-size:13px; fill:#555; }
    .note { font-size:11px; fill:#333; }
    .nlbl { font-size:11px; font-weight:bold; fill:#111; }
    text  { dominant-baseline:middle; }
  </style>

  <rect x="8" y="8" width="1484" height="1004" fill="#ffffff" stroke="#333" stroke-width="1.5"/>
  <text class="ttl" x="28" y="40">ROM Board Rev 2 — Shadow-ROM Module</text>
  <text class="sub" x="28" y="62">64K × 8 SRAM, EEPROM-shadowed ROM window (4K/8K/16K/32K, any 4K base) · block-level · net names join like-labelled stubs</text>

  <!-- ===================== BUSES ===================== -->
  <line class="bus" x1="230" y1="250" x2="1360" y2="250"/>
  <text class="nlbl" x="600" y="234">A[15:0]</text>
  <line class="bus" x1="230" y1="620" x2="1360" y2="620"/>
  <text class="nlbl" x="430" y="604">D[7:0]</text>

  <!-- junction dots -->
  <circle cx="230" cy="250" r="4" fill="#222"/>
  <circle cx="890" cy="250" r="4" fill="#222"/>
  <circle cx="950" cy="250" r="4" fill="#222"/>
  <circle cx="1030" cy="250" r="4" fill="#222"/>
  <circle cx="1270" cy="250" r="4" fill="#222"/>
  <circle cx="230" cy="620" r="4" fill="#222"/>
  <circle cx="695" cy="620" r="4" fill="#222"/>
  <circle cx="1100" cy="620" r="4" fill="#222"/>
  <circle cx="1340" cy="620" r="4" fill="#222"/>

  <!-- ===================== HOST HEADERS (left) ===================== -->
  <rect class="conn" x="60" y="150" width="120" height="90"/>
  <text class="ref" x="120" y="172" text-anchor="middle">J1</text>
  <text class="part" x="120" y="189" text-anchor="middle">ADDR-L · 8-pin</text>
  <line class="bus" x1="180" y1="205" x2="230" y2="205"/>
  <text class="nlbl" x="186" y="193">A[7:0]</text>
  <text class="dir" x="150" y="222" text-anchor="middle">(host)</text>

  <rect class="conn" x="60" y="270" width="120" height="90"/>
  <text class="ref" x="120" y="292" text-anchor="middle">J2</text>
  <text class="part" x="120" y="309" text-anchor="middle">ADDR-H · 8-pin</text>
  <line class="bus" x1="180" y1="325" x2="230" y2="325"/>
  <text class="nlbl" x="186" y="313">A[15:8]</text>
  <line class="bus" x1="230" y1="205" x2="230" y2="325"/>

  <rect class="conn" x="60" y="560" width="120" height="90"/>
  <text class="ref" x="120" y="582" text-anchor="middle">J3</text>
  <text class="part" x="120" y="599" text-anchor="middle">DATA · 8-pin</text>
  <line class="bus" x1="180" y1="615" x2="230" y2="615"/>
  <text class="nlbl" x="186" y="603">D[7:0]</text>
  <line class="bus" x1="230" y1="615" x2="230" y2="620"/>

  <rect class="conn" x="60" y="700" width="120" height="248"/>
  <text class="ref" x="120" y="722" text-anchor="middle">J4</text>
  <text class="part" x="120" y="739" text-anchor="middle">CTL · 8-pin</text>
  <line class="w" x1="180" y1="762" x2="215" y2="762"/><text class="net" x="220" y="762">HOE</text><text class="dir" x="262" y="762">(/OE in)</text>
  <line class="w" x1="180" y1="789" x2="215" y2="789"/><text class="net" x="220" y="789">HWE</text><text class="dir" x="262" y="789">(/WE in)</text>
  <line class="w" x1="180" y1="816" x2="215" y2="816"/><text class="net" x="220" y="816">READY</text><text class="dir" x="272" y="816">(out)</text>
  <line class="w" x1="180" y1="843" x2="215" y2="843"/><text class="net" x="220" y="843">/WAIT</text><text class="dir" x="268" y="843">(out)</text>
  <line class="w" x1="180" y1="870" x2="215" y2="870"/><text class="net" x="220" y="870">/RST</text><text class="dir" x="262" y="870">(bidir)</text>
  <line class="vcc" x1="180" y1="897" x2="215" y2="897"/><text class="pin" x="220" y="897" fill="#c0392b">VCC</text>
  <line class="gnd" x1="180" y1="922" x2="215" y2="922"/><text class="pin" x="220" y="922" fill="#2c3e50">GND</text>
  <text class="dir" x="220" y="940">pin 8: reserved</text>

  <!-- ===================== COPY ENGINE (top band) ===================== -->
  <rect class="chip" x="250" y="80" width="110" height="60"/>
  <text class="ref" x="260" y="98">X1</text>
  <text class="part" x="305" y="118" text-anchor="middle">8 MHz can</text>
  <line class="w" x1="360" y1="110" x2="395" y2="110"/>
  <text class="net" x="400" y="110">CLK</text>

  <rect class="chip" x="470" y="60" width="220" height="120"/>
  <text class="ref" x="480" y="78">U3–U6</text>
  <text class="part" x="560" y="78">4× 74HC163</text>
  <text class="part" x="580" y="160" text-anchor="middle">16-bit copy counter</text>
  <line class="w" x1="435" y1="95" x2="470" y2="95"/><text class="net" x="430" y="95" text-anchor="end">CLK</text><text class="pin" x="475" y="95">CLK</text>
  <line class="w" x1="435" y1="120" x2="470" y2="120"/><text class="net" x="430" y="120" text-anchor="end">/RST</text><text class="pin" x="475" y="120">/CLR</text>
  <line class="w" x1="435" y1="145" x2="470" y2="145"/><text class="net" x="430" y="145" text-anchor="end">CNTEN</text><text class="pin" x="475" y="145">CEP</text>
  <line class="bus" x1="690" y1="100" x2="770" y2="100"/>
  <text class="pin" x="684" y="88" text-anchor="end">Q[15:0]</text>
  <line class="w" x1="690" y1="150" x2="720" y2="150"/>
  <text class="net" x="726" y="150">RCO</text>

  <rect class="chip" x="770" y="60" width="160" height="120"/>
  <text class="ref" x="780" y="78">U7 U8</text>
  <text class="part" x="855" y="78">2× 74HC541</text>
  <text class="part" x="850" y="160" text-anchor="middle">copy addr drivers</text>
  <line class="w" x1="850" y1="180" x2="850" y2="208"/>
  <text class="net" x="858" y="200">/WAIT</text>
  <text class="pin" x="842" y="192" text-anchor="end">/OE</text>
  <line class="bus" x1="930" y1="100" x2="950" y2="100"/>
  <line class="bus" x1="950" y1="100" x2="950" y2="250"/>

  <!-- A[15:12] tap for DECODE, by net name -->
  <line class="w" x1="890" y1="250" x2="890" y2="278"/>
  <text class="net" x="882" y="290" text-anchor="end">A[15:12]</text>

  <!-- ===================== EEPROM ===================== -->
  <rect class="chip" x="990" y="320" width="190" height="180"/>
  <text class="ref" x="1000" y="338">U1</text>
  <text class="part" x="1070" y="338">28C256/128/64</text>
  <text class="part" x="1085" y="480" text-anchor="middle">ROM image (offset 0)</text>
  <line class="bus" x1="1030" y1="250" x2="1030" y2="320"/>
  <text class="pin" x="1038" y="332">A[11:0]</text>
  <line class="w" x1="955" y1="365" x2="990" y2="365"/><text class="net" x="950" y="365" text-anchor="end">EA14</text><text class="pin" x="995" y="365">A14</text>
  <line class="w" x1="955" y1="388" x2="990" y2="388"/><text class="net" x="950" y="388" text-anchor="end">EA13</text><text class="pin" x="995" y="388">A13</text>
  <line class="w" x1="955" y1="411" x2="990" y2="411"/><text class="net" x="950" y="411" text-anchor="end">EA12</text><text class="pin" x="995" y="411">A12</text>
  <line class="w" x1="955" y1="440" x2="990" y2="440"/><text class="net" x="950" y="440" text-anchor="end">/WAIT</text><text class="pin" x="995" y="440">/CE</text>
  <line class="w" x1="955" y1="465" x2="990" y2="465"/><text class="net" x="950" y="465" text-anchor="end">EOE</text><text class="pin" x="995" y="465">/OE</text>
  <line class="bus" x1="1100" y1="500" x2="1100" y2="620"/>
  <text class="pin" x="1108" y="512">D[7:0]</text>

  <!-- ===================== SRAM ===================== -->
  <rect class="chip" x="1230" y="320" width="190" height="180"/>
  <text class="ref" x="1240" y="338">U2</text>
  <text class="part" x="1305" y="338">W24512</text>
  <text class="part" x="1325" y="480" text-anchor="middle">64K × 8 SRAM · 15 ns</text>
  <line class="bus" x1="1270" y1="250" x2="1270" y2="320"/>
  <text class="pin" x="1278" y="332">A[15:0]</text>
  <line class="w" x1="1195" y1="370" x2="1230" y2="370"/><text class="net" x="1190" y="370" text-anchor="end">SWE</text><text class="pin" x="1235" y="370">/WE</text>
  <line class="w" x1="1195" y1="398" x2="1230" y2="398"/><text class="net" x="1190" y="398" text-anchor="end">HOE</text><text class="pin" x="1235" y="398">/OE</text>
