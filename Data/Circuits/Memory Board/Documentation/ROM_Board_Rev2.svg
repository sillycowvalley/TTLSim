  <line class="vcc" x1="1200" y1="454" x2="1230" y2="454"/><text class="pin" x="1235" y="454">CS2</text>
  <line class="vcc" x1="1192" y1="448" x2="1208" y2="448"/>
  <text class="pin" x="1186" y="454" text-anchor="end" fill="#c0392b">VCC</text>
  <line class="bus" x1="1340" y1="500" x2="1340" y2="620"/>
  <text class="pin" x="1348" y="512">I/O[7:0]</text>

