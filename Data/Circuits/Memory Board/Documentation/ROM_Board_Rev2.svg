  <text class="part" x="555" y="708">ATF16V8C-7</text>
  <text class="part" x="555" y="862" text-anchor="middle">COPYCTL (registered)</text>
  <line class="w" x1="425" y1="735" x2="460" y2="735"/><text class="net" x="420" y="735" text-anchor="end">CLK</text><text class="pin" x="465" y="735">CLK</text>
  <line class="w" x1="425" y1="765" x2="460" y2="765"/><text class="net" x="420" y="765" text-anchor="end">/RST</text><text class="pin" x="465" y="765">/RST</text>
  <line class="w" x1="425" y1="795" x2="460" y2="795"/><text class="net" x="420" y="795" text-anchor="end">RCO</text><text class="pin" x="465" y="795">RCO</text>
  <line class="w" x1="425" y1="825" x2="460" y2="825"/><text class="net" x="420" y="825" text-anchor="end">HWE</text><text class="pin" x="465" y="825">HWE</text>
  <line class="w" x1="650" y1="735" x2="685" y2="735"/><text class="pin" x="645" y="735" text-anchor="end">SWE</text><text class="net" x="690" y="735">SWE</text>
  <line class="w" x1="650" y1="765" x2="685" y2="765"/><text class="pin" x="645" y="765" text-anchor="end">CNTEN</text><text class="net" x="690" y="765">CNTEN</text>
  <line class="w" x1="650" y1="795" x2="685" y2="795"/><text class="pin" x="645" y="795" text-anchor="end">DONE</text><text class="net" x="690" y="795">DONE</text>
  <line class="w" x1="650" y1="825" x2="685" y2="825"/><text class="pin" x="645" y="825" text-anchor="end">DRIVE</text><text class="net" x="690" y="825">DRIVE</text>

  <!-- ===================== DIP CONFIG ===================== -->
  <rect class="conn2" x="720" y="740" width="140" height="140"/>
  <text class="ref" x="730" y="758">SW1</text>
  <text class="part" x="810" y="758">6× DIP</text>
  <text class="part" x="790" y="862" text-anchor="middle">RN1 pull-ups</text>
  <line class="vcc" x1="790" y1="740" x2="790" y2="722"/><line class="vcc" x1="780" y1="722" x2="800" y2="722"/>
  <text class="pin" x="805" y="722" fill="#c0392b">VCC</text>
  <line class="w" x1="860" y1="790" x2="900" y2="790"/><text class="pin" x="854" y="790" text-anchor="end">SIZE[1:0]</text>
  <line class="w" x1="860" y1="825" x2="900" y2="825"/><text class="pin" x="854" y="825" text-anchor="end">BASE[3:0]</text>

  <!-- ===================== DECODE GAL ===================== -->
