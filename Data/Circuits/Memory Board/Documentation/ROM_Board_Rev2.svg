  <rect class="chip" x="620" y="430" width="150" height="100"/>
  <text class="ref" x="630" y="448">U9</text>
  <text class="part" x="710" y="448">74HC541</text>
  <text class="part" x="695" y="512" text-anchor="middle">zero driver · 0x00</text>
  <line class="gnd" x1="585" y1="465" x2="620" y2="465"/>
  <line class="gnd" x1="577" y1="471" x2="593" y2="471"/><line class="gnd" x1="580" y1="475" x2="590" y2="475"/>
  <text class="pin" x="625" y="465">A0..A7</text>
  <line class="w" x1="585" y1="495" x2="620" y2="495"/><text class="net" x="580" y="495" text-anchor="end">ZOE</text><text class="pin" x="625" y="495">/OE</text>
  <line class="bus" x1="695" y1="530" x2="695" y2="620"/>
  <text class="pin" x="703" y="542">Y[7:0]</text>

