  <text x="36" y="38" class="title">Mini Blinky — Return-Stack Circuitry (W = 4)</text>
  <text x="36" y="58" class="subtitle">rev: decrementer addressing — push writes at RSP, pop reads at RSP−1 · clean system clock · derived /CS, /WE strobes · connectivity by matching net labels</text>

  <rect x="36" y="78" width="300" height="46" rx="5" fill="#eef4ff" stroke="#1d4ed8" stroke-width="1"/>
  <text x="186" y="97" class="tblh" text-anchor="middle" fill="#1d4ed8">GAL3_POINTERS  (16V8)  — decode</text>
  <text x="186" y="113" class="tbl" text-anchor="middle" fill="#1d4ed8">RSP_EN p17 (act-low) · RSP_UD p16 (H=up) · RDIN_SEL p15</text>
  <rect x="352" y="78" width="196" height="46" rx="5" fill="#fff7ed" stroke="#b45309" stroke-width="1"/>
  <text x="450" y="97" class="tblh" text-anchor="middle" fill="#b45309">SYSTEM</text>
  <text x="450" y="113" class="tbl" text-anchor="middle" fill="#b45309">CLK (1 Hz, rising-edge) · RESET (active-high)</text>

