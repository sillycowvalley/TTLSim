  <g class="stub"><line x1="766" y1="208" x2="784" y2="208"/><line x1="766" y1="236" x2="784" y2="236"/><line x1="766" y1="264" x2="784" y2="264"/><line x1="766" y1="292" x2="784" y2="292"/></g>
  <g class="pinlbl" text-anchor="end"><text x="762" y="211">I/O1</text><text x="762" y="239">I/O2</text><text x="762" y="267">I/O3</text><text x="762" y="295">I/O4</text></g>

  <!-- '257 RET-data-in mux -->
  <rect x="600" y="560" width="166" height="150" rx="6" class="chip-mux"/>
  <text x="683" y="624" class="cname" fill="#166534">RET-DATA-IN</text><text x="683" y="640" class="csub">74'257 · quad 2:1, 3-state</text><text x="683" y="654" class="csub">drives RTOS on a push</text>
  <g class="stub"><line x1="582" y1="586" x2="600" y2="586"/><line x1="582" y1="614" x2="600" y2="614"/><line x1="582" y1="642" x2="600" y2="642"/><line x1="582" y1="678" x2="600" y2="678"/></g>
  <text x="578" y="589" class="buslbl" text-anchor="end">PC+1[0:3]</text><text x="604" y="589" class="pinlbl">B (sel=1, CALL)</text>
  <text x="578" y="617" class="pwrlbl" text-anchor="end">GND</text><text x="604" y="617" class="pinlbl">A (&gt;R stub)</text>
  <text x="578" y="645" class="ctllbl" text-anchor="end">RDIN_SEL</text><text x="604" y="645" class="pinlbl">S (p1)</text>
  <text x="578" y="681" class="ctllbl" text-anchor="end">/WE</text><text x="604" y="681" class="pinlbl">/OE (p15)</text>
  <g class="stub"><line x1="766" y1="635" x2="784" y2="635"/></g><text x="770" y="630" class="pinlbl">Y1-4</text>

  <!-- shared RTOS bus: 2114 I/O <-> '257 Y, branch -> NPC -->
  <path class="netbus" d="M784 250 H872 V635 H784"/>
  <path class="netbus" d="M872 250 H986" marker-end="url(#arr)"/>
  <text x="800" y="186" class="buslbl">RTOS[0:3]  (shared, bidir)</text>
  <text x="900" y="244" class="buslbl">→ NPC mux → PC  (on RET)</text>
  <text x="858" y="455" class="csub" transform="rotate(-90 858 455)">2114 drives on read · '257 drives on write</text>

  <!-- PC+1 into '257 -->
  <path class="netbus" d="M474 588 H582" marker-end="url(#arr)"/>
  <text x="478" y="580" class="buslbl">PC+1  (from '283 +1 adder)</text>
  <text x="478" y="604" class="csub" text-anchor="start">return address pushed on CALL</text>

  <!-- '00 glue -->
  <rect x="940" y="150" width="300" height="392" rx="6" class="chip-glue"/>
  <text x="1090" y="172" class="cname" fill="#6b21a8">STROBE / INVERTER GLUE — 74'00</text>
  <text x="1090" y="187" class="csub">one package, all four gates used</text>
  <g>
    <path class="gate" d="M992 214 h26 a20 20 0 0 1 0 40 h-26 z"/><circle cx="1043" cy="234" r="4.5" class="gate"/><text x="1005" y="239" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">&amp;</text>
    <line x1="966" y1="224" x2="992" y2="224" class="ctl"/><line x1="966" y1="244" x2="992" y2="244" class="ctl"/><line x1="1048" y1="234" x2="1078" y2="234" class="net"/>
    <text x="962" y="221" class="ctllbl" text-anchor="end">RSP_UD</text><text x="962" y="247" class="ctllbl" text-anchor="end">WRPH</text>
    <text x="1082" y="231" class="ctllbl">/WE</text><text x="1082" y="244" class="csub" text-anchor="start">→ 2114 /WE, '257 /OE</text>
  </g>
  <g>
    <path class="gate" d="M992 286 h26 a20 20 0 0 1 0 40 h-26 z"/><circle cx="1043" cy="306" r="4.5" class="gate"/><text x="1005" y="311" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">&amp;</text>
    <line x1="966" y1="296" x2="992" y2="296" class="ctl"/><line x1="966" y1="316" x2="992" y2="316" class="ctl"/><line x1="1048" y1="306" x2="1078" y2="306" class="net"/>
    <text x="962" y="293" class="ctllbl" text-anchor="end">CLK</text><text x="962" y="319" class="ctllbl" text-anchor="end">CLK</text>
    <text x="1082" y="303" class="ctllbl">WRPH = /CLK</text><text x="1082" y="316" class="csub" text-anchor="start">→ gate-1 input (write window)</text>
  </g>
  <g>
    <path class="gate" d="M992 358 h26 a20 20 0 0 1 0 40 h-26 z"/><circle cx="1043" cy="378" r="4.5" class="gate"/><text x="1005" y="383" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">&amp;</text>
    <line x1="966" y1="368" x2="992" y2="368" class="ctl"/><line x1="966" y1="388" x2="992" y2="388" class="ctl"/><line x1="1048" y1="378" x2="1078" y2="378" class="net"/>
    <text x="962" y="365" class="ctllbl" text-anchor="end">RSP_UD</text><text x="962" y="391" class="ctllbl" text-anchor="end">RSP_UD</text>
    <text x="1082" y="375" class="ctllbl">/RSP_UD</text><text x="1082" y="388" class="csub" text-anchor="start">→ '191 D//U  (LOW = up)</text>
  </g>
  <g>
    <path class="gate" d="M992 430 h26 a20 20 0 0 1 0 40 h-26 z"/><circle cx="1043" cy="450" r="4.5" class="gate"/><text x="1005" y="455" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">&amp;</text>
    <line x1="966" y1="440" x2="992" y2="440" class="ctl"/><line x1="966" y1="460" x2="992" y2="460" class="ctl"/><line x1="1048" y1="450" x2="1078" y2="450" class="net"/>
    <text x="962" y="437" class="ctllbl" text-anchor="end">RESET</text><text x="962" y="463" class="ctllbl" text-anchor="end">RESET</text>
    <text x="1082" y="447" class="ctllbl">/RESET</text><text x="1082" y="460" class="csub" text-anchor="start">→ '191 /LOAD  (load-of-zero)</text>
  </g>
  <text x="956" y="500" class="note" fill="#6b21a8">/CS is not gated here — RSP_EN drives 2114 /CS directly</text>
  <text x="956" y="516" class="note" fill="#6b21a8">(both active-low). /WE asserts only on a push, inside</text>
  <text x="956" y="532" class="note" fill="#6b21a8">the settled half-cycle, so IR-settling can't glitch it.</text>

  <!-- per-cycle legend -->
  <rect x="940" y="566" width="300" height="120" rx="5" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="954" y="586" class="tblh">Per-cycle behaviour</text>
  <text x="954" y="606" class="tbl">CALL (push): RSP_UD=up → addr=RSP, /WE pulses,</text>
  <text x="954" y="620" class="tbl">       '257 drives PC+1 onto RTOS → stk[RSP]; RSP++.</text>
  <text x="954" y="640" class="tbl">RET (pop):  RSP_UD=down → addr=RSP−1, /WE high,</text>
  <text x="954" y="654" class="tbl">       2114 drives RTOS → NPC mux → PC; RSP−−.</text>
  <text x="954" y="674" class="tbl">hold: RSP_EN deasserted → /CS high, bus high-Z.</text>

  <!-- notes -->
  <line x1="36" y1="720" x2="1240" y2="720" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="744" class="noteh">Design notes</text>
  <text x="36" y="764" class="note">• <tspan font-weight="700">Off-by-one fix.</tspan> The pointer marks the next-free slot, so the live top-of-stack sits at RSP−1. The '283 (B=1111, Cin=0) forms RSP−1; the '157 feeds RSP on a write and RSP−1 on a read. RET reads the true TOS on the same clock edge.</text>
  <text x="36" y="784" class="note">• <tspan font-weight="700">Clean clock.</tspan> The '191 runs straight off the system clock; direction is set by the '157 select, not by gating the clock. This is what lets back-to-back CALL→RET (no NOP padding) count cleanly — a muxed clock glitched on every direction flip.</text>
  <text x="36" y="804" class="note">• <tspan font-weight="700">Strobes.</tspan> /CS = RSP_EN wired direct (both active-low). /WE = NAND(RSP_UD, WRPH): asserts only on a push, and only while WRPH = /CLK is high — the settled second half of the cycle — so the IR-settling glitch on RSP_UD can't punch a runt pulse through to /WE.</text>
  <text x="36" y="824" class="note">• <tspan font-weight="700">RTOS bus.</tspan> One shared 4-bit bus on the 2114 I/O. The '257 (3-state) drives PC+1 onto it only on a push (/OE = /WE); on a read it is released and the 2114 drives RTOS into the NPC mux. At W=4 there is no separate RTOS latch — RTOS is the 2114 read at the addressed cell.</text>
  <text x="36" y="844" class="note">• <tspan font-weight="700">Polarity glue.</tspan> GAL RSP_UD is HIGH=up; the '191 D//U is LOW=up, so the '00 inverts it. Reset is load-of-zero: the '00 inverts the active-high RESET into the '191's active-low /LOAD (parallel inputs tied to 0).</text>
  <text x="36" y="864" class="note">• <tspan font-weight="700">Timing caveat.</tspan> With WRPH = /CLK the write commits at the cycle-ending edge; correct because the counter+mux delay on the address exceeds the single-NAND delay on /WE. Large margin at 1 Hz; a bounded write pulse would be needed only at much higher clocks.</text>
  <text x="36" y="888" class="csub" text-anchor="start" fill="#94a3b8">Chips: U9 '191 (RSP) · U13 '283 (RSP−1) · U14 '157 (addr mux) · U10 2114 (stack) · U11 '257 (RET-data-in) · U12 '00 (glue). Controls from U8 GAL3_POINTERS. Verified in TTLSim: nested CALL/RET, RSP unwinds 0→1→2→1→0, no spurious writes.</text>
</svg>
