  <g class="stub"><line x1="582" y1="196" x2="600" y2="196"/><line x1="582" y1="224" x2="600" y2="224"/><line x1="582" y1="252" x2="600" y2="252"/><line x1="582" y1="280" x2="600" y2="280"/><line x1="582" y1="316" x2="600" y2="316"/><line x1="582" y1="352" x2="600" y2="352"/></g>
  <text x="578" y="199" class="buslbl" text-anchor="end">R_ADDR0</text><text x="604" y="199" class="pinlbl">A0</text>
