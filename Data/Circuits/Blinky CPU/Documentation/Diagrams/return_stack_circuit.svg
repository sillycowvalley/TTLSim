  <g class="pinlbl"><text x="96" y="197">B</text><text x="96" y="225">Q1</text><text x="96" y="253">Q0</text><text x="96" y="281">/CTEN</text><text x="96" y="309">D//U</text><text x="96" y="337">Q2</text><text x="96" y="365">Q3</text><text x="96" y="393">GND</text></g>
  <g text-anchor="end"><text x="70" y="197" class="pwrlbl">GND</text><text x="70" y="225" class="buslbl">RSP1</text><text x="70" y="253" class="buslbl">RSP0</text><text x="70" y="281" class="ctllbl">RSP_EN</text><text x="70" y="309" class="ctllbl">/RSP_UD</text><text x="70" y="337" class="buslbl">RSP2</text><text x="70" y="365" class="buslbl">RSP3</text><text x="70" y="393" class="pwrlbl">GND</text></g>
  <g class="stub"><line x1="224" y1="194" x2="242" y2="194"/><line x1="224" y1="222" x2="242" y2="222"/><line x1="224" y1="250" x2="242" y2="250"/><line x1="224" y1="278" x2="242" y2="278"/><line x1="224" y1="306" x2="242" y2="306"/><line x1="224" y1="334" x2="242" y2="334"/><line x1="224" y1="362" x2="242" y2="362"/><line x1="224" y1="390" x2="242" y2="390"/></g>
  <g class="pinnum"><text x="228" y="191">16</text><text x="228" y="219">15</text><text x="228" y="247">14</text><text x="228" y="275">13</text><text x="228" y="303">12</text><text x="228" y="331">11</text><text x="228" y="359">10</text><text x="228" y="387">9</text></g>
  <g class="pinlbl" text-anchor="end"><text x="220" y="197">VCC</text><text x="220" y="225">A</text><text x="220" y="253">CLK</text><text x="220" y="281">/RCO</text><text x="220" y="309">M/M</text><text x="220" y="337">/LOAD</text><text x="220" y="365">C</text><text x="220" y="393">D</text></g>
  <g><text x="246" y="197" class="pwrlbl">VCC</text><text x="246" y="225" class="pwrlbl">GND</text><text x="246" y="253" class="ctllbl">CLK</text><text x="246" y="281" class="pwrlbl">nc</text><text x="246" y="309" class="pwrlbl">nc</text><text x="246" y="337" class="ctllbl">/RESET</text><text x="246" y="365" class="pwrlbl">GND</text><text x="246" y="393" class="pwrlbl">GND</text></g>
