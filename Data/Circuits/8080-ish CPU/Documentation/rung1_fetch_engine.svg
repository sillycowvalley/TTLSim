<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1a7a2e"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1c5bbf"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#b8860b"/></marker>
    <marker id="arrC" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0e8a8a"/></marker>
    <marker id="arrOl" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#6b6b1f"/></marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-size="21" font-weight="600" fill="#222">Rung 1 — Fetch Engine (no decode, no IR)</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#666">'377 PC behind the shared incrementer · reset is a write of 0x0000, not a clear · 10 ICs</text>

  <!-- Clock module -->
  <rect x="30" y="110" width="185" height="185" rx="8" fill="#f4f1ea" stroke="#555" stroke-width="1.5"/>
  <text x="122" y="135" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Clock module</text>
  <text x="122" y="155" text-anchor="middle" font-size="11" fill="#666">Blinky v3</text>
  <text x="45" y="180" font-size="12" fill="#444">STEP / RUN / NEXT</text>
  <text x="200" y="207" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">CLK ▸</text>
  <text x="200" y="234" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">RST ▸</text>
  <text x="200" y="261" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">/RST ▸</text>
  <text x="122" y="284" text-anchor="middle" font-size="10" fill="#888">complementary pair = the reset mux</text>

  <!-- PC -->
  <rect x="310" y="110" width="150" height="115" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="385" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#333">PC</text>
  <text x="385" y="158" text-anchor="middle" font-size="12" fill="#555">2 × '377 · CP = CLK</text>
  <text x="385" y="176" text-anchor="middle" font-size="11" fill="#777">D ← SUM (always)</text>
  <text x="385" y="192" text-anchor="middle" font-size="11" fill="#777">/E strap = GND (rung 1)</text>
  <text x="385" y="208" text-anchor="middle" font-size="11" fill="#777">no clear pin — reset is a write</text>

  <!-- 541 buffers -->
  <rect x="535" y="110" width="135" height="115" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="602" y="140" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Addr buffers</text>
  <text x="602" y="160" text-anchor="middle" font-size="12" fill="#555">2 × '541</text>
  <text x="602" y="178" text-anchor="middle" font-size="11" fill="#b8860b">enable ← RST</text>
  <text x="602" y="194" text-anchor="middle" font-size="11" fill="#777">(off while reset held)</text>

  <!-- Zero driver -->
  <rect x="750" y="110" width="150" height="115" rx="8" fill="#f3eefa" stroke="#555" stroke-width="1.5"/>
  <text x="825" y="140" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Zero driver</text>
  <text x="825" y="160" text-anchor="middle" font-size="12" fill="#555">2 × '541, inputs = GND</text>
  <text x="825" y="178" text-anchor="middle" font-size="11" fill="#b8860b">enable ← /RST</text>
  <text x="825" y="194" text-anchor="middle" font-size="11" fill="#777">owns the bus in reset:</text>
  <text x="825" y="210" text-anchor="middle" font-size="11" fill="#777">bus = 0x0000 → PC captures</text>

  <!-- CLK / RST wires -->
  <path d="M215,203 H310" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrO)"/>
  <text x="245" y="197" font-size="11" fill="#d97706">CLK</text>
  <path d="M215,230 H262 V320 H540 V232 H560" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="300" y="314" font-size="11" fill="#b8860b">RST → PC-buffer enable</text>
  <path d="M215,257 H240 V338 H790 V232" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="470" y="356" font-size="11" fill="#b8860b">/RST → zero-driver enable · also strapped to INC (count in run, pass in reset)</text>

  <!-- PC -> 541 (olive) -->
  <path d="M460,165 H535" stroke="#6b6b1f" stroke-width="4" fill="none" marker-end="url(#arrOl)"/>
  <text x="497" y="156" text-anchor="middle" font-size="11" fill="#6b6b1f">PC[15:0]</text>

  <!-- Address bus -->
  <path d="M280,390 H930" stroke="#1a7a2e" stroke-width="5" fill="none"/>
  <text x="905" y="380" text-anchor="end" font-size="14" font-weight="600" fill="#1a7a2e">A[15:0]</text>
  <path d="M602,225 V386" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <path d="M825,225 V386" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- Incrementer -->
  <rect x="310" y="440" width="160" height="125" rx="8" fill="#eef8f4" stroke="#555" stroke-width="1.5"/>
  <text x="390" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Incrementer</text>
  <text x="390" y="488" text-anchor="middle" font-size="12" fill="#555">4 × '283</text>
  <text x="390" y="506" text-anchor="middle" font-size="11" fill="#777">B[15:0] = DEC (GND)</text>
  <text x="390" y="522" text-anchor="middle" font-size="11" fill="#b8860b">Cin = INC ← /RST strap</text>
  <text x="390" y="538" text-anchor="middle" font-size="11" fill="#777">A ← address bus</text>
  <text x="390" y="554" text-anchor="middle" font-size="11" fill="#777">the machine's only counter</text>

  <!-- bus -> incrementer -->
  <path d="M390,390 V440" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- incrementer -> PC D (cyan loop, around the left) -->
  <path d="M310,502 H255 V196 H310" stroke="#0e8a8a" stroke-width="3" fill="none" marker-end="url(#arrC)"/>
  <text x="248" y="378" font-size="11" fill="#0e8a8a" transform="rotate(-90 248 378)">SUM[15:0] → PC.D</text>

  <!-- ROM -->
  <rect x="620" y="440" width="230" height="125" rx="8" fill="#faf0ee" stroke="#555" stroke-width="1.5"/>
  <text x="735" y="468" text-anchor="middle" font-size="15" font-weight="600" fill="#333">ROM</text>
  <text x="735" y="488" text-anchor="middle" font-size="12" fill="#555">Code &amp; IR module, single lane</text>
  <text x="735" y="506" text-anchor="middle" font-size="11" fill="#777">U2 28C256 + U4 '373</text>
  <text x="735" y="522" text-anchor="middle" font-size="11" fill="#777">LE on pullup (transparent), /OE = GND</text>
  <text x="735" y="538" text-anchor="middle" font-size="11" fill="#777">A15 not decoded — 32 K mirrored</text>
  <text x="735" y="554" text-anchor="middle" font-size="11" fill="#777">program in the ZIF socket</text>

  <!-- bus -> ROM -->
  <path d="M735,390 V440" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <text x="748" y="420" font-size="11" fill="#1a7a2e">A[14:0]</text>

  <!-- ROM -> probe (data bus) -->
  <rect x="620" y="600" width="230" height="85" rx="8" fill="#f0f4ee" stroke="#555" stroke-width="1.5"/>
  <text x="735" y="627" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Data-bus probe</text>
  <text x="735" y="645" text-anchor="middle" font-size="11" fill="#777">I/O module, '373 live-probe fitment</text>
  <text x="735" y="661" text-anchor="middle" font-size="11" fill="#777">LEDs track D combinationally</text>

  <path d="M735,565 V600" stroke="#1c5bbf" stroke-width="4" fill="none" marker-end="url(#arrB)"/>
  <text x="748" y="588" font-size="12" font-weight="600" fill="#1c5bbf">D[7:0]</text>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <rect x="30" y="570" width="260" height="118" rx="6" fill="#fbfbfb" stroke="#ccc"/>
    <text x="45" y="590" font-weight="600" fill="#333">Wire legend (project convention)</text>
    <path d="M45,604 h28" stroke="#1a7a2e" stroke-width="4"/><text x="80" y="608">Address bus</text>
    <path d="M45,622 h28" stroke="#6b6b1f" stroke-width="4"/><text x="80" y="626">PC (pre-buffer)</text>
    <path d="M45,640 h28" stroke="#1c5bbf" stroke-width="4"/><text x="80" y="644">Data bus</text>
    <path d="M45,658 h28" stroke="#0e8a8a" stroke-width="3"/><text x="80" y="662">Register feed</text>
    <path d="M45,676 h28" stroke="#d97706" stroke-width="2"/><text x="80" y="680">Clock</text>
    <path d="M160,676 h28" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3"/><text x="195" y="680">Control</text>
  </g>
</svg>
