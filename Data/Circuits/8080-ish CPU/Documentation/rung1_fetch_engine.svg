<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1a7a2e"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1c5bbf"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#b8860b"/></marker>
    <marker id="arrC" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0e8a8a"/></marker>
    <marker id="arrOl" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#6b6b1f"/></marker>
  </defs>

  <text x="480" y="34" text-anchor="middle" font-size="21" font-weight="600" fill="#222">Rung 1 — Fetch Engine (no decode, no IR)</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#666">PC walks the ROM; LEDs show every byte. Straps: INC = VCC, DEC = GND, /PCOE = GND</text>

  <!-- Clock module -->
  <rect x="30" y="110" width="185" height="170" rx="8" fill="#f4f1ea" stroke="#555" stroke-width="1.5"/>
  <text x="122" y="135" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Clock module</text>
  <text x="122" y="155" text-anchor="middle" font-size="11" fill="#666">Blinky v3</text>
  <text x="45" y="182" font-size="12" fill="#444">STEP / RUN / NEXT</text>
  <text x="45" y="200" font-size="12" fill="#444">RESET (supervised)</text>
  <text x="200" y="222" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">CLK ▸</text>
  <text x="200" y="252" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">/RST ▸</text>

  <!-- PC -->
  <rect x="310" y="110" width="145" height="110" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="382" y="138" text-anchor="middle" font-size="15" font-weight="600" fill="#333">PC</text>
  <text x="382" y="158" text-anchor="middle" font-size="12" fill="#555">2 × '273</text>
  <text x="382" y="176" text-anchor="middle" font-size="11" fill="#777">clocks every edge</text>
  <text x="382" y="192" text-anchor="middle" font-size="11" fill="#777">/MR = /RST → 0x0000</text>

  <!-- 541 buffers -->
  <rect x="535" y="110" width="130" height="110" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="600" y="140" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Addr buffers</text>
  <text x="600" y="160" text-anchor="middle" font-size="12" fill="#555">2 × '541</text>
  <text x="600" y="178" text-anchor="middle" font-size="11" fill="#777">/PCOE strapped GND</text>
  <text x="600" y="194" text-anchor="middle" font-size="11" fill="#777">(sole A source)</text>

  <!-- CLK / RST wires -->
  <path d="M215,218 H310 " stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrO)"/>
  <text x="245" y="212" font-size="11" fill="#d97706">CLK</text>
  <path d="M215,248 H283 V196 H310" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="240" y="243" font-size="11" fill="#b8860b">/RST → /MR</text>

  <!-- PC -> 541 (olive) -->
  <path d="M455,165 H535" stroke="#6b6b1f" stroke-width="4" fill="none" marker-end="url(#arrOl)"/>
  <text x="495" y="156" text-anchor="middle" font-size="11" fill="#6b6b1f">PC[15:0]</text>

  <!-- Address bus -->
  <path d="M280,300 H930" stroke="#1a7a2e" stroke-width="5" fill="none"/>
  <text x="905" y="290" text-anchor="end" font-size="14" font-weight="600" fill="#1a7a2e">A[15:0]</text>
  <path d="M600,220 V296" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- Incrementer -->
  <rect x="310" y="360" width="150" height="120" rx="8" fill="#eef8f4" stroke="#555" stroke-width="1.5"/>
  <text x="385" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Incrementer</text>
  <text x="385" y="408" text-anchor="middle" font-size="12" fill="#555">4 × '283</text>
  <text x="385" y="426" text-anchor="middle" font-size="11" fill="#777">B[15:0] = DEC (GND)</text>
  <text x="385" y="442" text-anchor="middle" font-size="11" fill="#777">Cin = INC (VCC)</text>
  <text x="385" y="458" text-anchor="middle" font-size="11" fill="#777">A ← address bus</text>

  <!-- bus -> incrementer -->
  <path d="M385,300 V360" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- incrementer -> PC D (cyan loop, around the left) -->
  <path d="M310,420 H255 V196 H273 " stroke="#0e8a8a" stroke-width="3" fill="none"/>
  <path d="M273,196 H310" stroke="#0e8a8a" stroke-width="3" fill="none" marker-end="url(#arrC)"/>
  <text x="248" y="330" font-size="11" fill="#0e8a8a" transform="rotate(-90 248 330)">SUM[15:0] → PC.D</text>

  <!-- ROM -->
  <rect x="620" y="360" width="230" height="130" rx="8" fill="#faf0ee" stroke="#555" stroke-width="1.5"/>
  <text x="735" y="388" text-anchor="middle" font-size="15" font-weight="600" fill="#333">ROM</text>
  <text x="735" y="408" text-anchor="middle" font-size="12" fill="#555">Code &amp; IR module, single lane</text>
  <text x="735" y="426" text-anchor="middle" font-size="11" fill="#777">U2 28C256 + U4 '373</text>
  <text x="735" y="442" text-anchor="middle" font-size="11" fill="#777">LE on pullup (transparent), /OE = GND</text>
  <text x="735" y="458" text-anchor="middle" font-size="11" fill="#777">A15 not decoded — 32 K mirrored</text>
  <text x="735" y="474" text-anchor="middle" font-size="11" fill="#777">program in the ZIF socket</text>

  <!-- bus -> ROM -->
  <path d="M735,300 V360" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <text x="748" y="336" font-size="11" fill="#1a7a2e">A[14:0]</text>

  <!-- ROM -> probe (data bus) -->
  <rect x="620" y="545" width="230" height="90" rx="8" fill="#f0f4ee" stroke="#555" stroke-width="1.5"/>
  <text x="735" y="573" text-anchor="middle" font-size="14" font-weight="600" fill="#333">Data-bus probe</text>
  <text x="735" y="592" text-anchor="middle" font-size="11" fill="#777">I/O module, '373 live-probe fitment</text>
  <text x="735" y="608" text-anchor="middle" font-size="11" fill="#777">LEDs track D combinationally</text>

  <path d="M735,490 V545" stroke="#1c5bbf" stroke-width="4" fill="none" marker-end="url(#arrB)"/>
  <text x="748" y="522" font-size="12" font-weight="600" fill="#1c5bbf">D[7:0]</text>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <rect x="30" y="520" width="250" height="118" rx="6" fill="#fbfbfb" stroke="#ccc"/>
    <text x="45" y="540" font-weight="600" fill="#333">Wire legend (project convention)</text>
    <path d="M45,554 h28" stroke="#1a7a2e" stroke-width="4"/><text x="80" y="558">Address bus</text>
    <path d="M45,572 h28" stroke="#6b6b1f" stroke-width="4"/><text x="80" y="576">PC (pre-buffer)</text>
    <path d="M45,590 h28" stroke="#1c5bbf" stroke-width="4"/><text x="80" y="594">Data bus</text>
    <path d="M45,608 h28" stroke="#0e8a8a" stroke-width="3"/><text x="80" y="612">Register feed</text>
    <path d="M45,626 h28" stroke="#d97706" stroke-width="2"/><text x="80" y="630">Clock</text>
    <path d="M160,626 h28" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3"/><text x="195" y="630">Control</text>
  </g>
</svg>
