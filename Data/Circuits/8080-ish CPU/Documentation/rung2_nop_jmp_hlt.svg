<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1a7a2e"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#1c5bbf"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#d97706"/></marker>
    <marker id="arrY" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#b8860b"/></marker>
    <marker id="arrC" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#0e8a8a"/></marker>
    <marker id="arrOl" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#6b6b1f"/></marker>
  </defs>

  <text x="540" y="32" text-anchor="middle" font-size="21" font-weight="600" fill="#222">Rung 2 — Minimum Executing Machine (NOP / JMP / HLT)</text>
  <text x="540" y="54" text-anchor="middle" font-size="13" fill="#666">'377 PC with /PCLE from the GAL · reset path stays hardwired below the GAL · 14 ICs</text>

  <!-- Clock module -->
  <rect x="30" y="100" width="190" height="240" rx="8" fill="#f4f1ea" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="125" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Clock module</text>
  <text x="125" y="143" text-anchor="middle" font-size="11" fill="#666">Blinky v3 — owns the T counter</text>
  <text x="205" y="168" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">CLK ▸</text>
  <text x="205" y="192" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">RST ▸</text>
  <text x="205" y="216" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">/RST ▸</text>
  <text x="205" y="240" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">T[1:0] ▸</text>
  <text x="205" y="272" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">◂ /TRST</text>
  <text x="205" y="296" text-anchor="end" font-size="12" font-weight="600" fill="#b8860b">◂ /HALTREQ</text>
  <text x="125" y="322" text-anchor="middle" font-size="10" fill="#888">(open-drain from GAL — shared with panel button)</text>

  <!-- PC -->
  <rect x="320" y="100" width="150" height="110" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="395" y="127" text-anchor="middle" font-size="15" font-weight="600" fill="#333">PC</text>
  <text x="395" y="146" text-anchor="middle" font-size="12" fill="#555">2 × '377 · CP = CLK</text>
  <text x="395" y="164" text-anchor="middle" font-size="11" fill="#777">D ← SUM (always)</text>
  <text x="395" y="180" text-anchor="middle" font-size="11" fill="#b8860b">/E = /PCLE ← GAL</text>
  <text x="395" y="196" text-anchor="middle" font-size="11" fill="#777">reset = write of 0x0000</text>

  <!-- 541 buffers -->
  <rect x="540" y="100" width="135" height="110" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="607" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Addr buffers</text>
  <text x="607" y="149" text-anchor="middle" font-size="12" fill="#555">2 × '541</text>
  <text x="607" y="167" text-anchor="middle" font-size="11" fill="#b8860b">/PCOE ← GAL</text>
  <text x="607" y="183" text-anchor="middle" font-size="11" fill="#b8860b">2nd enable ← RST (hardwired)</text>

  <!-- Zero driver -->
  <rect x="745" y="100" width="150" height="110" rx="8" fill="#f3eefa" stroke="#555" stroke-width="1.5"/>
  <text x="820" y="130" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Zero driver</text>
  <text x="820" y="149" text-anchor="middle" font-size="12" fill="#555">2 × '541, inputs = GND</text>
  <text x="820" y="167" text-anchor="middle" font-size="11" fill="#b8860b">enable ← /RST (hardwired)</text>
  <text x="820" y="183" text-anchor="middle" font-size="11" fill="#777">reset works with GAL absent</text>

  <!-- WZ -->
  <rect x="880" y="380" width="170" height="130" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="965" y="407" text-anchor="middle" font-size="15" font-weight="600" fill="#333">WZ</text>
  <text x="965" y="426" text-anchor="middle" font-size="12" fill="#555">2 × '373</text>
  <text x="965" y="444" text-anchor="middle" font-size="11" fill="#777">D in, LE_Z / LE_W select</text>
  <text x="965" y="460" text-anchor="middle" font-size="11" fill="#777">Z → A[7:0], W → A[15:8]</text>
  <text x="965" y="476" text-anchor="middle" font-size="11" fill="#b8860b">/WZOE ← GAL (three-state)</text>
  <text x="965" y="494" text-anchor="middle" font-size="10" fill="#888">own '541s not needed</text>

  <!-- CLK / RST wires to PC -->
  <path d="M220,164 H320" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#arrO)"/>
  <text x="250" y="158" font-size="11" fill="#d97706">CLK</text>
  <path d="M220,188 H500 V150 H540" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <path d="M220,212 H240 V70 H790 V100" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="500" y="64" font-size="11" fill="#b8860b">/RST → zero-driver enable</text>

  <!-- PC -> 541 (olive) -->
  <path d="M470,155 H540" stroke="#6b6b1f" stroke-width="4" fill="none" marker-end="url(#arrOl)"/>
  <text x="505" y="146" text-anchor="middle" font-size="11" fill="#6b6b1f">PC[15:0]</text>

  <!-- Address bus -->
  <path d="M300,320 H1060" stroke="#1a7a2e" stroke-width="5" fill="none"/>
  <text x="1055" y="310" text-anchor="end" font-size="14" font-weight="600" fill="#1a7a2e">A[15:0]</text>
  <path d="M607,210 V316" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <path d="M820,210 V316" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <!-- WZ -> bus -->
  <path d="M965,380 V324" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- Incrementer -->
  <rect x="330" y="380" width="155" height="120" rx="8" fill="#eef8f4" stroke="#555" stroke-width="1.5"/>
  <text x="407" y="407" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Incrementer</text>
  <text x="407" y="426" text-anchor="middle" font-size="12" fill="#555">4 × '283</text>
  <text x="407" y="444" text-anchor="middle" font-size="11" fill="#777">A ← address bus</text>
  <text x="407" y="460" text-anchor="middle" font-size="11" fill="#b8860b">INC ← GAL · DEC = GND</text>
  <text x="407" y="478" text-anchor="middle" font-size="11" fill="#777">pass ⇒ PC ← WZ (jump)</text>

  <path d="M407,320 V380" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>

  <!-- incrementer -> PC D loop -->
  <path d="M330,442 H272 V178 H320" stroke="#0e8a8a" stroke-width="3" fill="none" marker-end="url(#arrC)"/>
  <text x="265" y="340" font-size="11" fill="#0e8a8a" transform="rotate(-90 265 340)">SUM[15:0] → PC.D</text>

  <!-- ROM -->
  <rect x="575" y="380" width="220" height="120" rx="8" fill="#faf0ee" stroke="#555" stroke-width="1.5"/>
  <text x="685" y="407" text-anchor="middle" font-size="15" font-weight="600" fill="#333">ROM</text>
  <text x="685" y="426" text-anchor="middle" font-size="12" fill="#555">Code &amp; IR module, single lane</text>
  <text x="685" y="444" text-anchor="middle" font-size="11" fill="#777">U2 28C256 + U4 '373</text>
  <text x="685" y="460" text-anchor="middle" font-size="11" fill="#777">LE on pullup, /OE = GND</text>
  <text x="685" y="476" text-anchor="middle" font-size="11" fill="#777">sole D source at this rung</text>

  <path d="M685,320 V380" stroke="#1a7a2e" stroke-width="4" fill="none" marker-end="url(#arrG)"/>
  <text x="698" y="352" font-size="11" fill="#1a7a2e">A[14:0]</text>

  <!-- Data bus -->
  <path d="M310,580 H1060" stroke="#1c5bbf" stroke-width="5" fill="none"/>
  <text x="1055" y="570" text-anchor="end" font-size="14" font-weight="600" fill="#1c5bbf">D[7:0]</text>
  <path d="M685,500 V576" stroke="#1c5bbf" stroke-width="4" fill="none" marker-end="url(#arrB)"/>
  <!-- D -> WZ -->
  <path d="M965,580 V514" stroke="#1c5bbf" stroke-width="4" fill="none" marker-end="url(#arrB)"/>
  <text x="978" y="550" font-size="11" fill="#1c5bbf">D → Z / W</text>

  <!-- IR -->
  <rect x="440" y="630" width="155" height="100" rx="8" fill="#eef3fa" stroke="#555" stroke-width="1.5"/>
  <text x="517" y="657" text-anchor="middle" font-size="15" font-weight="600" fill="#333">IR</text>
  <text x="517" y="676" text-anchor="middle" font-size="12" fill="#555">'377 · CP = CLK</text>
  <text x="517" y="694" text-anchor="middle" font-size="11" fill="#b8860b">/E = /IRCE ← GAL</text>
  <text x="517" y="711" text-anchor="middle" font-size="11" fill="#777">loads at edge ending state 0</text>
  <path d="M517,580 V630" stroke="#1c5bbf" stroke-width="4" fill="none" marker-end="url(#arrB)"/>

  <!-- GAL -->
  <rect x="60" y="590" width="250" height="180" rx="8" fill="#fdf6e3" stroke="#555" stroke-width="1.5"/>
  <text x="185" y="617" text-anchor="middle" font-size="15" font-weight="600" fill="#333">Sequencer / decoder</text>
  <text x="185" y="636" text-anchor="middle" font-size="12" fill="#555">GAL22V10, combinational</text>
  <text x="185" y="656" text-anchor="middle" font-size="11" fill="#777">in: IR[7:0], T[1:0], CLK, RST</text>
  <text x="185" y="674" text-anchor="middle" font-size="11" fill="#777">out: /PCOE /WZOE /PCLE /IRCE</text>
  <text x="185" y="690" text-anchor="middle" font-size="11" fill="#777">/TRST, INC, LE_Z, LE_W, /HALTREQ (o.d.)</text>
  <text x="185" y="712" text-anchor="middle" font-size="10" fill="#888">/PCOE·/WZOE complementary in run;</text>
  <text x="185" y="726" text-anchor="middle" font-size="10" fill="#888">RST//RST hand the bus to the zero driver</text>
  <text x="185" y="740" text-anchor="middle" font-size="10" fill="#888">below the GAL — reset is GAL-independent</text>

  <!-- IR -> GAL -->
  <path d="M440,680 H310" stroke="#0e8a8a" stroke-width="3" fill="none" marker-end="url(#arrC)"/>
  <text x="375" y="672" text-anchor="middle" font-size="11" fill="#0e8a8a">IR[7:0]</text>

  <!-- T + CLK + RST from clock module down left edge to GAL -->
  <path d="M55,236 H40 V630 H60" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="30" y="450" font-size="11" fill="#b8860b" transform="rotate(-90 30 450)">T[1:0], CLK, RST</text>

  <!-- GAL -> clock module (/TRST, /HALTREQ) -->
  <path d="M110,590 V360 H92 V300" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="122" y="460" font-size="11" fill="#b8860b" transform="rotate(-90 122 460)">/TRST · /HALTREQ</text>

  <!-- GAL control fan-out (single labelled trunk) -->
  <path d="M310,745 H930 V645" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none"/>
  <path d="M607,745 V214" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <path d="M407,745 V504" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <path d="M930,645 V514" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <path d="M355,745 V210" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3" fill="none" marker-end="url(#arrY)"/>
  <text x="640" y="762" font-size="11" fill="#b8860b">control: /PCLE · /PCOE · INC · LE_Z · LE_W · /WZOE</text>

  <!-- Legend -->
  <g font-size="11" fill="#444">
    <rect x="700" y="90" width="330" height="86" rx="6" fill="#fbfbfb" stroke="#ccc" transform="translate(0,-70)"/>
    <text x="715" y="40" font-weight="600" fill="#333"> </text>
  </g>
  <g font-size="11" fill="#444">
    <rect x="330" y="240" width="10" height="0" fill="none"/>
    <rect x="30" y="380" width="240" height="150" rx="6" fill="#fbfbfb" stroke="#ccc"/>
    <text x="45" y="400" font-weight="600" fill="#333">Wire legend (project convention)</text>
    <path d="M45,414 h26" stroke="#1a7a2e" stroke-width="4"/><text x="78" y="418">Address bus</text>
    <path d="M45,432 h26" stroke="#1c5bbf" stroke-width="4"/><text x="78" y="436">Data bus</text>
    <path d="M45,450 h26" stroke="#6b6b1f" stroke-width="4"/><text x="78" y="454">PC pre-buffer</text>
    <path d="M45,468 h26" stroke="#0e8a8a" stroke-width="3"/><text x="78" y="472">Register feed</text>
    <path d="M45,486 h26" stroke="#d97706" stroke-width="2"/><text x="78" y="490">Clock</text>
    <path d="M45,504 h26" stroke="#b8860b" stroke-width="1.6" stroke-dasharray="5,3"/><text x="78" y="508">Control</text>
    <text x="45" y="524" fill="#888" font-size="10">NOP = 2 cycles · JMP = 4 · HLT = 2 then frozen</text>
  </g>
</svg>
