<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 840" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0e7c86"/></marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2e7d32"/></marker>
    <marker id="arrGray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6b6b6b"/></marker>
    <marker id="arrGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#b28704"/></marker>
  </defs>

  <rect x="0" y="0" width="1260" height="840" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="34" font-size="20" font-weight="bold" fill="#222">'181 ALU Module v1 — single-board block diagram</text>
  <text x="40" y="54" font-size="12" fill="#777">Blinky family byte slice · 2× 74LS181 + 74S182 · function-code GAL · HCT fence · active-high data</text>

  <!-- Cascade header tab (H8) -->
  <rect x="470" y="76" width="260" height="30" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="600" y="95" font-size="11" fill="#444" text-anchor="middle">H8 — cascade:   /G · /P · /CN8 ▲    CNX ▼</text>

  <!-- F port tab (H6) -->
  <rect x="1130" y="76" width="110" height="30" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="1185" y="89" font-size="9.5" fill="#444" text-anchor="middle">H6</text>
  <text x="1185" y="100" font-size="9.5" fill="#444" text-anchor="middle">F[7:0]</text>

  <!-- Cascade verticals -->
  <path d="M520,140 L520,108" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <text x="526" y="124" font-size="9" fill="#6b6b6b">/G</text>
  <path d="M558,140 L558,108" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <text x="564" y="124" font-size="9" fill="#6b6b6b">/P</text>
  <path d="M605,140 L605,108" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <text x="611" y="124" font-size="9" fill="#6b6b6b">/CN8</text>
  <path d="M665,106 L665,138" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <text x="671" y="124" font-size="9" fill="#6b6b6b">CNX</text>

  <!-- ALU core -->
  <rect x="470" y="140" width="260" height="280" rx="6" fill="#eef3f8" stroke="#1f4e79" stroke-width="1.6"/>
  <text x="486" y="166" font-size="12" font-weight="bold" fill="#1f4e79">ALU core</text>
  <text x="486" y="188" font-size="10.5" fill="#333">U4  74LS181 — bits 0–3</text>
  <text x="486" y="205" font-size="10.5" fill="#333">U5  74LS181 — bits 4–7</text>
  <text x="486" y="222" font-size="10.5" fill="#333">U6  74S182 lookahead</text>
  <text x="486" y="346" font-size="10" fill="#555">Cn source — LK_CN:</text>
  <text x="486" y="362" font-size="10" fill="#555">· U3 Cn  (solo / low board)</text>
  <text x="486" y="378" font-size="10" fill="#555">· CNX seam  (high board)</text>
  <!-- right-edge tap labels -->
  <text x="722" y="157" font-size="9.5" fill="#6b6b6b" text-anchor="end">Cn+8</text>
  <text x="722" y="182" font-size="9.5" fill="#6b6b6b" text-anchor="end">Cn+4</text>
  <text x="722" y="237" font-size="9.5" fill="#6b6b6b" text-anchor="end">A=B</text>
  <text x="722" y="291" font-size="9.5" fill="#0e7c86" text-anchor="end">F[7:0] (LS)</text>

  <!-- A port -->
  <rect x="30" y="181" width="120" height="36" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="90" y="196" font-size="10.5" fill="#444" text-anchor="middle">H2</text>
  <text x="90" y="209" font-size="10" fill="#444" text-anchor="middle">A[7:0]</text>
  <path d="M150,199 L198,199" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>

  <!-- U1 A latch -->
  <rect x="200" y="160" width="150" height="78" rx="4" fill="#ffffff" stroke="#555"/>
  <text x="275" y="186" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">U1  '573 / '574</text>
  <text x="275" y="203" font-size="10" fill="#666" text-anchor="middle">A operand latch</text>
  <text x="275" y="220" font-size="9" fill="#999" text-anchor="middle">/LEA — level or edge per fit</text>
  <path d="M350,199 L468,199" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>

  <!-- B port -->
  <rect x="30" y="311" width="120" height="36" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="90" y="326" font-size="10.5" fill="#444" text-anchor="middle">H3</text>
  <text x="90" y="339" font-size="10" fill="#444" text-anchor="middle">B[7:0]</text>
  <path d="M150,329 L198,329" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>

  <!-- U2 B latch -->
  <rect x="200" y="290" width="150" height="78" rx="4" fill="#ffffff" stroke="#555"/>
  <text x="275" y="316" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">U2  '573 / '574</text>
  <text x="275" y="333" font-size="10" fill="#666" text-anchor="middle">B operand latch</text>
  <text x="275" y="350" font-size="9" fill="#999" text-anchor="middle">/OE ◄ BKILL · pulldowns → B = 0</text>
  <path d="M350,329 L468,329" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>

  <!-- A7 tap -->
  <circle cx="410" cy="199" r="2.6" fill="#0e7c86"/>
  <path d="M410,199 L410,545 L352,545" stroke="#0e7c86" stroke-width="1.6" fill="none" marker-end="url(#arrCyan)"/>
  <text x="416" y="455" font-size="9.5" fill="#0e7c86">A7</text>

  <!-- H4 tab -->
  <rect x="30" y="500" width="120" height="44" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="90" y="515" font-size="10.5" fill="#444" text-anchor="middle">H4</text>
  <text x="90" y="528" font-size="9.5" fill="#444" text-anchor="middle">FC[3:0] · CFLG</text>
  <text x="90" y="539" font-size="9.5" fill="#444" text-anchor="middle">/LEA · /LEB</text>
  <path d="M150,522 L198,522" stroke="#2e7d32" stroke-width="2.2" fill="none" marker-end="url(#arrGreen)"/>

  <!-- U3 GAL -->
  <rect x="200" y="470" width="150" height="115" rx="4" fill="#fdf6e3" stroke="#8a6d1a" stroke-width="1.4"/>
  <text x="275" y="494" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">U3  GAL16V8</text>
  <text x="275" y="511" font-size="10" fill="#666" text-anchor="middle">function-code decode</text>
  <text x="275" y="527" font-size="10" fill="#666" text-anchor="middle">per-host JEDEC</text>
  <text x="275" y="543" font-size="9" fill="#999" text-anchor="middle">in: FC · CFLG · A7</text>

  <!-- U3 outputs -->
  <path d="M350,495 L515,495 L515,421" stroke="#0e7c86" stroke-width="1.6" fill="none" marker-end="url(#arrCyan)"/>
  <text x="425" y="488" font-size="10" fill="#0e7c86">S3:0 · M</text>
  <path d="M350,522 L585,522 L585,421" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <text x="556" y="514" font-size="10" fill="#6b6b6b">Cn</text>
  <text x="440" y="536" font-size="9" fill="#999">pin sense folded into the equation</text>
  <path d="M350,556 L930,556 L930,520" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <text x="640" y="549" font-size="10" fill="#b28704">SUB</text>
  <path d="M275,470 L275,370" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <text x="281" y="425" font-size="10" fill="#b28704">BKILL</text>

  <!-- Carry conditioning -->
  <rect x="790" y="145" width="130" height="75" rx="4" fill="#ffffff" stroke="#555"/>
  <text x="855" y="164" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U8 '04 · U9 '86</text>
  <text x="855" y="180" font-size="9.5" fill="#666" text-anchor="middle">carry conditioning</text>
  <text x="855" y="194" font-size="9.5" fill="#666" text-anchor="middle">LK_BORROW ◄ SUB</text>
  <text x="855" y="208" font-size="9" fill="#999" text-anchor="middle">HCT — reads LS pins</text>
  <path d="M730,160 L788,160" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <path d="M730,185 L788,185" stroke="#6b6b6b" stroke-width="1.6" fill="none" marker-end="url(#arrGray)"/>
  <path d="M920,160 L1148,160" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <path d="M920,185 L1148,185" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>

  <!-- A=B -->
  <path d="M730,240 L1148,240" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <text x="940" y="233" font-size="9" fill="#999">open-collector · pull-up</text>

  <!-- Fence -->
  <rect x="790" y="270" width="130" height="56" rx="4" fill="#ffffff" stroke="#333" stroke-width="1.8"/>
  <text x="855" y="290" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U7  74HCT541</text>
  <text x="855" y="305" font-size="9.5" fill="#666" text-anchor="middle">level fence — LS → HC</text>
  <text x="855" y="319" font-size="9" fill="#999" text-anchor="middle">always enabled</text>
  <path d="M730,298 L788,298" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>

  <!-- FB bus to F port -->
  <path d="M920,298 L1085,298 L1085,91 L1128,91" stroke="#0e7c86" stroke-width="2.2" fill="none" marker-end="url(#arrCyan)"/>
  <text x="932" y="290" font-size="9.5" fill="#0e7c86">FB (HC)</text>

  <!-- FB taps -->
  <circle cx="945" cy="298" r="2.6" fill="#0e7c86"/>
  <circle cx="980" cy="298" r="2.6" fill="#0e7c86"/>
  <circle cx="1012" cy="298" r="2.6" fill="#0e7c86"/>
  <circle cx="1045" cy="298" r="2.6" fill="#0e7c86"/>

  <!-- Zero detect -->
  <path d="M945,298 L945,378" stroke="#0e7c86" stroke-width="1.6" fill="none" marker-end="url(#arrCyan)"/>
  <rect x="885" y="380" width="135" height="56" rx="4" fill="#ffffff" stroke="#555"/>
  <text x="952" y="400" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U10  74HC688</text>
  <text x="952" y="415" font-size="9.5" fill="#666" text-anchor="middle">zero detect</text>
  <text x="952" y="429" font-size="9" fill="#999" text-anchor="middle">cascade ◄ /ZCASC</text>
  <path d="M1020,408 L1148,408" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <path d="M830,420 L883,420" stroke="#b28704" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#arrGold)"/>
  <text x="826" y="424" font-size="9" fill="#b28704" text-anchor="end">/ZCASC</text>

  <!-- SIGN / SOUT -->
  <path d="M980,298 L980,330 L1148,330" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <text x="986" y="316" font-size="9" fill="#999">FB7</text>
  <path d="M1012,298 L1012,352 L1148,352" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>
  <text x="1018" y="344" font-size="9" fill="#999">FB0</text>

  <!-- V logic (option) -->
  <path d="M1045,298 L1045,458" stroke="#0e7c86" stroke-width="1.6" fill="none" marker-end="url(#arrCyan)"/>
  <text x="1051" y="442" font-size="9" fill="#999">F7</text>
  <rect x="880" y="460" width="170" height="58" rx="4" fill="#ffffff" stroke="#555" stroke-dasharray="5 3"/>
  <text x="965" y="479" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U12  '86 + AND — V (opt.)</text>
  <text x="965" y="495" font-size="9.5" fill="#666" text-anchor="middle">V = (A7⊕F7)·((B7⊕SUB)⊕F7)</text>
  <text x="965" y="509" font-size="9" fill="#999" text-anchor="middle">A7 · B7 tapped on-board</text>
  <path d="M1050,489 L1148,489" stroke="#b28704" stroke-width="1.6" fill="none" marker-end="url(#arrGold)"/>

  <!-- Conditions tab (H7) -->
  <text x="1197" y="133" font-size="10.5" fill="#444" text-anchor="middle">H7 — conditions</text>
  <rect x="1150" y="140" width="95" height="380" rx="4" fill="#f1f1f1" stroke="#999"/>
  <text x="1160" y="164" font-size="10" fill="#333">COUT</text>
  <text x="1160" y="189" font-size="10" fill="#333">HCOUT</text>
  <text x="1160" y="244" font-size="10" fill="#333">AEQB</text>
  <text x="1160" y="334" font-size="10" fill="#333">SIGN</text>
  <text x="1160" y="356" font-size="10" fill="#333">SOUT</text>
  <text x="1160" y="412" font-size="10" fill="#333">ZERO</text>
  <text x="1160" y="493" font-size="10" fill="#333">V</text>

  <!-- Wire legend -->
  <text x="30" y="618" font-size="10.5" font-weight="bold" fill="#555">Wires</text>
  <line x1="30" y1="636" x2="62" y2="636" stroke="#0e7c86" stroke-width="2.2"/>
  <text x="68" y="640" font-size="9.5" fill="#555">operand · result · S/M</text>
  <line x1="30" y1="656" x2="62" y2="656" stroke="#2e7d32" stroke-width="2.2"/>
  <text x="68" y="660" font-size="9.5" fill="#555">function code (FC)</text>
  <line x1="30" y1="676" x2="62" y2="676" stroke="#6b6b6b" stroke-width="1.6"/>
  <text x="68" y="680" font-size="9.5" fill="#555">carry (Cn · seam)</text>
  <line x1="30" y1="696" x2="62" y2="696" stroke="#b28704" stroke-width="1.6"/>
  <text x="68" y="700" font-size="9.5" fill="#555">control · conditions</text>
  <line x1="30" y1="716" x2="62" y2="716" stroke="#555" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="68" y="720" font-size="9.5" fill="#555">optional population</text>

  <!-- Options region -->
  <rect x="180" y="600" width="1060" height="190" rx="6" fill="none" stroke="#999" stroke-dasharray="6 4"/>
  <text x="196" y="622" font-size="11" font-weight="bold" fill="#666">Options — populate per host</text>

  <rect x="205" y="636" width="255" height="118" rx="4" fill="#fcfcfc" stroke="#888" stroke-dasharray="4 3"/>
  <text x="332" y="658" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U14 · U15 — '541 bus drivers</text>
  <text x="332" y="676" font-size="9.5" fill="#666" text-anchor="middle">FB → D  (/FOE)</text>
  <text x="332" y="692" font-size="9.5" fill="#666" text-anchor="middle">FB ≫ 1 → D  (/SOE) · SRIN → bit 7</text>
  <text x="332" y="708" font-size="9.5" fill="#666" text-anchor="middle">SOUT = FB0 · LK_SRIN: 0 / FB7 / ext</text>
  <text x="332" y="726" font-size="9.5" fill="#444" text-anchor="middle">H9 — D bus</text>

  <rect x="485" y="636" width="195" height="118" rx="4" fill="#fcfcfc" stroke="#888" stroke-dasharray="4 3"/>
  <text x="582" y="662" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U13  74HC280</text>
  <text x="582" y="680" font-size="9.5" fill="#666" text-anchor="middle">even parity over FB[7:0]</text>
  <text x="582" y="696" font-size="9.5" fill="#666" text-anchor="middle">→ PAR  (H8)</text>

  <rect x="705" y="636" width="245" height="118" rx="4" fill="#fcfcfc" stroke="#888" stroke-dasharray="4 3"/>
  <text x="827" y="660" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U16 / U17  74HC377</text>
  <text x="827" y="678" font-size="9.5" fill="#666" text-anchor="middle">flag latch — C / NZ domains</text>
  <text x="827" y="694" font-size="9.5" fill="#666" text-anchor="middle">FLGC · FLGNZ · CLK  (H10)</text>
  <text x="827" y="710" font-size="9.5" fill="#666" text-anchor="middle">CLAT · ZLAT · NLAT · VLAT</text>

  <rect x="975" y="636" width="245" height="118" rx="4" fill="#fcfcfc" stroke="#888" stroke-dasharray="4 3"/>
  <text x="1097" y="662" font-size="10.5" font-weight="bold" fill="#333" text-anchor="middle">U18  GAL22V10 — aux</text>
  <text x="1097" y="680" font-size="9.5" fill="#666" text-anchor="middle">drives B port  (/AUXOE)</text>
  <text x="1097" y="696" font-size="9.5" fill="#666" text-anchor="middle">DAA exemplar (8080-ish)</text>
</svg>
